<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人信息 - TypeReading Hub</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }
        .container {
            max-width: 500px;
            margin: 0 auto;
        }
        .card {
            background: rgba(255,255,255,0.95);
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        .card h1 {
            font-size: 24px;
            text-align: center;
            margin-bottom: 30px;
            color: #333;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #666;
            font-size: 14px;
        }
        .form-group input, .form-group select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
        }
        .form-group input[readonly] {
            background: #f5f5f5;
            color: #666;
        }
        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
        }
        .btn-primary {
            background: #667eea;
            color: white;
        }
        .btn-secondary {
            background: #f0f0f0;
            color: #333;
            margin-top: 10px;
        }
        .back-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: rgba(255,255,255,0.8);
            text-decoration: none;
        }
        .back-link:hover {
            color: white;
        }
        .hint {
            font-size: 12px;
            color: #999;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>👤 个人信息</h1>
            
            <form id="profileForm">
                <div class="form-group">
                    <label>昵称</label>
                    <input type="text" id="nickname" readonly>
                    <div class="hint">昵称注册后不可修改</div>
                </div>
                
                <div class="form-group">
                    <label>真实姓名</label>
                    <input type="text" id="realName" placeholder="请填写真实姓名">
                    <div class="hint">填写真实姓名后才能上排行榜</div>
                </div>
                
                <div class="form-group">
                    <label>性别</label>
                    <select id="gender">
                        <option value="">请选择</option>
                        <option value="male">男</option>
                        <option value="female">女</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label>班级</label>
                    <input type="text" id="className" readonly>
                    <div class="hint">班级由教师分配</div>
                </div>
                
                <button type="submit" class="btn btn-primary">保存修改</button>
            </form>
            
            <button class="btn btn-secondary" onclick="logout()">退出登录</button>
        </div>
        
        <a href="/" class="back-link">← 返回首页</a>
    </div>

    <script>
        // 检查登录
        const currentUserStr = localStorage.getItem('currentUser');
        if (!currentUserStr) {
            location.href = '/register/';
        }

        let currentUser = JSON.parse(currentUserStr);

        // 填充表单
        document.getElementById('nickname').value = currentUser.nickname || '';
        document.getElementById('realName').value = currentUser.realName || '';
        document.getElementById('gender').value = currentUser.gender || '';
        document.getElementById('className').value = currentUser.className || '';

        // 保存修改
        document.getElementById('profileForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const realName = document.getElementById('realName').value.trim();
            const gender = document.getElementById('gender').value;

            try {
                const response = await fetch('/api/admin/student/update', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        nickname: currentUser.nickname,
                        realName,
                        gender
                    })
                });

                const data = await response.json();

                if (data.success) {
                    // 更新本地存储
                    currentUser.realName = realName;
                    currentUser.gender = gender;
                    localStorage.setItem('currentUser', JSON.stringify(currentUser));
                    alert('保存成功');
                } else {
                    alert('保存失败：' + data.message);
                }
            } catch (err) {
                alert('网络错误：' + err.message);
            }
        });

        function logout() {
            localStorage.removeItem('currentUser');
            location.href = '/register/';
        }
    </script>
</body>
</html>
