<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>阅读打卡 - TypeReading Hub</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background: #f5f7fa; 
            padding: 20px; 
        }
        .header { 
            max-width: 800px; 
            margin: 0 auto 30px; 
            padding: 20px; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 16px;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header-left h2 { margin-bottom: 5px; }
        .header-left small { opacity: 0.9; }
        .header-right a { 
            color: white; 
            text-decoration: none; 
            margin-left: 15px;
            padding: 8px 16px;
            background: rgba(255,255,255,0.2);
            border-radius: 8px;
            transition: background 0.3s;
        }
        .header-right a:hover { background: rgba(255,255,255,0.3); }
        .container { max-width: 800px; margin: 0 auto; }
        .article-box { 
            background: white; 
            border-radius: 16px; 
            padding: 40px; 
            margin-bottom: 30px; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            line-height: 1.8; 
            font-size: 18px;
            min-height: 300px;
        }
        .article-box h3 { color: #333; margin-bottom: 20px; font-size: 1.5em; }
        .article-box p { color: #555; margin-bottom: 15px; }
        .controls { 
            display: flex; 
            align-items: center; 
            gap: 20px;
            flex-wrap: wrap;
        }
        .btn { 
            padding: 14px 32px; 
            font-size: 16px; 
            border: none; 
            border-radius: 10px; 
            cursor: pointer; 
            font-weight: 600;
            transition: all 0.3s;
        }
        .btn-primary { 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); 
            color: white; 
        }
        .btn-primary:hover { 
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
        }
        .btn-success { 
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%); 
            color: white; 
        }
        .btn:disabled { 
            background: #ccc !important; 
            cursor: not-allowed; 
            transform: none !important;
            box-shadow: none !important;
        }
        .timer { 
            font-size: 28px; 
            color: #667eea; 
            font-weight: bold;
            font-family: 'Courier New', monospace;
        }
        .result { 
            margin-top: 30px; 
            padding: 25px; 
            border-radius: 12px; 
            background: linear-gradient(135deg, #d4edda 0%, #c3e6cb 100%); 
            display: none;
        }
        .result h3 { color: #155724; margin-bottom: 15px; }
        @media (max-width: 600px) {
            .header { flex-direction: column; text-align: center; gap: 15px; }
            .header-right a { margin: 5px; }
            .article-box { padding: 25px; }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-left">
            <h2>📚 阅读打卡</h2>
            <small id="userName">加载中...</small>
        </div>
        <div class="header-right">
            <a href="/">🏠 首页</a>
            <a href="/typing/">⌨️ 打字</a>
            <a href="/rank/">🏆 排行</a>
        </div>
    </div>

    <div class="container">
        <div class="article-box" id="articleBox">
            <h3>今日阅读文章</h3>
            <div id="articleContent">
                <p style="color: #999; text-align: center; padding: 40px;">
                    点击"开始阅读"加载文章<br>
                    <small>（可由教师自定义每日阅读内容）</small>
                </p>
            </div>
        </div>

        <div class="controls">
            <button class="btn btn-primary" id="startBtn" onclick="startReading()">开始阅读</button>
            <span class="timer" id="timer" style="display: none;">⏱️ 00:00</span>
            <button class="btn btn-success" id="checkinBtn" style="display: none;" onclick="submitCheckin()">完成打卡</button>
        </div>

        <div class="result" id="resultBox">
            <h3>✅ 打卡成功！</h3>
            <p id="checkinResult"></p>
        </div>
    </div>

    <script>
        const user = JSON.parse(localStorage.getItem('typereading_user') || '{}');
        if (!user.userId) {
            alert('请先登录');
            location.href = '/register/';
        }
        document.getElementById('userName').textContent = '欢迎，' + (user.nickname || '同学');

        // 示例文章（教师可替换）
        const article = `The quick brown fox jumps over the lazy dog. This pangram contains every letter of the English alphabet at least once. Pangrams are often used to test fonts, keyboards, and other text-related tools. Students should read this carefully and understand its meaning while practicing their reading speed and comprehension. Regular reading practice helps improve vocabulary and language skills significantly.`;

        let startTime = null;
        let timerInterval = null;

        function startReading() {
            document.getElementById('articleContent').innerHTML = '<p>' + article + '</p>';
            document.getElementById('startBtn').style.display = 'none';
            document.getElementById('timer').style.display = 'inline-block';
            document.getElementById('checkinBtn').style.display = 'inline-block';
            
            startTime = Date.now();
            timerInterval = setInterval(updateTimer, 1000);
        }

        function updateTimer() {
            const elapsed = Math.floor((Date.now() - startTime) / 1000);
            const minutes = Math.floor(elapsed / 60).toString().padStart(2, '0');
            const seconds = (elapsed % 60).toString().padStart(2, '0');
            document.getElementById('timer').textContent = `⏱️ :`;
        }

        async function submitCheckin() {
            if (timerInterval) clearInterval(timerInterval);
            
            const duration = Math.floor((Date.now() - startTime) / 1000);
            const words = article.split(/\s+/).length;
            
            try {
                const res = await fetch('/api/checkin/reading', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        userId: user.userId,
                        articleId: 'daily-001',
                        duration: duration,
                        wordsRead: words
                    })
                });
                
                const data = await res.json();
                
                if (data.success) {
                    document.getElementById('resultBox').style.display = 'block';
                    document.getElementById('checkinResult').innerHTML = `
                        <strong>阅读时长：</strong>分秒<br>
                        <strong>阅读字数：</strong>词<br>
                        <strong>平均速度：</strong>词/分钟
                    `;
                    document.getElementById('checkinBtn').disabled = true;
                    document.getElementById('checkinBtn').textContent = '已打卡';
                }
            } catch (err) {
                alert('打卡失败，请重试');
            }
        }
    </script>
</body>
</html>
