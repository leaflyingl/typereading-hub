<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>阅读打卡 - TypeReading Hub</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }
    .container {
      max-width: 900px;
      margin: 0 auto;
    }
    .header {
      background: white;
      border-radius: 16px;
      padding: 20px 30px;
      margin-bottom: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    }
    .header h1 {
      color: #333;
      font-size: 24px;
    }
    .back-btn {
      color: #667eea;
      text-decoration: none;
      font-weight: 500;
    }
    .card {
      background: white;
      border-radius: 16px;
      padding: 30px;
      margin-bottom: 20px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    }
    .loading {
      text-align: center;
      color: #999;
      padding: 40px;
    }
    .checked-in {
      text-align: center;
      padding: 40px;
    }
    .checked-in-icon {
      font-size: 64px;
      color: #52c41a;
      margin-bottom: 20px;
    }
    .checked-in h2 {
      color: #333;
      margin-bottom: 10px;
    }
    .checked-in p {
      color: #666;
      margin-bottom: 20px;
    }
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 15px;
      margin-top: 20px;
    }
    .stat-item {
      background: #f8f9fa;
      padding: 20px;
      border-radius: 12px;
      text-align: center;
    }
    .stat-value {
      font-size: 28px;
      font-weight: bold;
      color: #667eea;
    }
    .stat-label {
      color: #666;
      font-size: 14px;
      margin-top: 5px;
    }
    .article-card {
      background: #f8f9fa;
      border-radius: 12px;
      padding: 25px;
      margin-bottom: 20px;
    }
    .article-title {
      font-size: 20px;
      font-weight: 600;
      color: #333;
      margin-bottom: 15px;
    }
    .article-content {
      color: #555;
      line-height: 1.8;
      font-size: 16px;
      white-space: pre-wrap;
    }
    .word-count {
      color: #999;
      font-size: 14px;
      margin-top: 15px;
      text-align: right;
    }
    .checkin-btn {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 18px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .checkin-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4);
    }
    .checkin-btn:disabled {
      background: #ccc;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }
    .no-content {
      text-align: center;
      padding: 60px 20px;
      color: #666;
    }
    .no-content-icon {
      font-size: 48px;
      margin-bottom: 20px;
    }
    .toast {
      position: fixed;
      top: 20px;
      right: 20px;
      padding: 16px 24px;
      border-radius: 8px;
      color: white;
      font-weight: 500;
      z-index: 1000;
      animation: slideIn 0.3s ease;
    }
    .toast.success { background: #52c41a; }
    .toast.error { background: #ff4d4f; }
    @keyframes slideIn {
      from { transform: translateX(100%); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    
    /* 新增：课后练习区域样式 */
    .qna-section {
      display: none;
      margin-top: 20px;
    }
    .qna-title {
      font-size: 18px;
      color: #333;
      margin-bottom: 20px;
      padding-bottom: 10px;
      border-bottom: 2px solid #667eea;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .question-item {
      background: #f8f9fa;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 15px;
      border-left: 3px solid #667eea;
    }
    .question-header {
      font-weight: 600;
      color: #333;
      margin-bottom: 12px;
      font-size: 16px;
    }
    .question-type {
      background: #e6f7ff;
      color: #1890ff;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 12px;
      margin-left: 8px;
      font-weight: normal;
    }
    .options-list {
      margin: 10px 0;
      padding-left: 5px;
    }
    .option-label {
      display: block;
      padding: 8px;
      margin: 5px 0;
      cursor: pointer;
      border-radius: 6px;
      transition: background 0.2s;
    }
    .option-label:hover {
      background: #e6f7ff;
    }
    .option-label input[type="radio"] {
      margin-right: 8px;
    }
    .answer-textarea {
      width: 100%;
      padding: 12px;
      border: 1px solid #d9d9d9;
      border-radius: 8px;
      min-height: 100px;
      resize: vertical;
      font-family: inherit;
      font-size: 14px;
      margin-top: 10px;
    }
    .answer-textarea:focus {
      outline: none;
      border-color: #667eea;
    }
    .submit-answer-btn {
      background: #667eea;
      color: white;
      border: none;
      padding: 10px 24px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      margin-top: 10px;
      font-weight: 500;
    }
    .submit-answer-btn:hover {
      background: #5a67d8;
    }
    .submit-answer-btn:disabled {
      background: #ccc;
      cursor: not-allowed;
    }
    .answer-status {
      margin-top: 10px;
      padding: 10px;
      border-radius: 6px;
      font-size: 14px;
    }
    .answer-status.submitted {
      background: #f6ffed;
      color: #52c41a;
    }
    .answer-status.pending {
      background: #fff7e6;
      color: #fa8c16;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>📖 阅读打卡</h1>
      <a href="/" class="back-btn">← 返回首页</a>
    </div>
    <div id="content-area">
      <div class="card loading">加载中...</div>
    </div>
    <!-- 新增：课后练习区域（初始隐藏，有内容时显示） -->
    <div id="qna-section" class="card qna-section">
      <div class="qna-title">📝 课后练习</div>
      <div id="questions-list"></div>
    </div>
  </div>

  <script>
    const currentUser = JSON.parse(localStorage.getItem('currentUser') || '{}');
    
    if (!currentUser.nickname) {
      window.location.href = '/register/';
    }

    // 全局变量保存当前文章信息
    let currentArticleId = null;
    let currentQuestions = [];

    function showToast(message, type = 'success') {
      const toast = document.createElement('div');
      toast.className = `toast ${type}`;
      toast.textContent = message;
      document.body.appendChild(toast);
      setTimeout(() => toast.remove(), 3000);
    }

    // 修复：获取本地日期 YYYY-MM-DD
function getTodayString() {
  const now = new Date();
  const year = now.getFullYear();
  const month = String(now.getMonth() + 1).padStart(2, '0');
  const day = String(now.getDate()).padStart(2, '0');
  return `--`;  // ✅ 注意：使用的是反引号，不是单引号！
}





    // 关键修复：检查打卡状态时传递客户端日期
    async function checkTodayStatus() {
      try {
        const response = await fetch('/api/checkin/status', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ 
            nickname: currentUser.nickname,
            date: getTodayString() // 关键：传递本地日期
          })
        });
        return await response.json();
      } catch (err) {
        console.error('检查状态失败:', err);
        return { success: false, hasCheckedIn: false };
      }
    }

    async function getTodayContent() {
      try {
        const response = await fetch('/api/content/reading', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ className: currentUser.className || '' })
        });
        return await response.json();
      } catch (err) {
        return { success: false, content: null };
      }
    }

    // 关键修复：打卡时传递 articleId 和 date
    async function doCheckin(articleId, articleTitle, wordCount) {
      try {
        const response = await fetch('/api/checkin/reading', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            nickname: currentUser.nickname,
            articleId: articleId,        // 传递文章ID
            articleTitle: articleTitle,
            wordCount: wordCount,
            date: getTodayString()        // 传递本地日期
          })
        });
        return await response.json();
      } catch (err) {
        console.error('打卡失败:', err);
        return { success: false, message: '网络错误' };
      }
    }

    // 修复：渲染已打卡状态，正确显示文章信息
    function renderCheckedIn(record) {
      document.getElementById('content-area').innerHTML = `
        <div class="card checked-in">
          <div class="checked-in-icon">✅</div>
          <h2>今日已完成阅读打卡</h2>
          <p>文章：《${record.articleTitle || '未命名文章'}》</p>
          <div class="stats-grid">
            <div class="stat-item">
              <div class="stat-value">${record.wordCount || 0}</div>
              <div class="stat-label">阅读字数</div>
            </div>
            <div class="stat-item">
              <div class="stat-value">1</div>
              <div class="stat-label">打卡次数</div>
            </div>
          </div>
        </div>
      `;
      // 已打卡也加载问题（显示已提交状态）
      if (currentArticleId) {
        loadQuestions(currentArticleId);
      }
    }

    // 修复：渲染文章内容，正确传递参数
    function renderContent(content) {
      const contentArea = document.getElementById('content-area');
      
      if (!content) {
        contentArea.innerHTML = `
          <div class="card no-content">
            <div class="no-content-icon">📚</div>
            <h3>暂无阅读内容</h3>
            <p>请联系老师添加阅读材料</p>
          </div>
        `;
        return;
      }

      // 保存文章ID
      currentArticleId = content.id;
      contentArea.innerHTML = `
        <div class="card">
          <div class="article-card">
            <div class="article-title">${content.title}</div>
            <div class="article-content">${content.content}</div>
            <div class="word-count">字数：${content.wordCount || content.content.length}</div>
          </div>
          <button class="checkin-btn" onclick="handleCheckin('${content.title.replace(/'/g, "\\'")}', ${content.wordCount || content.content.length})">
            完成阅读，立即打卡
          </button>
        </div>
      `;
      
      // 新增：加载课后练习问题
      loadQuestions(content.id);
    }

    // 关键修复：使用保存的 articleId
    async function handleCheckin(title, wordCount) {
      const btn = document.querySelector('.checkin-btn');
      btn.disabled = true;
      btn.textContent = '打卡中...';

      // 使用全局保存的 articleId
      const result = await doCheckin(currentArticleId, title, wordCount);
      
      if (result.success) {
        showToast('打卡成功！', 'success');
        setTimeout(() => location.reload(), 1000);
      } else {
        showToast(result.message || '打卡失败', 'error');
        btn.disabled = false;
        btn.textContent = '完成阅读，立即打卡';
      }
    }

    // 新增：加载课后练习问题
    async function loadQuestions(contentId) {
      try {
        const res = await fetch('/api/content/questions', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ contentId })
        });
        const result = await res.json();
        
        if (result.success && result.questions && result.questions.length > 0) {
          currentQuestions = result.questions;
          renderQuestions(result.questions);
          document.getElementById('qna-section').style.display = 'block';
        }
      } catch (e) {
        console.error('加载问题失败', e);
      }
    }

    // 修复：渲染问题列表，正确显示问题内容
    function renderQuestions(questions) {
      const container = document.getElementById('questions-list');
      
      container.innerHTML = questions.map((q, index) => `
        <div class="question-item">
          <div class="question-header">
            ${index + 1}. ${q.question}
            <span class="question-type">${getQuestionTypeName(q.type)}</span>
          </div>
          
          ${q.type === 'choice' && q.options ? `
            <div class="options-list">
              ${q.options.map((opt, optIndex) => `
                <label class="option-label">
                  <input type="radio" name="q-${q.id}" value="${opt}" id="opt-${q.id}-${optIndex}">
                  <span>${String.fromCharCode(65 + optIndex)}. ${opt}</span>
                </label>
              `).join('')}
            </div>
          ` : ''}
          
          <textarea 
            class="answer-textarea" 
            id="answer-${q.id}" 
            placeholder="请输入您的答案..."
          ></textarea>
          
          <button class="submit-answer-btn" onclick="submitAnswer('${q.id}')" id="btn-${q.id}">
            提交答案
          </button>
          
          <div id="status-${q.id}"></div>
        </div>
      `).join('');
      
      // 检查每道题的已回答状态
      questions.forEach(q => checkAnswerStatus(q.id));
    }

    function getQuestionTypeName(type) {
      const map = { short_answer: '简答', sentence: '造句', choice: '选择' };
      return map[type] || '问答';
    }

    // 修复：检查答案状态，正确获取元素
    async function checkAnswerStatus(questionId) {
      try {
        const res = await fetch('/api/question/my-answer', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ questionId, nickname: currentUser.nickname })
        });
        const result = await res.json();
        
        if (result.success && result.answered) {
          const textarea = document.getElementById(`answer-${questionId}`);
          const btn = document.getElementById(`btn-${questionId}`);
          const statusDiv = document.getElementById(`status-${questionId}`);
          
          if (textarea) {
            textarea.value = result.answer.answer;
            textarea.disabled = true;
          }
          if (btn) {
            btn.disabled = true;
            btn.textContent = '已提交';
          }
          
          if (statusDiv) {
            if (result.answer.score !== null) {
              statusDiv.innerHTML = `
                <div class="answer-status submitted">
                  ✓ 已评分：<strong>${result.answer.score}分</strong>
                  ${result.answer.feedback ? `<br>评语：${result.answer.feedback}` : ''}
                </div>
              `;
            } else {
              statusDiv.innerHTML = `
                <div class="answer-status pending">
                  ⏳ 待教师评分
                </div>
              `;
            }
          }
        }
      } catch (e) {
        console.error('检查状态失败', e);
      }
    }

    // 修复：提交答案，正确获取元素
    async function submitAnswer(questionId) {
      const textarea = document.getElementById(`answer-${questionId}`);
      let answer = textarea ? textarea.value.trim() : '';
      
      // 如果是选择题，获取选中的选项
      const radioSelected = document.querySelector(`input[name="q-${questionId}"]:checked`);
      if (radioSelected) {
        answer = radioSelected.value + (answer ? '\n' + answer : '');
      }
      
      if (!answer) {
        alert('请输入答案');
        return;
      }
      
      try {
        const res = await fetch('/api/question/submit', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            contentId: currentArticleId,
            questionId: questionId,
            nickname: currentUser.nickname,
            answer: answer
          })
        });
        const result = await res.json();
        
        if (result.success) {
          showToast('提交成功！');
          checkAnswerStatus(questionId);
        } else {
          alert(result.message || '提交失败');
        }
      } catch (e) {
        alert('提交失败，请重试');
      }
    }

    // 修改 init 函数逻辑 - 始终加载最新内容，根据打卡状态控制按钮
async function init() {
  // 1. 先获取最新内容（始终显示最新文章）
  const contentResult = await getTodayContent();
  
  if (contentResult.success && contentResult.content) {
    const content = contentResult.content;
    currentArticleId = content.id;
    
    // 渲染内容（不管是否已打卡都显示内容）
    renderContent(content);
    
    // 2. 检查今日打卡状态，控制按钮
    const statusResult = await checkTodayStatus();
    if (statusResult.success && statusResult.hasCheckedIn) {
      // 已打卡：修改按钮为"已完成"状态
      const btn = document.querySelector('.checkin-btn');
      if (btn) {
        btn.textContent = '✓ 今日已完成阅读打卡';
        btn.disabled = true;
        btn.style.background = '#52c41a'; // 绿色表示已完成
        btn.style.cursor = 'default';
      }
      
      // 可选：显示之前打卡的记录信息
      if (statusResult.record) {
        const infoDiv = document.createElement('div');
        infoDiv.style.cssText = 'margin-top:15px;padding:10px;background:#f6ffed;border-radius:6px;color:#52c41a;font-size:14px;text-align:center;';
        infoDiv.innerHTML = `您今日已打卡《${statusResult.record.articleTitle || '文章'}》，可以阅读新材料但不可重复打卡`;
        document.querySelector('.article-card').appendChild(infoDiv);
      }
    }
    // 3. 加载课后练习（如果有）
    loadQuestions(content.id);
  } else {
    // 没有可用内容
    renderNoContent();
  }
}

// 修改 renderContent 函数 - 移除打卡按钮的 onclick 绑定，改为在 init 中控制
function renderContent(content) {
  const contentArea = document.getElementById('content-area');
  
  if (!content) {
    renderNoContent();
    return;
  }

  contentArea.innerHTML = `
    <div class="card">
      <div class="article-card">
        <div class="article-title">${content.title}</div>
        <div class="article-content">${content.content}</div>
        <div class="word-count">字数：${content.wordCount || content.content.length}</div>
      </div>
      <button class="checkin-btn" id="checkinBtn">
        完成阅读，立即打卡
      </button>
    </div>
  `;
  
  // 绑定点击事件
  document.getElementById('checkinBtn').addEventListener('click', () => {
    handleCheckin(content.title, content.wordCount || content.content.length);
  });
}

// 新增：没有内容时的显示
function renderNoContent() {
  document.getElementById('content-area').innerHTML = `
    <div class="card no-content">
      <div class="no-content-icon">📚</div>
      <h3>暂无阅读内容</h3>
      <p>请联系老师添加阅读材料</p>
    </div>
  `;
}

// 修改 renderCheckedIn 函数（现在只在特殊情况下使用，比如想专门查看打卡记录）
function renderCheckedIn(record) {
  // 这个函数现在可以保留，用于可能需要的"查看今日打卡详情"功能
  // 但主流程不再默认使用它
  console.log('今日已打卡记录:', record);
}


    init();
  </script>
</body>
</html>
