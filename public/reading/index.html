<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>阅读打卡 - TypeReading Hub</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --primary: #667eea;
  --primary-dark: #764ba2;
  --bg-gradient-start: #667eea;
  --bg-gradient-end: #764ba2;
  --card-bg: #fff;
  --text: #333;
  --text-secondary: #666;
  --border: #e8e8e8;
  --success: #52c41a;
  --warning: #faad14;
}

html {
  font-size: 16px;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
  background: linear-gradient(135deg, var(--bg-gradient-start) 0%, var(--bg-gradient-end) 100%);
  min-height: 100vh;
  padding: 15px;
  color: var(--text);
  line-height: 1.6;
}

.container {
  max-width: 100%;
  margin: 0 auto;
}

/* 头部导航 */
.header {
  background: var(--card-bg);
  border-radius: 12px;
  padding: 15px 20px;
  margin-bottom: 15px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  box-shadow: 0 4px 20px rgba(0,0,0,0.1);
}

.header h1 {
  color: var(--text);
  font-size: 20px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.back-btn {
  color: var(--primary);
  text-decoration: none;
  font-weight: 500;
  font-size: 15px;
  padding: 8px 12px;
  border-radius: 8px;
  transition: background 0.2s;
}

.back-btn:active {
  background: #f0f5ff;
}

/* 卡片基础样式 */
.card {
  background: var(--card-bg);
  border-radius: 12px;
  padding: 20px;
  margin-bottom: 15px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.1);
}

/* 加载状态 */
.loading {
  text-align: center;
  color: var(--text-secondary);
  padding: 40px;
  font-size: 15px;
}

/* 已打卡状态 */
.checked-in {
  text-align: center;
  padding: 30px 20px;
}

.checked-in-icon {
  font-size: 56px;
  margin-bottom: 15px;
}

.checked-in h2 {
  color: var(--text);
  margin-bottom: 10px;
  font-size: 22px;
}

.checked-in p {
  color: var(--text-secondary);
  margin-bottom: 20px;
  font-size: 15px;
}

/* 统计网格 */
.stats-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 12px;
  margin-top: 20px;
}

.stat-item {
  background: #f8f9fa;
  padding: 18px 15px;
  border-radius: 10px;
  text-align: center;
}

.stat-value {
  font-size: 28px;
  font-weight: bold;
  color: var(--primary);
  line-height: 1.2;
}

.stat-label {
  color: var(--text-secondary);
  font-size: 13px;
  margin-top: 6px;
}

/* 文章卡片 */
.article-card {
  background: #f8f9fa;
  border-radius: 10px;
  padding: 20px;
  margin-bottom: 15px;
}

.article-title {
  font-size: 18px;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 12px;
  line-height: 1.4;
}

.article-content {
  color: #555;
  line-height: 1.9;
  font-size: 16px;
  white-space: pre-wrap;
}

.word-count {
  color: #999;
  font-size: 13px;
  margin-top: 15px;
  text-align: right;
}

/* 打卡按钮 */
.checkin-btn {
  width: 100%;
  padding: 16px;
  background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
  color: white;
  border: none;
  border-radius: 12px;
  font-size: 17px;
  font-weight: 600;
  cursor: pointer;
  transition: transform 0.2s, box-shadow 0.2s;
  min-height: 56px;
}

.checkin-btn:active {
  transform: scale(0.98);
}

.checkin-btn:disabled {
  background: #ccc;
  cursor: not-allowed;
  transform: none;
  box-shadow: none;
}

/* 无内容状态 */
.no-content {
  text-align: center;
  padding: 50px 20px;
  color: var(--text-secondary);
}

.no-content-icon {
  font-size: 48px;
  margin-bottom: 15px;
}

.no-content h3 {
  color: var(--text);
  margin-bottom: 8px;
  font-size: 18px;
}

/* Toast 提示 */
.toast {
  position: fixed;
  top: 20px;
  right: 20px;
  padding: 14px 22px;
  border-radius: 10px;
  color: white;
  font-weight: 500;
  z-index: 1000;
  animation: slideIn 0.3s ease;
  font-size: 14px;
  max-width: 80%;
  word-break: break-all;
}

.toast.success { background: var(--success); }
.toast.error { background: #ff4d4f; }

@keyframes slideIn {
  from { transform: translateX(100%); opacity: 0; }
  to { transform: translateX(0); opacity: 1; }
}

/* 课后练习区域 */
.qna-section {
  display: none;
  margin-top: 0;
}

.qna-title {
  font-size: 17px;
  color: var(--text);
  margin-bottom: 18px;
  padding-bottom: 12px;
  border-bottom: 2px solid var(--primary);
  display: flex;
  align-items: center;
  gap: 8px;
  font-weight: 600;
}

.question-item {
  background: #f8f9fa;
  border-radius: 10px;
  padding: 18px;
  margin-bottom: 15px;
  border-left: 3px solid var(--primary);
}

.question-header {
  font-weight: 600;
  color: var(--text);
  margin-bottom: 12px;
  font-size: 15px;
  line-height: 1.5;
}

.question-type {
  background: #e6f7ff;
  color: #1890ff;
  padding: 3px 10px;
  border-radius: 4px;
  font-size: 12px;
  margin-left: 8px;
  font-weight: normal;
  white-space: nowrap;
}

.options-list {
  margin: 12px 0;
}

.option-label {
  display: block;
  padding: 12px;
  margin: 8px 0;
  cursor: pointer;
  border-radius: 8px;
  transition: background 0.2s;
  background: white;
  border: 1px solid var(--border);
  font-size: 15px;
}

.option-label:active {
  background: #e6f7ff;
  border-color: var(--primary);
}

.option-label input[type="radio"] {
  margin-right: 10px;
}

.answer-textarea {
  width: 100%;
  padding: 14px;
  border: 1px solid var(--border);
  border-radius: 10px;
  min-height: 120px;
  resize: vertical;
  font-family: inherit;
  font-size: 15px;
  margin-top: 12px;
  line-height: 1.6;
}

.answer-textarea:focus {
  outline: none;
  border-color: var(--primary);
}

.submit-answer-btn {
  background: var(--primary);
  color: white;
  border: none;
  padding: 12px 28px;
  border-radius: 10px;
  cursor: pointer;
  font-size: 15px;
  margin-top: 12px;
  font-weight: 500;
  min-height: 44px;
}

.submit-answer-btn:active {
  background: var(--primary-dark);
}

.submit-answer-btn:disabled {
  background: #ccc;
  cursor: not-allowed;
}

.answer-status {
  margin-top: 12px;
  padding: 12px;
  border-radius: 8px;
  font-size: 14px;
}

.answer-status.submitted {
  background: #f6ffed;
  color: var(--success);
}

.answer-status.pending {
  background: #fff7e6;
  color: #fa8c16;
}

        /* 会员限制提示 */
    .membership-lock {
      background: #fff7e6;
      border: 1px dashed #ffd591;
      border-radius: 10px;
      padding: 20px;
      margin-top: 15px;
      text-align: center;
    }
    .membership-lock p {
      color: #d46b08;
      font-size: 14px;
      margin-bottom: 12px;
    }
    .membership-lock .btn {
      padding: 10px 24px;
      font-size: 14px;
    }
    
    /* 禁用状态的题目 */
    .question-item.locked {
      opacity: 0.7;
    }
    .question-item.locked .answer-textarea {
      background: #f5f5f5;
      cursor: not-allowed;
    }

/* ==================== Pad 适配 ==================== */

@media (min-width: 768px) {
  body {
    padding: 25px;
  }
  
  .container {
    max-width: 800px;
  }
  
  .header {
    padding: 20px 30px;
    border-radius: 16px;
    margin-bottom: 25px;
  }
  
  .header h1 {
    font-size: 24px;
  }
  
  .card {
    padding: 30px;
    border-radius: 16px;
    margin-bottom: 25px;
  }
  
  .article-title {
    font-size: 22px;
  }
  
  .article-content {
    font-size: 18px;
    line-height: 2;
  }
  
  .stats-grid {
    grid-template-columns: repeat(4, 1fr);
    gap: 15px;
  }
  
  .stat-value {
    font-size: 32px;
  }
  
  .question-item {
    padding: 25px;
  }
  
  .qna-title {
    font-size: 20px;
  }
}

@media (min-width: 1024px) {
  .container {
    max-width: 1000px;
  }
  
  .article-content {
    font-size: 19px;
    line-height: 2.2;
  }
}

/* 横屏手机优化 */
@media (max-height: 500px) and (orientation: landscape) {
  body {
    padding: 10px;
  }
  
  .header {
    padding: 12px 20px;
    margin-bottom: 10px;
  }
  
  .card {
    padding: 15px;
    margin-bottom: 10px;
  }
  
  .article-content {
    font-size: 15px;
    line-height: 1.7;
  }
}

/* 暗黑模式 */
@media (prefers-color-scheme: dark) {
  :root {
    --card-bg: #2a2a3a;
    --text: #e8e8e8;
    --text-secondary: #a0a0a0;
    --border: #3a3a50;
  }
  
  body {
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
  }
  
  .article-card,
  .question-item,
  .stat-item {
    background: #323248;
  }
  
  .article-content {
    color: #c8c8d0;
  }
}
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>📖 阅读打卡</h1>
      <a href="/" class="back-btn">← 返回首页</a>
    </div>
    <div id="content-area">
      <div class="card loading">加载中...</div>
    </div>
    <!-- 新增：课后练习区域（初始隐藏，有内容时显示） -->
    <div id="qna-section" class="card qna-section">
      <div class="qna-title">📝 课后练习</div>
      <div id="questions-list"></div>
    </div>
  </div>

  <script>
    const currentUser = JSON.parse(localStorage.getItem('currentUser') || '{}');
    const isLoggedIn = currentUser && currentUser.nickname;
    const membership = isLoggedIn ? (currentUser.membership || { type: 'basic' }) : { type: 'anonymous' };
    const canAnswer = isLoggedIn && membership.type === 'premium' && !(membership.expiresAt && new
    Date().toISOString().split('T')[0] > membership.expiresAt);

    // 全局变量保存当前文章信息
    let currentArticleId = null;
    let currentQuestions = [];

    function showToast(message, type = 'success') {
      const toast = document.createElement('div');
      toast.className = `toast ${type}`;
      toast.textContent = message;
      document.body.appendChild(toast);
      setTimeout(() => toast.remove(), 3000);
    }

function getTodayString() {
  const now = new Date();
  const year = now.getFullYear();
  const month = String(now.getMonth() + 1).padStart(2, '0');
  const day = String(now.getDate()).padStart(2, '0');
  return year + "-" + month + "-" + day;  // ✅ 请确认这行
  }

    // 关键修复：检查打卡状态时传递客户端日期
    async function checkTodayStatus() {
      try {
        const response = await fetch('/api/checkin/status', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ 
            nickname: currentUser.nickname,
            date: getTodayString() // 关键：传递本地日期
          })
        });
        return await response.json();
      } catch (err) {
        console.error('检查状态失败:', err);
        return { success: false, hasCheckedIn: false };
      }
    }

    async function getTodayContent() {
      try {
        const response = await fetch('/api/content/reading', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ className: currentUser.className || '' })
        });
        return await response.json();
      } catch (err) {
        return { success: false, content: null };
      }
    }

    // 关键修复：打卡时传递 articleId 和 date
    async function doCheckin(articleId, articleTitle, wordCount) {
      try {
        const response = await fetch('/api/checkin/reading', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            nickname: currentUser.nickname,
            articleId: articleId,        // 传递文章ID
            articleTitle: articleTitle,
            wordCount: wordCount,
            date: getTodayString()        // 传递本地日期
          })
        });
        return await response.json();
      } catch (err) {
        console.error('打卡失败:', err);
        return { success: false, message: '网络错误' };
      }
    }

    // 修复：渲染已打卡状态，正确显示文章信息
    function renderCheckedIn(record) {
      document.getElementById('content-area').innerHTML = `
        <div class="card checked-in">
          <div class="checked-in-icon">✅</div>
          <h2>今日已完成阅读打卡</h2>
          <p>文章：《${record.articleTitle || '未命名文章'}》</p>
          <div class="stats-grid">
            <div class="stat-item">
              <div class="stat-value">${record.wordCount || 0}</div>
              <div class="stat-label">阅读字数</div>
            </div>
            <div class="stat-item">
              <div class="stat-value">1</div>
              <div class="stat-label">打卡次数</div>
            </div>
          </div>
        </div>
      `;
      // 已打卡也加载问题（显示已提交状态）
      if (currentArticleId) {
        loadQuestions(currentArticleId);
      }
    }

    // 修复：渲染文章内容，正确传递参数
    function renderContent(content) {
      const contentArea = document.getElementById('content-area');
      
      if (!content) {
        contentArea.innerHTML = `
          <div class="card no-content">
            <div class="no-content-icon">📚</div>
            <h3>暂无阅读内容</h3>
            <p>请联系老师添加阅读材料</p>
          </div>
        `;
        return;
      }

      // 保存文章ID
      currentArticleId = content.id;
      contentArea.innerHTML = `
        <div class="card">
          <div class="article-card">
            <div class="article-title">${content.title}</div>
            <div class="article-content">${content.content}</div>
            <div class="word-count">字数：${content.wordCount || content.content.length}</div>
          </div>
          <button class="checkin-btn" onclick="handleCheckin('${content.title.replace(/'/g, "\\'")}', ${content.wordCount || content.content.length})" disabled>
            完成阅读，立即打卡
          </button>
        </div>
      `;
      
      // 新增：加载课后练习问题
      loadQuestions(content.id);
    }

    // 关键修复：使用保存的 articleId
    async function handleCheckin(title, wordCount) {
    if (!isLoggedIn) {
    showToast('请先登录后再打卡', 'error');
    window.location.href = '/register/';
    return;  }
      
      const btn = document.querySelector('.checkin-btn');
      btn.disabled = true;
      btn.textContent = '打卡中...';

      // 使用全局保存的 articleId
      const result = await doCheckin(currentArticleId, title, wordCount);
      
      if (result.success) {
        showToast('打卡成功！', 'success');
        setTimeout(() => location.reload(), 1000);
      } else {
        showToast(result.message || '打卡失败', 'error');
        btn.disabled = false;
        btn.textContent = '完成阅读，立即打卡';
      }
    }

    // 新增：加载课后练习问题
    async function loadQuestions(contentId) {
      try {
        const res = await fetch('/api/content/questions', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ contentId })
        });
        const result = await res.json();
        
        if (result.success && result.questions && result.questions.length > 0) {
          currentQuestions = result.questions;
          renderQuestions(result.questions);
          document.getElementById('qna-section').style.display = 'block';
        }
      } catch (e) {
        console.error('加载问题失败', e);
      }
    }

    // 修复：渲染问题列表，正确显示问题内容
    function renderQuestions(questions) {
      const container = document.getElementById('questions-list');
      
      // 获取当前用户会员状态
      const currentUser = JSON.parse(localStorage.getItem('currentUser') || '{}');
      const membership = currentUser.membership || { type: 'basic' };
      const isPremium = membership.type === 'premium';
      const isExpired = isPremium && membership.expiresAt && new Date().toISOString().split('T')[0] > membership.expiresAt;
      const canAnswer = isPremium && !isExpired;
      
      container.innerHTML = questions.map((q, index) => {
        const lockedClass = canAnswer ? '' : 'locked';
        const disabledAttr = canAnswer ? '' : 'disabled';
        
        return `
        <div class="question-item ${lockedClass}">
          <div class="question-header">
            ${index + 1}. ${q.question}
            <span class="question-type">${getQuestionTypeName(q.type)}</span>
          </div>
          
          ${q.type === 'choice' ? `
            <div class="options-list">
              ${q.options.map((opt, i) => `
                <label class="option-label">
                  <input type="radio" name="q-${q.id}" value="${String.fromCharCode(65 + i)}" 
                    ${canAnswer ? '' : 'disabled'}>
                  <span>${String.fromCharCode(65 + i)}. ${opt}</span>
                </label>
              `).join('')}
            </div>
          ` : ''}
          
          <textarea 
            class="answer-textarea" 
            id="answer-${q.id}" 
            placeholder="${canAnswer ? '请输入您的答案...' : '开通会员后可作答'}"
            ${canAnswer ? '' : 'disabled'}
          ></textarea>
          
          ${canAnswer ? `
            <button class="submit-answer-btn" onclick="submitAnswer('${q.id}')" id="btn-${q.id}">
              提交答案
            </button>
          ` : '
            <button class="submit-answer-btn" disabled style="background: #ccc; cursor: not-allowed;">
            提交答案
            </button>
            '}
          
          <div id="status-${q.id}"></div>
        </div>
      `}).join('');
      
      // 添加会员限制提示（普通会员）
      if (!canAnswer) {
        container.innerHTML += `
          <div class="membership-lock">
            <p>🔒 您是${isExpired ? '已过期的' : '普通'}会员，可查看题目但无法作答</p>
            <p style="font-size: 12px; color: #999;">请联系老师开通高级会员，获得完整学习体验</p>
          </div>
        `;
      }
      
      // 已提交状态检查（仅高级会员）
      if (canAnswer) {
        questions.forEach(q => checkAnswerStatus(q.id));
      }
    }

    function getQuestionTypeName(type) {
      const map = { short_answer: '简答', sentence: '造句', choice: '选择' };
      return map[type] || '问答';
    }

    // 修复：检查答案状态，正确获取元素
    async function checkAnswerStatus(questionId) {
      try {
        const res = await fetch('/api/question/my-answer', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ questionId, nickname: currentUser.nickname })
        });
        const result = await res.json();
        
        if (result.success && result.answered) {
          const textarea = document.getElementById(`answer-${questionId}`);
          const btn = document.getElementById(`btn-${questionId}`);
          const statusDiv = document.getElementById(`status-${questionId}`);
          
          if (textarea) {
            textarea.value = result.answer.answer;
            textarea.disabled = true;
          }
          if (btn) {
            btn.disabled = true;
            btn.textContent = '已提交';
          }
          
          if (statusDiv) {
            if (result.answer.score !== null) {
              statusDiv.innerHTML = `
                <div class="answer-status submitted">
                  ✓ 已评分：<strong>${result.answer.score}分</strong>
                  ${result.answer.feedback ? `<br>评语：${result.answer.feedback}` : ''}
                </div>
              `;
            } else {
              statusDiv.innerHTML = `
                <div class="answer-status pending">
                  ⏳ 待教师评分
                </div>
              `;
            }
          }
        }
      } catch (e) {
        console.error('检查状态失败', e);
      }
    }

    // 修复：提交答案，正确获取元素
    async function submitAnswer(questionId) {
      const textarea = document.getElementById(`answer-${questionId}`);
      let answer = textarea ? textarea.value.trim() : '';
      
      // 如果是选择题，获取选中的选项
      const radioSelected = document.querySelector(`input[name="q-${questionId}"]:checked`);
      if (radioSelected) {
        answer = radioSelected.value + (answer ? '\n' + answer : '');
      }
      
      if (!answer) {
        alert('请输入答案');
        return;
      }
      
      try {
        const res = await fetch('/api/question/submit', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            contentId: currentArticleId,
            questionId: questionId,
            nickname: currentUser.nickname,
            answer: answer
          })
        });
        const result = await res.json();
        
        if (result.success) {
          showToast('提交成功！');
          checkAnswerStatus(questionId);
        } else {
          alert(result.message || '提交失败');
        }
      } catch (e) {
        alert('提交失败，请重试');
      }
    }

    // 修改 init 函数逻辑 - 始终加载最新内容，根据打卡状态控制按钮
async function init() {
  // 1. 先获取最新内容（始终显示最新文章）
  const contentResult = await getTodayContent();
  
  if (contentResult.success && contentResult.content) {
    const content = contentResult.content;
    currentArticleId = content.id;
    
    // 渲染内容（不管是否已打卡都显示内容）
    renderContent(content);
    
    // 2. 检查今日打卡状态，控制按钮
    const statusResult = await checkTodayStatus();
    if (statusResult.success && statusResult.hasCheckedIn) {
      // 已打卡：修改按钮为"已完成"状态
      const btn = document.querySelector('.checkin-btn');
      if (btn) {
        btn.textContent = '✓ 今日已完成阅读打卡';
        btn.disabled = true;
        btn.style.background = '#52c41a'; // 绿色表示已完成
        btn.style.cursor = 'default';
      }
      
      // 可选：显示之前打卡的记录信息
      if (statusResult.record) {
        const infoDiv = document.createElement('div');
        infoDiv.style.cssText = 'margin-top:15px;padding:10px;background:#f6ffed;border-radius:6px;color:#52c41a;font-size:14px;text-align:center;';
        infoDiv.innerHTML = `您今日已打卡《${statusResult.record.articleTitle || '文章'}》，可以阅读新材料但不可重复打卡`;
        document.querySelector('.article-card').appendChild(infoDiv);
      }
    }
    // 3. 加载课后练习（如果有）
    loadQuestions(content.id);
  } else {
    // 没有可用内容
    renderNoContent();
  }
}

// 修改 renderContent 函数 - 移除打卡按钮的 onclick 绑定，改为在 init 中控制
function renderContent(content) {
  const contentArea = document.getElementById('content-area');
  
  if (!content) {
    renderNoContent();
    return;
  }

  contentArea.innerHTML = `
    <div class="card">
      <div class="article-card">
        <div class="article-title">${content.title}</div>
        <div class="article-content">${content.content}</div>
        <div class="word-count">字数：${content.wordCount || content.content.length}</div>
      </div>
      <button class="checkin-btn" id="checkinBtn">
        完成阅读，立即打卡
      </button>
    </div>
  `;
  
  // 绑定点击事件
  document.getElementById('checkinBtn').addEventListener('click', () => {
    handleCheckin(content.title, content.wordCount || content.content.length);
  });
}

// 新增：没有内容时的显示
function renderNoContent() {
  document.getElementById('content-area').innerHTML = `
    <div class="card no-content">
      <div class="no-content-icon">📚</div>
      <h3>暂无阅读内容</h3>
      <p>请联系老师添加阅读材料</p>
    </div>
  `;
}

// 修改 renderCheckedIn 函数（现在只在特殊情况下使用，比如想专门查看打卡记录）
function renderCheckedIn(record) {
  // 这个函数现在可以保留，用于可能需要的"查看今日打卡详情"功能
  // 但主流程不再默认使用它
  console.log('今日已打卡记录:', record);
}


    init();
  </script>
