<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>阅读打卡 - TypeReading Hub</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --primary: #667eea;
  --primary-dark: #764ba2;
  --bg-gradient-start: #667eea;
  --bg-gradient-end: #764ba2;
  --card-bg: #fff;
  --text: #333;
  --text-secondary: #666;
  --border: #e8e8e8;
  --success: #52c41a;
  --warning: #faad14;
}

html {
  font-size: 16px;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
  background: linear-gradient(135deg, var(--bg-gradient-start) 0%, var(--bg-gradient-end) 100%);
  min-height: 100vh;
  padding: 15px;
  color: var(--text);
  line-height: 1.6;
}

.container {
  max-width: 100%;
  margin: 0 auto;
}

/* 头部导航 */
.header {
  background: var(--card-bg);
  border-radius: 12px;
  padding: 15px 20px;
  margin-bottom: 15px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  box-shadow: 0 4px 20px rgba(0,0,0,0.1);
}

.header h1 {
  color: var(--text);
  font-size: 20px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.back-btn {
  color: var(--primary);
  text-decoration: none;
  font-weight: 500;
  font-size: 15px;
  padding: 8px 12px;
  border-radius: 8px;
  transition: background 0.2s;
}

.back-btn:active {
  background: #f0f5ff;
}

/* 卡片基础样式 */
.card {
  background: var(--card-bg);
  border-radius: 12px;
  padding: 20px;
  margin-bottom: 15px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.1);
}

/* 加载状态 */
.loading {
  text-align: center;
  color: var(--text-secondary);
  padding: 40px;
  font-size: 15px;
}

/* 已打卡状态 */
.checked-in {
  text-align: center;
  padding: 30px 20px;
}

.checked-in-icon {
  font-size: 56px;
  margin-bottom: 15px;
}

.checked-in h2 {
  color: var(--text);
  margin-bottom: 10px;
  font-size: 22px;
}

.checked-in p {
  color: var(--text-secondary);
  margin-bottom: 20px;
  font-size: 15px;
}

/* 统计网格 */
.stats-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 12px;
  margin-top: 20px;
}

.stat-item {
  background: #f8f9fa;
  padding: 18px 15px;
  border-radius: 10px;
  text-align: center;
}

.stat-value {
  font-size: 28px;
  font-weight: bold;
  color: var(--primary);
  line-height: 1.2;
}

.stat-label {
  color: var(--text-secondary);
  font-size: 13px;
  margin-top: 6px;
}

/* 文章卡片 */
.article-card {
  background: #f8f9fa;
  border-radius: 10px;
  padding: 20px;
  margin-bottom: 15px;
}

.article-title {
  font-size: 18px;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 12px;
  line-height: 1.4;
}

.article-content {
  color: #555;
  line-height: 1.9;
  font-size: 16px;
  white-space: pre-wrap;
}

.word-count {
  color: #999;
  font-size: 13px;
  margin-top: 15px;
  text-align: right;
}

/* 打卡按钮 */
.checkin-btn {
  width: 100%;
  padding: 16px;
  background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
  color: white;
  border: none;
  border-radius: 12px;
  font-size: 17px;
  font-weight: 600;
  cursor: pointer;
  transition: transform 0.2s, box-shadow 0.2s;
  min-height: 56px;
}

.checkin-btn:active {
  transform: scale(0.98);
}

.checkin-btn:disabled {
  background: #ccc;
  cursor: not-allowed;
  transform: none;
  box-shadow: none;
}

/* 无内容状态 */
.no-content {
  text-align: center;
  padding: 50px 20px;
  color: var(--text-secondary);
}

.no-content-icon {
  font-size: 48px;
  margin-bottom: 15px;
}

.no-content h3 {
  color: var(--text);
  margin-bottom: 8px;
  font-size: 18px;
}

/* Toast 提示 */
.toast {
  position: fixed;
  top: 20px;
  right: 20px;
  padding: 14px 22px;
  border-radius: 10px;
  color: white;
  font-weight: 500;
  z-index: 1000;
  animation: slideIn 0.3s ease;
  font-size: 14px;
  max-width: 80%;
  word-break: break-all;
}

.toast.success { background: var(--success); }
.toast.error { background: #ff4d4f; }

@keyframes slideIn {
  from { transform: translateX(100%); opacity: 0; }
  to { transform: translateX(0); opacity: 1; }
}

/* 课后练习区域 */
.qna-section {
  display: none;
  margin-top: 0;
}

.qna-title {
  font-size: 17px;
  color: var(--text);
  margin-bottom: 18px;
  padding-bottom: 12px;
  border-bottom: 2px solid var(--primary);
  display: flex;
  align-items: center;
  gap: 8px;
  font-weight: 600;
}

.question-item {
  background: #f8f9fa;
  border-radius: 10px;
  padding: 18px;
  margin-bottom: 15px;
  border-left: 3px solid var(--primary);
}

.question-header {
  font-weight: 600;
  color: var(--text);
  margin-bottom: 12px;
  font-size: 15px;
  line-height: 1.5;
}

.question-type {
  background: #e6f7ff;
  color: #1890ff;
  padding: 3px 10px;
  border-radius: 4px;
  font-size: 12px;
  margin-left: 8px;
  font-weight: normal;
  white-space: nowrap;
}

.options-list {
  margin: 12px 0;
}

.option-label {
  display: block;
  padding: 12px;
  margin: 8px 0;
  cursor: pointer;
  border-radius: 8px;
  transition: background 0.2s;
  background: white;
  border: 1px solid var(--border);
  font-size: 15px;
}

.option-label:active {
  background: #e6f7ff;
  border-color: var(--primary);
}

.option-label input[type="radio"] {
  margin-right: 10px;
}

.answer-textarea {
  width: 100%;
  padding: 14px;
  border: 1px solid var(--border);
  border-radius: 10px;
  min-height: 120px;
  resize: vertical;
  font-family: inherit;
  font-size: 15px;
  margin-top: 12px;
  line-height: 1.6;
}

.answer-textarea:focus {
  outline: none;
  border-color: var(--primary);
}

.submit-answer-btn {
  background: var(--primary);
  color: white;
  border: none;
  padding: 12px 28px;
  border-radius: 10px;
  cursor: pointer;
  font-size: 15px;
  margin-top: 12px;
  font-weight: 500;
  min-height: 44px;
}

.submit-answer-btn:active {
  background: var(--primary-dark);
}

.submit-answer-btn:disabled {
  background: #ccc;
  cursor: not-allowed;
}

.answer-status {
  margin-top: 12px;
  padding: 12px;
  border-radius: 8px;
  font-size: 14px;
}

.answer-status.submitted {
  background: #f6ffed;
  color: var(--success);
}

.answer-status.pending {
  background: #fff7e6;
  color: #faad14;
}

        /* 会员限制提示 */
    .membership-lock {
      background: #fff7e6;
      border: 1px dashed #ffd591;
      border-radius: 10px;
      padding: 20px;
      margin-top: 15px;
      text-align: center;
    }
    .membership-lock p {
      color: #d46b08;
      font-size: 14px;
      margin-bottom: 12px;
    }
    .membership-lock .btn {
      padding: 10px 24px;
      font-size: 14px;
    }
    
    /* 禁用状态的题目 */
    .question-item.locked {
      opacity: 0.7;
    }
    .question-item.locked .answer-textarea {
      background: #f5f5f5;
      cursor: not-allowed;
    }

/* ==================== 计时器样式（新增）==================== */
.timer-section {
  background: linear-gradient(135deg, #f0f5ff 0%, #e6f7ff 100%);
  border: 2px solid var(--primary);
  border-radius: 12px;
  padding: 15px 20px;
  margin-bottom: 15px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-wrap: wrap;
  gap: 10px;
}

.timer-display {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 18px;
  font-weight: 600;
  color: var(--primary);
}

.timer-icon {
  font-size: 24px;
}

.timer-status {
  font-size: 13px;
  color: var(--text-secondary);
  font-weight: normal;
}

.timer-controls {
  display: flex;
  gap: 10px;
}

.timer-btn {
  padding: 10px 20px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  font-size: 14px;
  font-weight: 500;
  transition: all 0.2s;
  min-height: 40px;
}

.timer-btn.pause {
  background: #faad14;
  color: white;
}

.timer-btn.pause:hover {
  background: #d48806;
}

.timer-btn.resume {
  background: var(--primary);
  color: white;
}

.timer-btn.resume:hover {
  background: var(--primary-dark);
}

.timer-btn:disabled {
  background: #ccc;
  cursor: not-allowed;
  opacity: 0.6;
}

.timer-btn.hidden {
  display: none;
}

/* ==================== Pad 适配 ==================== */

@media (min-width: 768px) {
  body {
    padding: 25px;
  }
  
  .container {
    max-width: 800px;
  }
  
  .header {
    padding: 20px 30px;
    border-radius: 16px;
    margin-bottom: 25px;
  }
  
  .header h1 {
    font-size: 24px;
  }
  
  .card {
    padding: 30px;
    border-radius: 16px;
    margin-bottom: 25px;
  }
  
  .article-title {
    font-size: 22px;
  }
  
  .article-content {
    font-size: 18px;
    line-height: 2;
  }
  
  .stats-grid {
    grid-template-columns: repeat(4, 1fr);
    gap: 15px;
  }
  
  .stat-value {
    font-size: 32px;
  }
  
  .question-item {
    padding: 25px;
  }
  
  .qna-title {
    font-size: 20px;
  }
  
  /* 计时器桌面样式 */
  .timer-section {
    padding: 20px 30px;
  }
  
  .timer-display {
    font-size: 24px;
  }
  
  .timer-icon {
    font-size: 32px;
  }
}

@media (min-width: 1024px) {
  .container {
    max-width: 1000px;
  }
  
  .article-content {
    font-size: 19px;
    line-height: 2.2;
  }
}

/* 横屏手机优化 */
@media (max-height: 500px) and (orientation: landscape) {
  body {
    padding: 10px;
  }
  
  .header {
    padding: 12px 20px;
    margin-bottom: 10px;
  }
  
  .card {
    padding: 15px;
    margin-bottom: 10px;
  }
  
  .article-content {
    font-size: 15px;
    line-height: 1.7;
  }
  
  .timer-section {
    padding: 12px 15px;
  }
  
  .timer-display {
    font-size: 16px;
  }
}

/* 暗黑模式 */
@media (prefers-color-scheme: dark) {
  :root {
    --card-bg: #2a2a3a;
    --text: #e8e8e8;
    --text-secondary: #a0a0a0;
    --border: #3a3a50;
  }
  
  body {
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
  }
  
  .article-card,
  .question-item,
  .stat-item {
    background: #323248;
  }
  
  .article-content {
    color: #c8c8d0;
  }
  
  .timer-section {
    background: linear-gradient(135deg, #1a2744 0%, #16213e 100%);
    border-color: var(--primary);
  }
}
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>📖 阅读打卡</h1>
      <a href="/" class="back-btn">← 返回首页</a>
    </div>
    <div id="content-area">
      <div class="card loading">加载中...</div>
    </div>
    <!-- 新增：课后练习区域（初始隐藏，有内容时显示） -->
    <div id="qna-section" class="card qna-section">
      <div class="qna-title">📝 课后练习</div>
      <div id="questions-list"></div>
    </div>
  </div>

  <script>
    const currentUser = JSON.parse(localStorage.getItem('currentUser') || '{}');
    const isLoggedIn = currentUser && currentUser.nickname;
    const membership = isLoggedIn ? (currentUser.membership || { type: 'basic' }) : { type: 'anonymous' };
    const canAnswer = isLoggedIn && membership.type === 'premium' && !(membership.expiresAt && new Date().toISOString().split('T')[0] > membership.expiresAt);

    // 全局变量保存当前文章信息
    let currentArticleId = null;
    let currentQuestions = [];

    // ==================== 阅读计时器对象（新增）====================
    let readingTimer = {
      startTime: null,
      elapsedTime: 0,
      isRunning: false,
      isPaused: false,
      hasStarted: false,
      intervalId: null,

      // 开始计时（页面加载后自动开始）
      start() {
        if (this.hasStarted) return;
        
        this.startTime = Date.now();
        this.isRunning = true;
        this.hasStarted = true;
        this.showTimerSection();
        this.tick();
        
        this.intervalId = setInterval(() => this.tick(), 1000);
      },

      // 暂停/继续切换
      togglePause() {
        if (!this.hasStarted) return;
        
        if (this.isPaused) {
          this.startTime = Date.now() - (this.elapsedTime * 1000);
          this.isPaused = false;
          this.isRunning = true;
          this.updatePauseButton(false);
        } else {
          this.isPaused = true;
          this.isRunning = false;
          this.updatePauseButton(true);
        }
      },

      tick() {
        if (!this.isRunning || this.isPaused) return;
        
        const now = Date.now();
        this.elapsedTime = Math.floor((now - this.startTime) / 1000);
        this.updateDisplay();
      },

      // 停止计时（打卡时调用）
      stop() {
        this.isRunning = false;
        if (this.intervalId) {
          clearInterval(this.intervalId);
          this.intervalId = null;
        }
        return this.elapsedTime;
      },

      // 重置
      reset() {
        this.stop();
        this.startTime = null;
        this.elapsedTime = 0;
        this.isRunning = false;
        this.isPaused = false;
        this.hasStarted = false;
        this.hideTimerSection();
        this.updateDisplay();
        this.updatePauseButton(false);
      },

      showTimerSection() {
        const timerSection = document.getElementById('timerSection');
        if (timerSection) timerSection.style.display = 'flex';
      },

      hideTimerSection() {
        const timerSection = document.getElementById('timerSection');
        if (timerSection) timerSection.style.display = 'none';
      },

      updateDisplay() {
        const minutes = Math.floor(this.elapsedTime / 60);
        const seconds = this.elapsedTime % 60;
        const timeStr = 
          String(minutes).padStart(2, '0') + ':' + 
          String(seconds).padStart(2, '0');
        
        const timerText = document.getElementById('timerText');
        const timerStatus = document.getElementById('timerStatus');
        
        if (timerText) timerText.textContent = timeStr;
        
        if (timerStatus) {
          if (this.isPaused) {
            timerStatus.textContent = '(已暂停)';
          } else if (this.isRunning) {
            timerStatus.textContent = '(阅读中)';
          } else {
            timerStatus.textContent = '';
          }
        }
      },

      updatePauseButton(isPaused) {
        const pauseBtn = document.getElementById('pauseBtn');
        const resumeBtn = document.getElementById('resumeBtn');
        
        if (pauseBtn && resumeBtn) {
          if (isPaused) {
            pauseBtn.classList.add('hidden');
            resumeBtn.classList.remove('hidden');
          } else {
            pauseBtn.classList.remove('hidden');
            resumeBtn.classList.add('hidden');
          }
        }
      }
    };

    // 全局暴露暂停切换函数
    window.togglePause = function() {
      readingTimer.togglePause();
    };

    function showToast(message, type = 'success') {
      const toast = document.createElement('div');
      toast.className = `toast `;
      toast.textContent = message;
      document.body.appendChild(toast);
      setTimeout(() => toast.remove(), 3000);
    }

    function getTodayString() {
      const now = new Date();
      const year = now.getFullYear();
      const month = String(now.getMonth() + 1).padStart(2, '0');
      const day = String(now.getDate()).padStart(2, '0');
      return year + "-" + month + "-" + day;
    }

    async function checkTodayStatus() {
      try {
        const response = await fetch('/api/checkin/status', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ 
            nickname: currentUser.nickname,
            date: getTodayString()
          })
        });
        return await response.json();
      } catch (err) {
        console.error('检查状态失败:', err);
        return { success: false, hasCheckedIn: false };
      }
    }

    async function getTodayContent() {
      try {
        const response = await fetch('/api/content/reading', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ className: currentUser.className || '' })
        });
        return await response.json();
      } catch (err) {
        return { success: false, content: null };
      }
    }

    // 修改：打卡时增加阅读时长
    async function doCheckin(articleId, articleTitle, wordCount) {
      try {
        // 停止计时并获取阅读时长
        const duration = readingTimer.stop();
        
        const response = await fetch('/api/checkin/reading', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            nickname: currentUser.nickname,
            articleId: articleId,
            articleTitle: articleTitle,
            wordCount: wordCount,
            duration: duration,           // 新增：阅读时长（秒）
            date: getTodayString()
          })
        });
        return await response.json();
      } catch (err) {
        console.error('打卡失败:', err);
        return { success: false, message: '网络错误' };
      }
    }

    function renderCheckedIn(record) {
      // 已打卡状态不显示计时器
      readingTimer.reset();
      
      document.getElementById('content-area').innerHTML = `
        <div class="card checked-in">
          <div class="checked-in-icon">✅</div>
          <h2>今日已完成阅读打卡</h2>
          <p>文章：《${record.articleTitle || ''}》</p>
          <div class="stats-grid">
            <div class="stat-item">
              <div class="stat-value">${record.wordCount || 0}</div>
              <div class="stat-label">阅读单词数</div>
            </div>
            <div class="stat-item">
              <div class="stat-value">${record.duration ? Math.floor(record.duration / 60) + ':' + String(record.duration % 60).padStart(2, '0') : '0:00'}</div>
              <div class="stat-label">阅读时长</div>
            </div>
            <div class="stat-item">
              <div class="stat-value">1</div>
              <div class="stat-label">打卡次数</div>
            </div>
          </div>
        </div>
      `;

      if (currentArticleId) {
        loadQuestions(currentArticleId);
      }
    }

    function renderContent(content) {
      const contentArea = document.getElementById('content-area');
      
      if (!content) {
        renderNoContent();
        return;
      }

      currentArticleId = content.id;
      
      contentArea.innerHTML = `
        <div class="card">
          <!-- 新增：计时器区域 -->
          <div class="timer-section" id="timerSection" style="display: none;">
            <div class="timer-display">
              <span class="timer-icon">⏱️</span>
              <span id="timerText">00:00</span>
              <span class="timer-status" id="timerStatus"></span>
            </div>
            <div class="timer-controls">
              <button class="timer-btn pause" id="pauseBtn" onclick="togglePause()">⏸️ 暂停</button>
              <button class="timer-btn resume hidden" id="resumeBtn" onclick="togglePause()">▶️ 继续</button>
            </div>
          </div>
          
          <div class="article-card">
            <div class="article-title">${content.title}</div>
            <div class="article-content">${content.content}</div>
            <div class="word-count">单词数：${content.wordCount || content.content.trim().split(/\s+/).filter(w => w.length > 0).length}</div>
          </div>
          <button class="checkin-btn" id="checkinBtn">
            完成阅读，立即打卡
          </button>
        </div>
      `;
      
      const checkinBtn = document.getElementById('checkinBtn');
      checkinBtn.addEventListener('click', () => {
        handleCheckin(content.title, content.wordCount || content.content.trim().split(/\s+/).filter(w => w.length > 0).length);
      });

      // 页面加载后自动开始计时
      if (isLoggedIn) {
        setTimeout(() => readingTimer.start(), 500);
      }
      
      loadQuestions(content.id);
    }

    async function handleCheckin(title, wordCount) {
      if (!isLoggedIn) {
        alert('请先登录后再使用此功能');    
        return;
      }
      
      const btn = document.querySelector('.checkin-btn');
      btn.disabled = true;
      btn.textContent = '打卡中...';

      const result = await doCheckin(currentArticleId, title, wordCount);
      
      if (result.success) {
        showToast('打卡成功！', 'success');
        setTimeout(() => location.reload(), 1000);
      } else {
        showToast(result.message || '打卡失败', 'error');
        btn.disabled = false;
        btn.textContent = '完成阅读，立即打卡';
      }
    }

    async function loadQuestions(contentId) {
      try {
        const res = await fetch('/api/content/questions', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ contentId })
        });
        const result = await res.json();
        
        if (result.success && result.questions && result.questions.length > 0) {
          currentQuestions = result.questions;
          renderQuestions(result.questions);
          document.getElementById('qna-section').style.display = 'block';
        }
      } catch (e) {
        console.error('加载问题失败', e);
      }
    }

    function renderQuestions(questions) {
      const container = document.getElementById('questions-list');
      
      const currentUser = JSON.parse(localStorage.getItem('currentUser') || '{}');
      const isLoggedIn = currentUser && currentUser.nickname;
      const membership = currentUser.membership || { type: 'basic' };
      const isPremium = membership.type === 'premium';
      const isExpired = isPremium && membership.expiresAt && new Date().toISOString().split('T')[0] > membership.expiresAt;
      const canAnswer = isLoggedIn && isPremium && !isExpired;
      
      container.innerHTML = questions.map((q, index) => {
        const lockedClass = canAnswer ? '' : 'locked';
        const disabledAttr = canAnswer ? '' : 'disabled';
        
        return `
          <div class="question-item ${lockedClass}">
            <div class="question-header">
              ${index + 1}. ${q.question}
              <span class="question-type">${getQuestionTypeName(q.type)}</span>
            </div>
            
            ${q.type === 'choice' && q.options ? `
              <div class="options-list">
                ${q.options.map((opt, i) => `
                  <label class="option-label">
                    <input type="radio" name="q-${q.id}" value="${opt}" ${disabledAttr}>
                    <span>${opt}</span>
                  </label>
                `).join('')}
              </div>
            ` : ''}
            
            <textarea 
              class="answer-textarea" 
              id="answer-${q.id}" 
              placeholder="请输入您的答案..."
              ${disabledAttr}
            ></textarea>
            
            ${canAnswer ? `
              <button class="submit-answer-btn" onclick="submitAnswer('${q.id}')" id="btn-${q.id}">
                提交答案
              </button>
            ` : `
              <button class="submit-answer-btn" disabled style="background: #ccc; cursor: not-allowed;">
                提交答案
              </button>
              <div class="membership-lock">
                <p>🔒 此功能仅限高级会员使用</p>
                <button class="btn btn-primary" onclick="location.href='/profile/'">升级会员</button>
              </div>
            `}
            
            <div class="answer-status" id="status-${q.id}" style="display: none;"></div>
          </div>
        `;
      }).join('');
    }

    function getQuestionTypeName(type) {
      const typeMap = {
        'choice': '选择题',
        'fillblank': '填空题',
        'shortanswer': '简答题',
        'essay': '论述题'
      };
      return typeMap[type] || '问答题';
    }

    async function submitAnswer(questionId) {
      const textarea = document.getElementById(`answer-${questionId}`);
      const btn = document.getElementById(`btn-${questionId}`);
      const statusDiv = document.getElementById(`status-${questionId}`);
      
      const answer = textarea.value.trim();
      if (!answer) {
        alert('请输入答案');
        return;
      }
      
      btn.disabled = true;
      btn.textContent = '提交中...';
      
      try {
        const res = await fetch('/api/questions/answer', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            questionId: questionId,
            nickname: currentUser.nickname,
            answer: answer,
            submittedAt: new Date().toISOString()
          })
        });
        
        const result = await res.json();
        
        if (result.success) {
          statusDiv.className = 'answer-status submitted';
          statusDiv.textContent = '✅ 答案已提交';
          statusDiv.style.display = 'block';
          textarea.disabled = true;
          btn.textContent = '已提交';
        } else {
          btn.disabled = false;
          btn.textContent = '提交答案';
          alert(result.message || '提交失败');
        }
      } catch (e) {
        btn.disabled = false;
        btn.textContent = '提交答案';
        alert('网络错误');
      }
    }

    function renderNoContent() {
      document.getElementById('content-area').innerHTML = `
        <div class="card no-content">
          <div class="no-content-icon">📭</div>
          <h3>暂无阅读内容</h3>
          <p>请稍后再试，或联系老师添加内容</p>
        </div>
      `;
    }

    // 页面初始化
    async function init() {
      if (!isLoggedIn) {
        const contentArea = document.getElementById('content-area');
        contentArea.innerHTML = `
          <div class="card" style="text-align: center; padding: 50px 20px;">
            <div style="font-size: 48px; margin-bottom: 15px;">🔒</div>
            <h3 style="margin-bottom: 10px;">请先登录</h3>
            <p style="color: #666; margin-bottom: 20px;">登录后即可开始阅读打卡</p>
            <a href="/register/" class="btn btn-primary">去登录</a>
          </div>
        `;
        return;
      }

      const status = await checkTodayStatus();
      
      if (status.success && status.hasCheckedIn) {
        renderCheckedIn(status.record);
      } else {
        const content = await getTodayContent();
        if (content.success && content.content) {
          renderContent(content.content);
        } else {
          renderNoContent();
        }
      }
    }

    init();
  </script>
</body>
</html>
