<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>学习历史 - TypeReading Hub</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif;
            background: #f5f7fa;
            min-height: 100vh;
        }
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header h1 { font-size: 24px; }
        .btn {
            padding: 8px 20px;
            background: rgba(255,255,255,0.2);
            color: white;
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 6px;
            cursor: pointer;
            text-decoration: none;
            margin-left: 10px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 30px;
        }
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
            background: white;
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
        }
        .tab {
            padding: 12px 24px;
            border: none;
            background: #f0f0f0;
            cursor: pointer;
            border-radius: 8px;
            font-size: 14px;
        }
        .tab.active {
            background: #667eea;
            color: white;
        }
        .card {
            background: white;
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            margin-bottom: 25px;
        }
        .card h2 {
            font-size: 18px;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid #eee;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }
        .stat-box {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }
        .stat-box .number {
            font-size: 32px;
            font-weight: bold;
            color: #667eea;
        }
        .stat-box .label {
            color: #666;
            font-size: 14px;
            margin-top: 5px;
        }
        .period-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .period-tab {
            padding: 8px 16px;
            border: 1px solid #ddd;
            background: white;
            cursor: pointer;
            border-radius: 6px;
            font-size: 13px;
        }
        .period-tab.active {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; }
        th { background: #f8f9fa; font-weight: 600; }
        .empty { text-align: center; padding: 60px; color: #999; }
        .error { color: #dc3545; padding: 20px; background: #f8d7da; border-radius: 8px; }
        
        /* 新增：阅读历史相关样式 */
        .history-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .history-item {
            padding: 15px;
            background: #f8f9fa;
            border-radius: 8px;
            border-left: 3px solid #667eea;
            cursor: pointer;
            transition: all 0.2s;
        }
        .history-item:hover {
            background: #e6f7ff;
            transform: translateX(5px);
        }
        .history-title {
            font-weight: 600;
            color: #667eea;
            margin-bottom: 5px;
            font-size: 16px;
        }
        .history-meta {
            display: flex;
            gap: 20px;
            color: #666;
            font-size: 13px;
        }
        .read-count {
            background: #667eea;
            color: white;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 12px;
        }
        
        /* 新增：模态框样式 */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.6);
            justify-content: center;
            align-items: center;
            z-index: 1000;
            padding: 20px;
        }
        .modal-content {
            background: white;
            border-radius: 16px;
            width: 100%;
            max-width: 800px;
            max-height: 90vh;
            overflow-y: auto;
            position: relative;
        }
        .modal-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            position: sticky;
            top: 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .modal-title { font-size: 20px; font-weight: 600; }
        .close-btn {
            font-size: 28px;
            cursor: pointer;
            color: white;
            line-height: 1;
        }
        .modal-body { 
            padding: 30px; 
            line-height: 1.8; 
            font-size: 16px;
            color: #333;
        }
        .modal-body p { margin-bottom: 1em; }
        
        .offline-notice {
            background: #fff2f0;
            border: 1px solid #ffccc7;
            color: #ff4d4f;
            padding: 40px;
            border-radius: 8px;
            text-align: center;
        }
        .offline-notice h3 { margin-bottom: 10px; }
        .offline-notice p { color: #666; font-size: 14px; margin: 5px 0; }
    </style>
</head>
<body>
    <div class="header">
        <h1>📊 学习历史</h1>
        <div>
            <a href="/" class="btn">← 返回首页</a>
        </div>
    </div>
    
    <div class="container">
        <div class="tabs">
            <button class="tab active" onclick="switchTab('reading', this)">📖 阅读统计</button>
            <button class="tab" onclick="switchTab('typing', this)">⌨️ 打字统计</button>
        </div>
        
        <!-- 阅读统计 -->
        <div id="reading-panel" class="tab-panel">
            <div class="card">
                <h2>阅读数据概览</h2>
                <div class="period-tabs">
                    <button class="period-tab active" onclick="loadReadingStats('day', this)">今日</button>
                    <button class="period-tab" onclick="loadReadingStats('week', this)">本周</button>
                    <button class="period-tab" onclick="loadReadingStats('month', this)">本月</button>
                    <button class="period-tab" onclick="loadReadingStats('year', this)">本年</button>
                    <button class="period-tab" onclick="loadReadingStats('total', this)">总计</button>
                </div>
                <div class="stats-grid" id="readingStats">
                    <div class="stat-box">
                        <div class="number" id="readingCount">-</div>
                        <div class="label">阅读篇数</div>
                    </div>
                    <div class="stat-box">
                        <div class="number" id="readingWords">-</div>
                        <div class="label">阅读字数</div>
                    </div>
                </div>
            </div>
            
            <!-- 原有的最近阅读记录（保持完全不变） -->
            <div class="card">
                <h2>最近阅读记录</h2>
                <div id="readingRecords">
                    <p class="empty">加载中...</p>
                </div>
            </div>
            
            <!-- 新增：阅读历史（去重后可复习） -->
            <div class="card">
                <h2>📚 阅读历史（点击文章可复习）</h2>
                <div id="readingHistory">
                    <p class="empty">加载中...</p>
                </div>
            </div>
        </div>
        
        <!-- 打字统计 -->
        <div id="typing-panel" class="tab-panel" style="display:none;">
            <div class="card">
                <h2>打字数据概览</h2>
                <div class="period-tabs">
                    <button class="period-tab active" onclick="loadTypingStats('day', this)">今日</button>
                    <button class="period-tab" onclick="loadTypingStats('week', this)">本周</button>
                    <button class="period-tab" onclick="loadTypingStats('month', this)">本月</button>
                    <button class="period-tab" onclick="loadTypingStats('year', this)">本年</button>
                    <button class="period-tab" onclick="loadTypingStats('total', this)">总计</button>
                </div>
                <div class="stats-grid" id="typingStats">
                    <div class="stat-box">
                        <div class="number" id="typingCount">-</div>
                        <div class="label">练习次数</div>
                    </div>
                    <div class="stat-box">
                        <div class="number" id="typingWpm">-</div>
                        <div class="label">平均WPM</div>
                    </div>
                    <div class="stat-box">
                        <div class="number" id="typingAccuracy">-</div>
                        <div class="label">平均准确率</div>
                    </div>
                </div>
            </div>
            
            <div class="card">
                <h2>最近打字记录</h2>
                <div id="typingRecords">
                    <p class="empty">加载中...</p>
                </div>
            </div>
        </div>
    </div>

    <!-- 新增：文章详情模态框 -->
    <div class="modal" id="articleModal">
        <div class="modal-content">
            <div class="modal-header">
                <div class="modal-title" id="modalTitle">文章标题</div>
                <span class="close-btn" onclick="closeModal()">&times;</span>
            </div>
            <div class="modal-body" id="modalBody"></div>
        </div>
    </div>

    <script>
        // 检查登录
        const currentUserStr = localStorage.getItem('currentUser');
        let currentUser = {};
        
        if (currentUserStr) {
            try {
                currentUser = JSON.parse(currentUserStr);
            } catch (e) {
                location.href = '/register/';
            }
        } else {
            location.href = '/register/';
        }

        if (!currentUser.nickname) {
            location.href = '/register/';
        }

        let currentReadingPeriod = 'day';
        let currentTypingPeriod = 'day';

        window.onload = function() {
            loadReadingStats('day');
            loadTypingStats('day');
            loadRecentRecords();
            loadReadingHistory(); // 新增：加载阅读历史
        };

        function switchTab(tab, btn) {
            document.querySelectorAll('.tab').forEach(function(t) { t.classList.remove('active'); });
            btn.classList.add('active');
            
            document.getElementById('reading-panel').style.display = tab === 'reading' ? 'block' : 'none';
            document.getElementById('typing-panel').style.display = tab === 'typing' ? 'block' : 'none';
        }

        async function loadReadingStats(period, btn) {
            if (btn) {
                document.querySelectorAll('#reading-panel .period-tab').forEach(function(t) { t.classList.remove('active'); });
                btn.classList.add('active');
            }
            currentReadingPeriod = period;
            
            try {
                const response = await fetch('/api/user/stats', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ nickname: currentUser.nickname })
                });
                const data = await response.json();
                
                if (data.success && data.stats) {
                    let stats;
                    if (period === 'total') {
                        stats = data.stats.reading.total;
                    } else {
                        stats = data.stats.reading[period] || { count: 0, words: 0 };
                    }
                    document.getElementById('readingCount').textContent = stats.count || 0;
                    document.getElementById('readingWords').textContent = stats.words || 0;
                } else {
                    document.getElementById('readingCount').textContent = '0';
                    document.getElementById('readingWords').textContent = '0';
                }
            } catch (e) {
                console.error('加载阅读统计失败:', e);
                document.getElementById('readingCount').textContent = '0';
                document.getElementById('readingWords').textContent = '0';
            }
        }

        async function loadTypingStats(period, btn) {
            if (btn) {
                document.querySelectorAll('#typing-panel .period-tab').forEach(function(t) { t.classList.remove('active'); });
                btn.classList.add('active');
            }
            currentTypingPeriod = period;
            
            try {
                const response = await fetch('/api/user/stats', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ nickname: currentUser.nickname })
                });
                const data = await response.json();
                
                if (data.success && data.stats) {
                    let stats;
                    if (period === 'total') {
                        stats = data.stats.typing.total;
                    } else {
                        stats = data.stats.typing[period] || { count: 0, avgWpm: 0, avgAccuracy: 0 };
                    }
                    document.getElementById('typingCount').textContent = stats.count || 0;
                    document.getElementById('typingWpm').textContent = stats.avgWpm || 0;
                    document.getElementById('typingAccuracy').textContent = (stats.avgAccuracy || 0) + '%';
                } else {
                    document.getElementById('typingCount').textContent = '0';
                    document.getElementById('typingWpm').textContent = '0';
                    document.getElementById('typingAccuracy').textContent = '0%';
                }
            } catch (e) {
                console.error('加载打字统计失败:', e);
                document.getElementById('typingCount').textContent = '0';
                document.getElementById('typingWpm').textContent = '0';
                document.getElementById('typingAccuracy').textContent = '0%';
            }
        }

        // 原有的最近阅读记录加载（保持完全不变）
        async function loadRecentRecords() {
            // 加载阅读记录
            try {
                const readingRes = await fetch('/api/user/reading-records', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ nickname: currentUser.nickname })
                });
                const readingData = await readingRes.json();
                
                const readingDiv = document.getElementById('readingRecords');
                if (readingData.success && readingData.records && readingData.records.length > 0) {
                    let html = '<table><thead><tr><th>日期</th><th>文章</th><th>字数</th></tr></thead><tbody>';
                    readingData.records.slice(0, 10).forEach(function(r) {
                        const date = r.timestamp ? new Date(r.timestamp).toLocaleDateString('zh-CN') : '-';
                        const title = r.articleTitle || '未命名文章';
                        const words = r.wordCount || 0;
                        html += '<tr><td>' + date + '</td><td>' + escapeHtml(title) + '</td><td>' + words + '</td></tr>';
                    });
                    html += '</tbody></table>';
                    readingDiv.innerHTML = html;
                } else {
                    readingDiv.innerHTML = '<p class="empty">暂无阅读记录</p>';
                }
            } catch (e) {
                console.error('加载阅读记录失败:', e);
                document.getElementById('readingRecords').innerHTML = '<p class="empty">加载失败</p>';
            }

            // 加载打字记录
            try {
                const typingRes = await fetch('/api/user/typing-records', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ nickname: currentUser.nickname })
                });
                const typingData = await typingRes.json();
                
                const typingDiv = document.getElementById('typingRecords');
                if (typingData.success && typingData.records && typingData.records.length > 0) {
                    let html = '<table><thead><tr><th>日期</th><th>WPM</th><th>准确率</th></tr></thead><tbody>';
                    typingData.records.slice(0, 10).forEach(function(r) {
                        const date = r.timestamp ? new Date(r.timestamp).toLocaleDateString('zh-CN') : '-';
                        const wpm = r.wpm || 0;
                        const accuracy = r.accuracy || 0;
                        html += '<tr><td>' + date + '</td><td>' + wpm + '</td><td>' + accuracy + '%</td></tr>';
                    });
                    html += '</tbody></table>';
                    typingDiv.innerHTML = html;
                } else {
                    typingDiv.innerHTML = '<p class="empty">暂无打字记录</p>';
                }
            } catch (e) {
                console.error('加载打字记录失败:', e);
                document.getElementById('typingRecords').innerHTML = '<p class="empty">加载失败</p>';
            }
        }

        // 新增：加载阅读历史（去重后可点击复习）
        async function loadReadingHistory() {
            try {
                const res = await fetch('/api/user/reading-history', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ nickname: currentUser.nickname })
                });
                const result = await res.json();
                
                const historyDiv = document.getElementById('readingHistory');
                if (result.success && result.history && result.history.length > 0) {
                    let html = '<div class="history-list">';
                    result.history.forEach(function(item) {
                        const readDate = item.lastReadAt ? new Date(item.lastReadAt).toLocaleDateString('zh-CN') : '-';
                        html += '<div class="history-item" onclick="openArticle(\'' + item.articleId + '\', \'' + escapeHtml(item.articleTitle) + '\', \'' + readDate + '\', ' + item.wordCount + ')">';
                        html += '<div class="history-title">' + escapeHtml(item.articleTitle) + '</div>';
                        html += '<div class="history-meta">';
                        html += '<span>📅 最近阅读：' + readDate + '</span>';
                        html += '<span>📝 ' + item.wordCount + ' 词</span>';
                        if (item.readCount > 1) {
                            html += '<span class="read-count">读过 ' + item.readCount + ' 次</span>';
                        }
                        html += '</div></div>';
                    });
                    html += '</div>';
                    historyDiv.innerHTML = html;
                } else {
                    historyDiv.innerHTML = '<p class="empty">暂无阅读历史</p>';
                }
            } catch (e) {
                console.error('加载阅读历史失败:', e);
                document.getElementById('readingHistory').innerHTML = '<p class="empty">加载失败</p>';
            }
        }

        // 新增：打开文章详情
        async function openArticle(articleId, title, readDate, wordCount) {
            if (!articleId) {
                alert('历史数据无法追溯原文');
                return;
            }
            
            try {
                const res = await fetch('/api/content/detail', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ id: articleId })
                });
                const result = await res.json();
                
                if (result.success) {
                    document.getElementById('modalTitle').textContent = result.content.title;
                    document.getElementById('modalBody').innerHTML = 
                        '<p>' + escapeHtml(result.content.content).replace(/\n/g, '<br>') + '</p>';
                    document.getElementById('articleModal').style.display = 'flex';
                } else {
                    // 文章已被删除，显示提示
                    document.getElementById('modalTitle').textContent = title;
                    document.getElementById('modalBody').innerHTML = 
                        '<div class="offline-notice">' +
                        '<h3>📭 该文章已被教师下架</h3>' +
                        '<p>您曾于 ' + readDate + ' 阅读过此文章</p>' +
                        '<p>阅读字数：' + wordCount + ' 词</p>' +
                        '</div>';
                    document.getElementById('articleModal').style.display = 'flex';
                }
            } catch (e) {
                alert('加载文章失败，请稍后重试');
            }
        }

        // 新增：关闭模态框
        function closeModal() {
            document.getElementById('articleModal').style.display = 'none';
        }

        // 点击模态框外部关闭
        document.getElementById('articleModal').addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });

        function escapeHtml(text) {
            if (!text) return '';
            return text
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#039;');
        }
    </script>
</body>
</html>
