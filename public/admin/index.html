<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>教师管理后台 - TypeReading Hub</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .login-box {
            background: white;
            padding: 50px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        .icon {
            font-size: 64px;
            margin-bottom: 20px;
        }
        h2 {
            color: #333;
            margin-bottom: 10px;
            font-size: 1.8em;
        }
        .subtitle {
            color: #999;
            margin-bottom: 30px;
            font-size: 0.95em;
        }
        input {
            width: 100%;
            padding: 16px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            margin-bottom: 20px;
            transition: border-color 0.3s;
        }
        input:focus {
            outline: none;
            border-color: #2a5298;
        }
        button {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
            font-weight: 600;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(42, 82, 152, 0.4);
        }
        .back-link {
            margin-top: 20px;
            color: #666;
            font-size: 0.9em;
        }
        .back-link a {
            color: #2a5298;
            text-decoration: none;
        }
        .message {
            margin-top: 15px;
            padding: 12px;
            border-radius: 8px;
            font-size: 0.9em;
            display: none;
        }
        .error {
            background: #f8d7da;
            color: #721c24;
            display: block;
        }
    </style>
</head>
<body>
    <div class="login-box">
        <div class="icon">👨‍🏫</div>
        <h2>教师管理后台</h2>
        <p class="subtitle">请输入管理密码登录</p>
        
        <input type="password" id="password" placeholder="管理密码" onkeypress="if(event.key==='Enter')login()">
        <button onclick="login()">登录</button>
        
        <div id="message"></div>
        
        <div class="back-link">
            <a href="/">← 返回学生端首页</a>
        </div>
    </div>

    <script>
        // 检查是否已登录
        if (localStorage.getItem('admin_token')) {
            location.href = '/admin/dashboard.html';
        }
        
        async function login() {
            const password = document.getElementById('password').value;
            const msgDiv = document.getElementById('message');
            
            if (!password) {
                msgDiv.className = 'message error';
                msgDiv.textContent = '请输入密码';
                return;
            }
            
            try {
                const res = await fetch('/api/admin/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password })
                });
                
                const data = await res.json();
                
                if (data.success) {
                    localStorage.setItem('admin_token', data.token);
                    location.href = '/admin/dashboard.html';
                } else {
                    msgDiv.className = 'message error';
                    msgDiv.textContent = '密码错误，请重试';
                }
            } catch (err) {
                msgDiv.className = 'message error';
                msgDiv.textContent = '网络错误，请检查连接';
            }
        }
    </script>
</body>
</html>
