<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>教师管理后台 - TypeReading Hub</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f7fa;
      min-height: 100vh;
    }
    .header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 20px 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .header h1 { font-size: 24px; }
    .header-links a {
      color: white;
      text-decoration: none;
      margin-right: 20px;
    }
    .logout-btn {
      background: rgba(255,255,255,0.2);
      border: 1px solid rgba(255,255,255,0.3);
      color: white;
      padding: 8px 20px;
      border-radius: 20px;
      cursor: pointer;
    }
    
    .tabs {
      display: flex;
      background: white;
      border-bottom: 1px solid #e8e8e8;
      padding: 0 30px;
    }
    .tab {
      padding: 16px 24px;
      cursor: pointer;
      border-bottom: 3px solid transparent;
      color: #666;
    }
    .tab:hover { color: #667eea; }
    .tab.active {
      color: #667eea;
      border-bottom-color: #667eea;
    }
    
    .container {
      padding: 30px;
      max-width: 1400px;
      margin: 0 auto;
    }
    
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }
    .stat-card {
      background: white;
      border-radius: 12px;
      padding: 24px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    .stat-value {
      font-size: 36px;
      font-weight: bold;
      color: #667eea;
    }
    .stat-label { color: #666; font-size: 14px; }
    
    .card {
      background: white;
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    
    .btn {
      padding: 10px 20px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      font-size: 14px;
      transition: all 0.3s;
    }
    .btn-primary {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }
    .btn-secondary {
      background: #f0f0f0;
      color: #666;
    }
    .btn-small { padding: 6px 12px; font-size: 12px; }
    
    .filter-select {
      padding: 10px 15px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 14px;
    }
    
    .data-table {
      width: 100%;
      border-collapse: collapse;
    }
    .data-table th, .data-table td {
      padding: 12px;
      text-align: left;
      border-bottom: 1px solid #eee;
    }
    .data-table th {
      background: #f8f9fa;
      font-weight: 600;
      color: #333;
    }
    
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.5);
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }
    .modal-content {
      background: white;
      border-radius: 12px;
      padding: 24px;
      width: 90%;
      max-width: 600px;
      max-height: 90vh;
      overflow-y: auto;
    }
    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }
    .close-btn {
      font-size: 24px;
      cursor: pointer;
      color: #999;
    }
    .form-group {
      margin-bottom: 16px;
    }
    .form-group label {
      display: block;
      margin-bottom: 6px;
      color: #333;
      font-weight: 500;
    }
    .form-control {
      width: 100%;
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 14px;
    }
    textarea.form-control {
      resize: vertical;
      min-height: 120px;
    }
    .modal-footer {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      margin-top: 20px;
    }
    
    .checkbox-label {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
    }
    .checkbox-label input[type="checkbox"] {
      width: 18px;
      height: 18px;
    }
    
    .tag {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 4px;
      font-size: 12px;
    }
    .tag-reading { background: #e6f7ff; color: #1890ff; }
    .tag-typing { background: #f6ffed; color: #52c41a; }
    .tag-active { background: #f6ffed; color: #52c41a; }
    .tag-inactive { background: #f5f5f5; color: #999; }
  </style>
</head>
<body>
  <div class="header">
    <h1>👨‍🏫 教师管理后台</h1>
    <div class="header-links">
      <a href="/">学生端首页</a>
      <button class="logout-btn" onclick="logout()">退出登录</button>
    </div>
  </div>

  <div class="tabs">
    <div class="tab active" onclick="switchTab('students')">👥 学生列表</div>
    <div class="tab" onclick="switchTab('classes')">📚 班级管理</div>
    <div class="tab" onclick="switchTab('content')">📝 内容管理</div>
    <div class="tab" onclick="switchTab('rank')">🏆 排行榜</div>
  </div>

  <div class="container">
    <!-- 学生管理 -->
    <div id="students-tab" class="tab-content active">
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-value" id="total-students">-</div>
          <div class="stat-label">总学生数</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="completed-info">-</div>
          <div class="stat-label">已完善信息</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="total-classes">-</div>
          <div class="stat-label">班级数量</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="total-practice">-</div>
          <div class="stat-label">练习次数</div>
        </div>
      </div>

      <div class="card">
        <h3 style="margin-bottom: 20px;">学生管理</h3>
        <div style="display: flex; gap: 10px; margin-bottom: 20px;">
          <select id="class-filter" class="filter-select" onchange="loadStudents()">
            <option value="">全部班级</option>
          </select>
          <select id="gender-filter" class="filter-select" onchange="loadStudents()">
            <option value="">全部性别</option>
            <option value="男">男</option>
            <option value="女">女</option>
          </select>
          <button class="btn btn-secondary" onclick="loadStudents()">🔄 刷新</button>
          <button class="btn btn-primary" onclick="deleteSelected()">🗑 批量删除</button>
        </div>
        <div id="students-list">正在加载学生数据...</div>
      </div>
    </div>

    <!-- 班级管理 -->
    <div id="classes-tab" class="tab-content">
      <div class="card">
        <h3 style="margin-bottom: 20px;">班级管理</h3>
        <button class="btn btn-primary" onclick="showClassModal()" style="margin-bottom: 20px;">➕ 创建班级</button>
        <div id="classes-list">正在加载班级数据...</div>
      </div>
    </div>

    <!-- 内容管理 -->
    <div id="content-tab" class="tab-content">
      <div class="card">
        <h3 style="margin-bottom: 20px;">内容管理</h3>
        <div style="display: flex; gap: 10px; margin-bottom: 20px;">
          <button class="btn btn-primary" onclick="showContentModal()">➕ 添加内容</button>
          <select id="content-filter" class="filter-select" onchange="loadContentList()">
            <option value="">全部类型</option>
            <option value="reading">阅读材料</option>
            <option value="typing">打字练习</option>
          </select>
        </div>
        <div id="content-list">正在加载内容数据...</div>
      </div>
    </div>

    <!-- 排行榜 -->
    <div id="rank-tab" class="tab-content">
      <div class="card">
        <h3 style="margin-bottom: 20px;">打字排行榜 TOP 20</h3>
        <div id="rank-list">正在加载排行榜...</div>
      </div>
    </div>
  </div>

  <!-- 编辑学生弹窗 -->
  <div id="student-modal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h3>编辑学生信息</h3>
        <span class="close-btn" onclick="closeStudentModal()">&times;</span>
      </div>
      <div class="form-group">
        <label>昵称</label>
        <input type="text" id="edit-nickname" class="form-control" readonly>
      </div>
      <div class="form-group">
        <label>真实姓名</label>
        <input type="text" id="edit-realname" class="form-control" placeholder="输入真实姓名">
      </div>
      <div class="form-group">
        <label>性别</label>
        <select id="edit-gender" class="form-control">
          <option value="">请选择</option>
          <option value="男">男</option>
          <option value="女">女</option>
        </select>
      </div>
      <div class="form-group">
        <label>班级</label>
        <select id="edit-class" class="form-control">
          <option value="">未分班</option>
        </select>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeStudentModal()">取消</button>
        <button class="btn btn-primary" onclick="saveStudent()">保存</button>
      </div>
    </div>
  </div>

  <!-- 创建班级弹窗 -->
  <div id="class-modal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h3>创建班级</h3>
        <span class="close-btn" onclick="closeClassModal()">&times;</span>
      </div>
      <div class="form-group">
        <label>班级名称</label>
        <input type="text" id="class-name" class="form-control" placeholder="例如：三年级一班">
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeClassModal()">取消</button>
        <button class="btn btn-primary" onclick="createClass()">创建</button>
      </div>
    </div>
  </div>

  <!-- 内容编辑弹窗 -->
  <div id="content-modal" class="modal">
    <div class="modal-content" style="max-width: 700px;">
      <div class="modal-header">
        <h3 id="content-modal-title">添加内容</h3>
        <span class="close-btn" onclick="closeContentModal()">&times;</span>
      </div>
      <div class="form-group">
        <label>类型</label>
        <select id="content-type" class="form-control">
          <option value="reading">阅读材料</option>
          <option value="typing">打字练习</option>
        </select>
      </div>
      <div class="form-group">
        <label>标题</label>
        <input type="text" id="content-title" class="form-control" placeholder="输入标题">
      </div>
      <div class="form-group">
        <label>内容</label>
        <textarea id="content-text" class="form-control" rows="10" placeholder="输入内容"></textarea>
      </div>
      <div class="form-group">
        <label>字数（可选，留空自动计算）</label>
        <input type="number" id="content-wordcount" class="form-control" placeholder="自动计算">
      </div>
      <div class="form-group">
        <label>难度</label>
        <select id="content-difficulty" class="form-control">
          <option value="easy">简单</option>
          <option value="medium" selected>中等</option>
          <option value="hard">困难</option>
        </select>
      </div>
      <div class="form-group">
        <label class="checkbox-label">
          <input type="checkbox" id="content-active" checked>
          <span>启用</span>
        </label>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeContentModal()">取消</button>
        <button class="btn btn-primary" onclick="saveContent()">保存</button>
      </div>
    </div>
  </div>

  <script>
    // 检查登录状态
    if (!localStorage.getItem('teacherLoggedIn')) {
      window.location.href = '/admin/';
    }

    let allStudents = [];
    let allClasses = [];
    let selectedStudents = new Set();
    let editingContentId = null;

    function logout() {
      localStorage.removeItem('teacherLoggedIn');
      window.location.href = '/admin/';
    }

    function switchTab(tab) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
      
      event.target.classList.add('active');
      document.getElementById(tab + '-tab').classList.add('active');
      
      if (tab === 'students') loadStudents();
      if (tab === 'classes') loadClasses();
      if (tab === 'content') loadContentList();
      if (tab === 'rank') loadRank();
    }

    // ========== 学生管理 ==========
    async function loadStudents() {
      try {
        const response = await fetch('/api/admin/students');
        const result = await response.json();
        
        if (result.success) {
          allStudents = result.students;
          updateStats();
          renderStudents();
          updateClassFilter();
        }
      } catch (err) {
        document.getElementById('students-list').innerHTML = '<p style="color: red;">加载失败</p>';
      }
    }

    function updateStats() {
      document.getElementById('total-students').textContent = allStudents.length;
      document.getElementById('completed-info').textContent = allStudents.filter(s => s.realName).length;
      document.getElementById('total-classes').textContent = allClasses.length;
    }

    function updateClassFilter() {
      const classFilter = document.getElementById('class-filter');
      const editClass = document.getElementById('edit-class');
      
      const classOptions = allClasses.map(c => `<option value=""></option>`).join('');
      
      classFilter.innerHTML = '<option value="">全部班级</option>' + classOptions;
      editClass.innerHTML = '<option value="">未分班</option>' + classOptions;
    }

    function renderStudents() {
      const classFilter = document.getElementById('class-filter').value;
      const genderFilter = document.getElementById('gender-filter').value;
      
      let filtered = allStudents;
      if (classFilter) filtered = filtered.filter(s => s.className === classFilter);
      if (genderFilter) filtered = filtered.filter(s => s.gender === genderFilter);

      if (filtered.length === 0) {
        document.getElementById('students-list').innerHTML = '<p style="text-align: center; color: #999;">暂无学生数据</p>';
        return;
      }

      let html = '<table class="data-table"><thead><tr>';
      html += '<th><input type="checkbox" onchange="toggleSelectAll(this)"></th>';
      html += '<th>昵称</th><th>真实姓名</th><th>性别</th><th>班级</th><th>注册时间</th><th>操作</th>';
      html += '</tr></thead><tbody>';

      filtered.forEach(s => {
        const date = new Date(s.createdAt).toLocaleDateString();
        html += `<tr>
          <td><input type="checkbox" value="" onchange="toggleSelect('', this.checked)"></td>
          <td></td>
          <td></td>
          <td></td>
          <td></td>
          <td></td>
          <td>
            <button class="btn btn-small btn-secondary" onclick="editStudent('')">编辑</button>
          </td>
        </tr>`;
      });

      html += '</tbody></table>';
      document.getElementById('students-list').innerHTML = html;
    }

    function toggleSelectAll(checked) {
      document.querySelectorAll('#students-list input[type="checkbox"]').forEach(cb => {
        cb.checked = checked;
        if (cb.value) toggleSelect(cb.value, checked);
      });
    }

    function toggleSelect(nickname, checked) {
      if (checked) selectedStudents.add(nickname);
      else selectedStudents.delete(nickname);
    }

    function editStudent(nickname) {
      const student = allStudents.find(s => s.nickname === nickname);
      if (!student) return;

      document.getElementById('edit-nickname').value = student.nickname;
      document.getElementById('edit-realname').value = student.realName || '';
      document.getElementById('edit-gender').value = student.gender || '';
      document.getElementById('edit-class').value = student.className || '';
      
      document.getElementById('student-modal').style.display = 'flex';
    }

    function closeStudentModal() {
      document.getElementById('student-modal').style.display = 'none';
    }

    async function saveStudent() {
      const nickname = document.getElementById('edit-nickname').value;
      const realName = document.getElementById('edit-realname').value.trim();
      const gender = document.getElementById('edit-gender').value;
      const className = document.getElementById('edit-class').value;

      try {
        const response = await fetch('/api/admin/student/update', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ nickname, realName, gender, className })
        });
        const result = await response.json();
        
        if (result.success) {
          closeStudentModal();
          loadStudents();
        }
      } catch (err) {
        alert('保存失败');
      }
    }

    async function deleteSelected() {
      if (selectedStudents.size === 0) {
        alert('请先选择学生');
        return;
      }
      if (!confirm(`确定删除选中的  名学生吗？`)) return;

      try {
        const response = await fetch('/api/admin/student/delete-batch', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ nicknames: Array.from(selectedStudents) })
        });
        const result = await response.json();
        
        if (result.success) {
          selectedStudents.clear();
          loadStudents();
        }
      } catch (err) {
        alert('删除失败');
      }
    }

    // ========== 班级管理 ==========
    async function loadClasses() {
      try {
        const response = await fetch('/api/admin/classes');
        const result = await response.json();
        
        if (result.success) {
          allClasses = result.classes;
          updateStats();
          renderClasses();
          updateClassFilter();
        }
      } catch (err) {
        document.getElementById('classes-list').innerHTML = '<p style="color: red;">加载失败</p>';
      }
    }

    function renderClasses() {
      if (allClasses.length === 0) {
        document.getElementById('classes-list').innerHTML = '<p style="text-align: center; color: #999;">暂无班级</p>';
        return;
      }

      let html = '<table class="data-table"><thead><tr>';
      html += '<th>班级名称</th><th>学生数</th><th>创建时间</th>';
      html += '</tr></thead><tbody>';

      allClasses.forEach(c => {
        const studentCount = allStudents.filter(s => s.className === c.name).length;
        const date = new Date(c.createdAt).toLocaleDateString();
        html += `<tr>
          <td></td>
          <td></td>
          <td></td>
        </tr>`;
      });

      html += '</tbody></table>';
      document.getElementById('classes-list').innerHTML = html;
    }

    function showClassModal() {
      document.getElementById('class-name').value = '';
      document.getElementById('class-modal').style.display = 'flex';
    }

    function closeClassModal() {
      document.getElementById('class-modal').style.display = 'none';
    }

    async function createClass() {
      const className = document.getElementById('class-name').value.trim();
      if (!className) {
        alert('请输入班级名称');
        return;
      }

      try {
        const response = await fetch('/api/admin/class/create', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ className })
        });
        const result = await response.json();
        
        if (result.success) {
          closeClassModal();
          loadClasses();
        }
      } catch (err) {
        alert('创建失败');
      }
    }

    // ========== 内容管理 ==========
    async function loadContentList() {
      const filter = document.getElementById('content-filter').value;
      try {
        const response = await fetch('/api/admin/content/list', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ type: filter })
        });
        const result = await response.json();
        
        if (result.success) {
          renderContentList(result.contents);
        }
      } catch (err) {
        document.getElementById('content-list').innerHTML = '<p style="color: red;">加载失败</p>';
      }
    }

    function renderContentList(contents) {
      if (contents.length === 0) {
        document.getElementById('content-list').innerHTML = '<p style="text-align: center; color: #999; padding: 40px;">暂无内容</p>';
        return;
      }

      let html = '<table class="data-table"><thead><tr>';
      html += '<th>类型</th><th>标题</th><th>字数</th><th>难度</th><th>状态</th><th>更新时间</th><th>操作</th>';
      html += '</tr></thead><tbody>';

      contents.forEach(item => {
        const typeText = item.type === 'reading' ? '<span class="tag tag-reading">📖 阅读</span>' : '<span class="tag tag-typing">⌨️ 打字</span>';
        const diffText = { easy: '简单', medium: '中等', hard: '困难' }[item.difficulty] || '中等';
        const statusText = item.isActive ? '<span class="tag tag-active">启用</span>' : '<span class="tag tag-inactive">禁用</span>';
        const date = new Date(item.updatedAt).toLocaleDateString();
        
        html += `<tr>
          <td></td>
          <td></td>
          <td></td>
          <td></td>
          <td></td>
          <td></td>
          <td>
            <button class="btn btn-small btn-secondary" onclick='editContent()'>编辑</button>
            <button class="btn btn-small" style="background: #ff4d4f; color: white;" onclick="deleteContent('', '')">删除</button>
          </td>
        </tr>`;
      });

      html += '</tbody></table>';
      document.getElementById('content-list').innerHTML = html;
    }

    function showContentModal() {
      editingContentId = null;
      document.getElementById('content-modal-title').textContent = '添加内容';
      document.getElementById('content-type').value = 'reading';
      document.getElementById('content-title').value = '';
      document.getElementById('content-text').value = '';
      document.getElementById('content-wordcount').value = '';
      document.getElementById('content-difficulty').value = 'medium';
      document.getElementById('content-active').checked = true;
      document.getElementById('content-modal').style.display = 'flex';
    }

    function editContent(content) {
      editingContentId = content.id;
      document.getElementById('content-modal-title').textContent = '编辑内容';
      document.getElementById('content-type').value = content.type;
      document.getElementById('content-title').value = content.title;
      document.getElementById('content-text').value = content.content;
      document.getElementById('content-wordcount').value = content.wordCount || '';
      document.getElementById('content-difficulty').value = content.difficulty || 'medium';
      document.getElementById('content-active').checked = content.isActive !== false;
      document.getElementById('content-modal').style.display = 'flex';
    }

    function closeContentModal() {
      document.getElementById('content-modal').style.display = 'none';
      editingContentId = null;
    }

    async function saveContent() {
      const type = document.getElementById('content-type').value;
      const title = document.getElementById('content-title').value.trim();
      const content = document.getElementById('content-text').value.trim();
      const wordCount = document.getElementById('content-wordcount').value;
      const difficulty = document.getElementById('content-difficulty').value;
      const isActive = document.getElementById('content-active').checked;

      if (!title || !content) {
        alert('请填写标题和内容');
        return;
      }

      try {
        const response = await fetch('/api/admin/content/save', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            id: editingContentId,
            type,
            title,
            content,
            wordCount: wordCount || content.length,
            difficulty,
            isActive
          })
        });
        const result = await response.json();
        
        if (result.success) {
          closeContentModal();
          loadContentList();
        } else {
          alert(result.message || '保存失败');
        }
      } catch (err) {
        alert('网络错误');
      }
    }

    async function deleteContent(id, type) {
      if (!confirm('确定删除此内容？')) return;

      try {
        const response = await fetch('/api/admin/content/delete', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ id, type })
        });
        const result = await response.json();
        
        if (result.success) {
          loadContentList();
        } else {
          alert(result.message || '删除失败');
        }
      } catch (err) {
        alert('网络错误');
      }
    }

    // ========== 排行榜 ==========
    async function loadRank() {
      try {
        const response = await fetch('/api/rank/typing');
        const result = await response.json();
        
        if (result.success) {
          renderRank(result.rank);
        }
      } catch (err) {
        document.getElementById('rank-list').innerHTML = '<p style="color: red;">加载失败</p>';
      }
    }

    function renderRank(rank) {
      if (rank.length === 0) {
        document.getElementById('rank-list').innerHTML = '<p style="text-align: center; color: #999;">暂无数据</p>';
        return;
      }

      let html = '<table class="data-table"><thead><tr>';
      html += '<th>排名</th><th>姓名</th><th>班级</th><th>速度(WPM)</th><th>准确率</th>';
      html += '</tr></thead><tbody>';

      rank.forEach((r, i) => {
        html += `<tr>
          <td></td>
          <td></td>
          <td></td>
          <td></td>
          <td>%</td>
        </tr>`;
      });

      html += '</tbody></table>';
      document.getElementById('rank-list').innerHTML = html;
    }

    // 初始化
    loadStudents();
  </script>
</body>
</html>
