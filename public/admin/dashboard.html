<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>教师管理后台 - TypeReading Hub</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif;
            background: #f5f7fa;
            min-height: 100vh;
        }
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header h1 { font-size: 24px; }
        .header .btn {
            padding: 8px 20px;
            background: rgba(255,255,255,0.2);
            color: white;
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 6px;
            cursor: pointer;
            text-decoration: none;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 30px;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-box {
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            text-align: center;
        }
        .stat-box h3 { font-size: 36px; color: #667eea; margin-bottom: 5px; }
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
            background: white;
            padding: 10px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        .tab {
            padding: 12px 24px;
            border: none;
            background: transparent;
            cursor: pointer;
            border-radius: 6px;
            font-size: 14px;
        }
        .tab.active { background: #667eea; color: white; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .card {
            background: white;
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            margin-bottom: 25px;
        }
        .card h2 { font-size: 18px; margin-bottom: 20px; padding-bottom: 15px; border-bottom: 1px solid #eee; }
        .filter-bar {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .filter-bar input, .filter-bar select {
            padding: 10px 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
        }
        .filter-bar button {
            padding: 10px 20px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #eee; }
        th { background: #f8f9fa; font-weight: 600; }
        .badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            background: #d1ecf1;
            color: #0c5460;
        }
        .btn-small {
            padding: 6px 14px;
            font-size: 12px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            background: #667eea;
            color: white;
        }
        .class-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }
        .class-card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            border: 2px solid #e0e0e0;
        }
        .class-card h4 {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        .class-card .count {
            background: #667eea;
            color: white;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 14px;
        }
        .student-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        .student-tag {
            background: #f0f0f0;
            padding: 6px 14px;
            border-radius: 16px;
            font-size: 13px;
        }
        .empty-state {
            text-align: center;
            padding: 60px;
            color: #999;
        }
        .edit-btn {
            background: #28a745;
            margin-left: 10px;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .modal.active { display: flex; }
        .modal-content {
            background: white;
            border-radius: 16px;
            width: 90%;
            max-width: 500px;
            padding: 30px;
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .modal-close {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
        }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; color: #555; }
        .form-group input, .form-group select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>👨 🏫 教师管理后台</h1>
        <div>
            <a href="/" class="btn" style="margin-right: 10px;">学生端首页</a>
            <button class="btn" onclick="logout()">退出登录</button>
        </div>
    </div>
    
    <div class="container">
        <div class="stats-grid">
            <div class="stat-box">
                <h3 id="totalStudents">0</h3>
                <p>总学生数</p>
            </div>
            <div class="stat-box">
                <h3 id="completedInfo">0</h3>
                <p>已完善信息</p>
            </div>
            <div class="stat-box">
                <h3 id="totalClasses">0</h3>
                <p>班级数量</p>
            </div>
            <div class="stat-box">
                <h3 id="typingCount">0</h3>
                <p>练习次数</p>
            </div>
        </div>
        
        <div class="tabs">
            <button class="tab active" onclick="switchTab('students', this)">👥 学生管理</button>
            <button class="tab" onclick="switchTab('classes', this)">🏫 班级管理</button>
            <button class="tab" onclick="switchTab('ranking', this)">🏆 排行榜</button>
        </div>
        
        <!-- 学生管理 -->
        <div id="students-tab" class="tab-content active">
            <div class="card">
                <h2>学生列表</h2>
                <div class="filter-bar">
                    <input type="text" id="searchInput" placeholder="搜索昵称或姓名..." onkeyup="filterStudents()">
                    <select id="classFilter" onchange="filterStudents()">
                        <option value="">全部班级</option>
                    </select>
                    <button onclick="loadStudents()">🔄 刷新</button>
                </div>
                <div id="studentsTable">
                    <div class="empty-state">正在加载...</div>
                </div>
            </div>
        </div>
        
        <!-- 班级管理 -->
        <div id="classes-tab" class="tab-content">
            <div class="card">
                <h2>班级管理 
                    <button class="btn-small edit-btn" onclick="openClassModal()">+ 添加班级</button>
                </h2>
                <div id="classesGrid">
                    <div class="empty-state">正在加载...</div>
                </div>
            </div>
        </div>

        <div id="rank
