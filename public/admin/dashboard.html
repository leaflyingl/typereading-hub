<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>教师管理后台 - TypeReading Hub</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif;
            background: #f5f7fa;
            min-height: 100vh;
        }
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header h1 { font-size: 24px; }
        .header .btn {
            padding: 8px 20px;
            background: rgba(255,255,255,0.2);
            color: white;
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 6px;
            cursor: pointer;
            text-decoration: none;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 30px;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-box {
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            text-align: center;
        }
        .stat-box h3 { font-size: 36px; color: #667eea; margin-bottom: 5px; }
        .card {
            background: white;
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
        }
        .card h2 { font-size: 18px; margin-bottom: 20px; border-bottom: 1px solid #eee; padding-bottom: 15px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #eee; }
        th { background: #f8f9fa; }
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
            background: white;
            padding: 10px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        .tab { padding: 12px 24px; border: none; background: transparent; cursor: pointer; border-radius: 6px; }
        .tab.active { background: #667eea; color: white; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .btn-small { padding: 6px 14px; font-size: 12px; border: none; border-radius: 6px; cursor: pointer; background: #667eea; color: white; }
        .badge { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 12px; background: #d1ecf1; color: #0c5460; }
    </style>
</head>
<body>
    <div class="header">
        <h1>👨 🏫 教师管理后台</h1>
        <div>
            <a href="/" class="btn" style="margin-right: 10px;">学生端首页</a>
            <button class="btn" onclick="logout()">退出登录</button>
        </div>
    </div>
    
    <div class="container">
        <div class="stats-grid">
            <div class="stat-box">
                <h3 id="totalStudents">-</h3>
                <p>总学生数</p>
            </div>
            <div class="stat-box">
                <h3 id="completedInfo">-</h3>
                <p>已完善信息</p>
            </div>
            <div class="stat-box">
                <h3 id="totalClasses">-</h3>
                <p>班级数量</p>
            </div>
            <div class="stat-box">
                <h3>-</h3>
                <p>今日打卡</p>
            </div>
        </div>
        
        <div class="tabs">
            <button class="tab active" onclick="switchTab('students', this)">👥 学生管理</button>
            <button class="tab" onclick="switchTab('ranking', this)">🏆 排行榜</button>
        </div>
        
        <div id="students-tab" class="tab-content active">
            <div class="card">
                <h2>学生列表</h2>
                <div id="studentsTable"><p style="color:#888;">正在加载...</p></div>
            </div>
        </div>
        
        <div id="ranking-tab" class="tab-content">
            <div class="card">
                <h2>打字排行榜</h2>
                <div id="rankingTable"><p style="color:#888;">正在加载...</p></div>
            </div>
        </div>
    </div>

    <script>
        // 检查登录
        if (sessionStorage.getItem('adminLoggedIn') !== 'true') {
            location.href = '/admin/';
        }

        let allStudents = [];

        window.onload = function() {
            loadStudents();
            loadRanking();
        };

        function switchTab(tab, btn) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            btn.classList.add('active');
            document.getElementById(tab + '-tab').classList.add('active');
        }

        async function loadStudents() {
            try {
                const res = await fetch('/api/admin/students', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({})
                });
                const data = await res.json();
                
                if (data.success && data.students) {
                    allStudents = data.students;
                    document.getElementById('totalStudents').textContent = allStudents.length;
                    const completed = allStudents.filter(s => s.realName && s.gender).length;
                    document.getElementById('completedInfo').textContent = completed;
                    
                    // 计算班级数
                    const classes = new Set();
                    allStudents.forEach(s => {
                        if (s.realName) {
                            const match = s.realName.match(/^([一二三四五六七八九十\d]+班)/);
                            if (match) classes.add(match[1]);
                        }
                    });
                    document.getElementById('totalClasses').textContent = classes.size;

                    // 渲染表格
                    let html = '<table><tr><th>昵称</th><th>真实姓名</th><th>性别</th><th>班级</th></tr>';
                    allStudents.forEach(s => {
                        const className = s.realName ? (s.realName.match(/^([一二三四五六七八九十\d]+班)/)?.[1] || '未分班') : '未分班';
                        const gender = s.gender || '<span style="color:#999;">未设置</span>';
                        html += `<tr><td><strong></strong></td><td></td><td></td><td><span class="badge"></span></td></tr>`;
                    });
                    html += '</table>';
                    document.getElementById('studentsTable').innerHTML = html;
                } else {
                    document.getElementById('studentsTable').innerHTML = '<p>暂无学生数据</p>';
                }
            } catch(e) {
                document.getElementById('studentsTable').innerHTML = '<p style="color:red;">加载失败</p>';
            }
        }

        async function loadRanking() {
            try {
                const res = await fetch('/api/rank/typing', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({limit: 20})
                });
                const data = await res.json();
                
                if (data.success && data.rank?.length > 0) {
                    let html = '<table><tr><th>排名</th><th>昵称</th><th>WPM</th><th>准确率</th></tr>';
                    data.rank.forEach((r, i) => {
                        const medal = ['🥇','🥈','🥉'][i] || (i+1);
                        html += `<tr><td style="font-size:20px;"></td><td><strong></strong></td><td style="color:#667eea;font-weight:bold;"></td><td>%</td></tr>`;
                    });
                    html += '</table>';
                    document.getElementById('rankingTable').innerHTML = html;
                } else {
                    document.getElementById('rankingTable').innerHTML = '<p>暂无排行数据</p>';
                }
            } catch(e) {
                document.getElementById('rankingTable').innerHTML = '<p style="color:red;">加载失败</p>';
            }
        }

        function logout() {
            sessionStorage.removeItem('adminLoggedIn');
            location.href = '/admin/';
        }
    </script>
</body>
</html>
