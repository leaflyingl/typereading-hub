<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>教师管理后台 - TypeReading Hub</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: #f5f7fa;
            min-height: 100vh;
        }
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header h1 { font-size: 24px; }
        .header .btn {
            padding: 8px 20px;
            background: rgba(255,255,255,0.2);
            color: white;
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 6px;
            cursor: pointer;
            text-decoration: none;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 30px;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-box {
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            text-align: center;
        }
        .stat-box h3 { font-size: 36px; color: #667eea; margin-bottom: 5px; }
        .stat-box p { color: #666; }
        
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
            background: white;
            padding: 10px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        .tab {
            padding: 12px 24px;
            border: none;
            background: transparent;
            cursor: pointer;
            border-radius: 6px;
            font-size: 14px;
            transition: all 0.3s;
        }
        .tab.active {
            background: #667eea;
            color: white;
        }
        
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        
        .card {
            background: white;
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            margin-bottom: 25px;
        }
        .card h2 {
            font-size: 18px;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid #eee;
        }
        
        .filter-bar {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .filter-bar input, .filter-bar select {
            padding: 10px 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
        }
        .filter-bar input { flex: 1; min-width: 200px; }
        .filter-bar button {
            padding: 10px 20px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
        
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #eee; }
        th { background: #f8f9fa; font-weight: 600; color: #555; }
        tr:hover { background: #f8f9fa; }
        
        .badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
        }
        .badge-success { background: #d4edda; color: #155724; }
        .badge-warning { background: #fff3cd; color: #856404; }
        .badge-info { background: #d1ecf1; color: #0c5460; }
        .badge-secondary { background: #e2e3e5; color: #383d41; }
        
        .btn-small {
            padding: 6px 14px;
            font-size: 12px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }
        .btn-view { background: #667eea; color: white; }
        
        .class-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }
        .class-card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            border: 2px solid #e0e0e0;
        }
        .class-card h4 {
            font-size: 18px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
        }
        .class-card .count {
            background: #667eea;
            color: white;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 14px;
        }
        .student-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        .student-tag {
            background: #f0f0f0;
            padding: 6px 14px;
            border-radius: 16px;
            font-size: 13px;
        }
        
        .empty-state {
            text-align: center;
            padding: 60px;
            color: #999;
        }
        .empty-state-icon { font-size: 64px; margin-bottom: 20px; }
        
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .modal.active { display: flex; }
        .modal-content {
            background: white;
            border-radius: 16px;
            width: 90%;
            max-width: 600px;
            max-height: 80vh;
            overflow-y: auto;
        }
        .modal-header {
            padding: 20px 25px;
            border-bottom: 1px solid #eee;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .modal-close {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: #999;
        }
        .modal-body { padding: 25px; }
        .info-row {
            display: flex;
            padding: 12px 0;
            border-bottom: 1px solid #f0f0f0;
        }
        .info-label { width: 120px; color: #666; font-weight: 500; }
        .info-value { flex: 1; color: #333; }
        .loading { color: #999; font-style: italic; }
        .error { color: #dc3545; }
    </style>
</head>
<body>
    <div class="header">
        <h1>👨‍🏫 教师管理后台</h1>
        <div>
            <a href="/" class="btn" style="margin-right: 10px;">学生端首页</a>
            <button class="btn" onclick="logout()">退出登录</button>
        </div>
    </div>
    
    <div class="container">
        <div class="stats-grid">
            <div class="stat-box">
                <h3 id="totalStudents">-</h3>
                <p>总学生数</p>
            </div>
            <div class="stat-box">
                <h3 id="completedInfo">-</h3>
                <p>已完善信息</p>
            </div>
            <div class="stat-box">
                <h3 id="totalClasses">-</h3>
                <p>班级数量</p>
            </div>
            <div class="stat-box">
                <h3 id="typingCount">-</h3>
                <p>练习次数</p>
            </div>
        </div>
        
        <div class="tabs">
            <button class="tab active" onclick="switchTab('students', this)">👥 学生管理</button>
            <button class="tab" onclick="switchTab('ranking', this)">🏆 排行榜</button>
            <button class="tab" onclick="switchTab('classes', this)">📚 班级管理</button>
        </div>
        
        <div id="students-tab" class="tab-content active">
            <div class="card">
                <h2>学生列表</h2>
                <div class="filter-bar">
                    <input type="text" id="searchInput" placeholder="搜索昵称或姓名..." onkeyup="filterStudents()">
                    <select id="classFilter" onchange="filterStudents()">
                        <option value="">全部班级</option>
                    </select>
                    <select id="genderFilter" onchange="filterStudents()">
                        <option value="">全部性别</option>
                        <option value="男">男</option>
                        <option value="女">女</option>
                    </select>
                    <button onclick="loadStudents()">🔄 刷新</button>
                </div>
                <div id="studentsTable">
                    <p class="loading">正在加载学生数据...</p>
                </div>
            </div>
        </div>
        
        <div id="ranking-tab" class="tab-content">
            <div class="card">
                <h2>打字排行榜 TOP 20</h2>
                <div id="rankingTable">
                    <p class="loading">正在加载排行榜...</p>
                </div>
            </div>
        </div>
        
        <div id="classes-tab" class="tab-content">
            <div class="card">
                <h2>班级分组（根据真实姓名自动提取）</h2>
                <div id="classesGrid">
                    <p class="loading">正在加载班级数据...</p>
                </div>
            </div>
        </div>
    </div>
    
    <div id="studentModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>👤 学生详细信息</h3>
                <button class="modal-close" onclick="closeModal()">&times;</button>
            </div>
            <div class="modal-body" id="modalBody"></div>
        </div>
    </div>

    <script>
        // ========== 登录检查（关键修复）==========
        if (sessionStorage.getItem('adminLoggedIn') !== 'true') {
            location.href = '/admin/';
        }

        let allStudents = [];
        
        window.onload = function() {
            loadStudents();
            loadRanking();
        };
        
        function switchTab(tab, btn) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            btn.classList.add('active');
            document.getElementById(tab + '-tab').classList.add('active');
            if (tab === 'classes') loadClasses();
        }
        
        async function loadStudents() {
            const tableDiv = document.getElementById('studentsTable');
            tableDiv.innerHTML = '<p class="loading">正在加载学生数据...</p>';
            
            try {
                const response = await fetch('/api/admin/students', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({})
                });
                const data = await response.json();
                console.log('学生数据:', data);
                
                if (data.success && data.students) {
                    allStudents = data.students;
                    renderStudents(allStudents);
                    updateStats();
                    updateClassFilter();
                } else {
                    tableDiv.innerHTML = '<p class="error">加载失败: ' + (data.message || '未知错误') + '</p>';
                }
            } catch (error) {
                tableDiv.innerHTML = '<p class="error">加载失败，请检查网络</p>';
                console.error(error);
            }
        }
        
        function renderStudents(students) {
            const tableDiv = document.getElementById('studentsTable');
            if (students.length === 0) {
                tableDiv.innerHTML = '<div class="empty-state"><div class="empty-state-icon">📭</div><p>暂无学生数据</p></div>';
                return;
            }
            
            let html = `<table><thead><tr><th>昵称</th><th>真实姓名</th><th>性别</th><th>班级</th><th>注册时间</th><th>操作</th></tr></thead><tbody>`;
            
            students.forEach(s => {
                const className = extractClass(s.realName);
                const genderBadge = s.gender ? 
                    `<span class="badge badge-success">${s.gender}</span>` : 
                    '<span class="badge badge-warning">未设置</span>';
                
                html += `<tr>
                    <td><strong>${s.nickname}</strong></td>
                    <td>${s.realName || '-'}</td>
                    <td>${genderBadge}</td>
                    <td><span class="badge badge-info">${className}</span></td>
                    <td>${formatDate(s.createdAt)}</td>
                    <td><button class="btn-small btn-view" onclick="viewStudent('${s.nickname}')">详细信息</button></td>
                </tr>`;
            });
            
            html += '</tbody></table>';
            tableDiv.innerHTML = html;
        }
        
        function extractClass(realName) {
            if (!realName) return '未分班';
            const match = realName.match(/^([一二三四五六七八九十\d]+班)/);
            return match ? match[1] : '未分班';
        }
        
        function filterStudents() {
            const search = document.getElementById('searchInput').value.toLowerCase();
            const classFilter = document.getElementById('classFilter').value;
            const genderFilter = document.getElementById('genderFilter').value;
            
            let filtered = allStudents.filter(s => {
                const matchSearch = !search || 
                    (s.nickname && s.nickname.toLowerCase().includes(search)) ||
                    (s.realName && s.realName.toLowerCase().includes(search));
                const matchClass = !classFilter || extractClass(s.realName) === classFilter;
                const matchGender = !genderFilter || s.gender === genderFilter;
                return matchSearch && matchClass && matchGender;
            });
            renderStudents(filtered);
        }
        
        function updateClassFilter() {
            const classes = new Set();
            allStudents.forEach(s => {
                const className = extractClass(s.realName);
                if (className !== '未分班') classes.add(className);
            });
            
            let html = '<option value="">全部班级</option>';
            Array.from(classes).sort().forEach(c => {
                html += `<option value="${c}">${c}</option>`;
            });
            document.getElementById('classFilter').innerHTML = html;
        }
        
        function loadClasses() {
            const classes = {};
            allStudents.forEach(s => {
                const className = extractClass(s.realName);
                if (!classes[className]) classes[className] = [];
                classes[className].push(s);
            });
            
            const classNames = Object.keys(classes).sort();
            const gridDiv = document.getElementById('classesGrid');
            
            if (classNames.length === 0 || (classNames.length === 1 && classNames[0] === '未分班')) {
                gridDiv.innerHTML = `<div class="empty-state"><div class="empty-state-icon">🏫</div><p>暂无班级数据</p><p style="font-size:14px;color:#999;margin-top:10px;">学生填写真实姓名（如"一班张三"）后将自动分组</p></div>`;
                return;
            }
            
            let html = '<div class="class-grid">';
            classNames.forEach(className => {
                if (className === '未分班') return;
                const students = classes[className];
                html += `<div class="class-card">
                    <h4>🏫 ${className}<span class="count">${students.length}人</span></h4>
                    <div class="student-tags">${students.map(s => `<span class="student-tag">${s.realName || s.nickname}</span>`).join('')}</div>
                </div>`;
            });
            html += '</div>';
            gridDiv.innerHTML = html;
        }
        
        async function viewStudent(nickname) {
            const student = allStudents.find(s => s.nickname === nickname);
            if (!student) return;
            
            const modalBody = document.getElementById('modalBody');
            modalBody.innerHTML = '<p class="loading">加载中...</p>';
            document.getElementById('studentModal').classList.add('active');
            
            let recordsHtml = '<p>暂无学习记录</p>';
            try {
                const response = await fetch('/api/admin/student-records', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ nickname })
                });
                const data = await response.json();
                if (data.success && data.records?.length > 0) {
                    recordsHtml = `<table style="width:100%;margin-top:10px;"><thead><tr style="background:#f8f9fa;">
                        <th style="padding:10px;text-align:left;">日期</th>
                        <th style="padding:10px;text-align:left;">类型</th>
                        <th style="padding:10px;text-align:left;">详情</th>
                    </tr></thead><tbody>${data.records.slice(0,20).map(r => `<tr>
                        <td style="padding:10px;">${formatDate(r.date)}</td>
                        <td style="padding:10px;">${r.type}</td>
                        <td style="padding:10px;">${r.detail}</td>
                    </tr>`).join('')}</tbody></table>`;
                }
            } catch(e) { console.log('获取记录失败:', e); }
            
            modalBody.innerHTML = `
                <div class="info-row"><div class="info-label">昵称</div><div class="info-value">${student.nickname}</div></div>
                <div class="info-row"><div class="info-label">真实姓名</div><div class="info-value">${student.realName || '未填写'}</div></div>
                <div class="info-row"><div class="info-label">性别</div><div class="info-value">${student.gender || '未填写'}</div></div>
                <div class="info-row"><div class="info-label">班级</div><div class="info-value">${extractClass(student.realName)}</div></div>
                <div class="info-row"><div class="info-label">注册时间</div><div class="info-value">${formatDate(student.createdAt)}</div></div>
                <div style="margin-top:20px;"><h4 style="margin-bottom:15px;">📚 学习记录</h4>${recordsHtml}</div>
            `;
        }
        
        function closeModal() {
            document.getElementById('studentModal').classList.remove('active');
        }
        
        async function loadRanking() {
            try {
                const response = await fetch('/api/rank/typing', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ limit: 20 })
                });
                const data = await response.json();
                const tableDiv = document.getElementById('rankingTable');
                
                if (data.success && data.rank?.length > 0) {
                    let html = `<table><thead><tr><th>排名</th><th>昵称</th><th>WPM</th><th>准确率</th><th>用时(秒)</th></tr></thead><tbody>`;
                    data.rank.forEach((r, i) => {
                        const medal = ['🥇','🥈','🥉'][i] || (i+1);
                        html += `<tr><td>${medal}</td><td><strong>${r.nickname}</strong></td><td style="color:#667eea;font-weight:bold;">${r.wpm}</td><td>${r.accuracy}%</td><td>${r.duration}s</td></tr>`;
                    });
                    html += '</tbody></table>';
                    tableDiv.innerHTML = html;
                } else {
                    tableDiv.innerHTML = '<div class="empty-state"><div class="empty-state-icon">🏆</div><p>暂无排行数据</p></div>';
                }
            } catch (error) {
                document.getElementById('rankingTable').innerHTML = '<p class="error">加载失败</p>';
            }
        }
        
        function updateStats() {
            document.getElementById('totalStudents').textContent = allStudents.length;
            const completed = allStudents.filter(s => s.realName && s.gender).length;
            document.getElementById('completedInfo').textContent = completed;
            const classes = new Set(allStudents.map(s => extractClass(s.realName)).filter(c => c !== '未分班'));
            document.getElementById('totalClasses').textContent = classes.size;
        }
        
        function formatDate(dateStr) {
            if (!dateStr) return '-';
            try { return new Date(dateStr).toLocaleString('zh-CN'); } catch(e) { return dateStr; }
        }
        
        function logout() {
            sessionStorage.removeItem('adminLoggedIn');
            location.href = '/admin/';
        }
        
        document.getElementById('studentModal').addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });
    </script>
</body>
</html>
