<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>教师管理后台 - TypeReading Hub</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f7fa;
      min-height: 100vh;
    }
    .header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 20px 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .header h1 { font-size: 24px; }
    .logout-btn {
      background: rgba(255,255,255,0.2);
      border: 1px solid rgba(255,255,255,0.3);
      color: white;
      padding: 8px 20px;
      border-radius: 20px;
      cursor: pointer;
    }
    
    .tabs {
      display: flex;
      background: white;
      border-bottom: 1px solid #e8e8e8;
      padding: 0 30px;
    }
    .tab {
      padding: 16px 24px;
      cursor: pointer;
      border-bottom: 3px solid transparent;
      color: #666;
    }
    .tab.active {
      color: #667eea;
      border-bottom-color: #667eea;
    }
    
    .container {
      padding: 30px;
      max-width: 1400px;
      margin: 0 auto;
    }
    
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 20px;
      margin-bottom: 30px;
    }
    .stat-card {
      background: white;
      border-radius: 12px;
      padding: 24px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    .stat-value {
      font-size: 36px;
      font-weight: bold;
      color: #667eea;
    }
    .stat-label { color: #666; font-size: 14px; }
    
    .card {
      background: white;
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    
    .btn {
      padding: 10px 20px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      font-size: 14px;
    }
    .btn-primary {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }
    .btn-secondary {
      background: #f0f0f0;
      color: #666;
    }
    .btn-small { padding: 6px 12px; font-size: 12px; }
    
    .filter-select {
      padding: 10px 15px;
      border: 1px solid #ddd;
      border-radius: 8px;
    }
    
    .data-table {
      width: 100%;
      border-collapse: collapse;
    }
    .data-table th, .data-table td {
      padding: 12px;
      text-align: left;
      border-bottom: 1px solid #eee;
    }
    .data-table th {
      background: #f8f9fa;
      font-weight: 600;
    }
    
    .modal {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.5);
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }
    .modal-content {
      background: white;
      border-radius: 12px;
      padding: 24px;
      width: 90%;
      max-width: 600px;
      max-height: 90vh;
      overflow-y: auto;
    }
    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }
    .close-btn {
      font-size: 24px;
      cursor: pointer;
      color: #999;
    }
    .form-group {
      margin-bottom: 16px;
    }
    .form-group label {
      display: block;
      margin-bottom: 6px;
      font-weight: 500;
    }
    .form-control {
      width: 100%;
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 8px;
    }
    textarea.form-control {
      min-height: 120px;
      resize: vertical;
    }
    .modal-footer {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      margin-top: 20px;
    }
    
    .tag {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 4px;
      font-size: 12px;
    }
    .tag-reading { background: #e6f7ff; color: #1890ff; }
    .tag-typing { background: #f6ffed; color: #52c41a; }
    .tag-active { background: #f6ffed; color: #52c41a; }
    .tag-inactive { background: #f5f5f5; color: #999; }
  </style>
</head>
<body>
  <div class="header">
    <h1>👨 🏫 教师管理后台</h1>
    <div>
      <a href="/" style="color: white; text-decoration: none; margin-right: 20px;">学生端首页</a>
      <button class="logout-btn" onclick="logout()">退出登录</button>
    </div>
  </div>

  <div class="tabs">
    <div class="tab active" onclick="switchTab('students', this)">👥 学生管理</div>
    <div class="tab" onclick="switchTab('classes', this)">📚 班级管理</div>
    <div class="tab" onclick="switchTab('content', this)">📝 内容管理</div>
    <div class="tab" onclick="switchTab('rank', this)">🏆 排行榜</div>
  </div>

  <div class="container">
    <!-- 学生管理 -->
    <div id="students-tab" class="tab-content active">
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-value" id="total-students">-</div>
          <div class="stat-label">总学生数</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="completed-info">-</div>
          <div class="stat-label">已完善信息</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="total-classes">-</div>
          <div class="stat-label">班级数量</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="total-practice">-</div>
          <div class="stat-label">练习次数</div>
        </div>
      </div>

      <div class="card">
        <h3 style="margin-bottom: 20px;">学生管理</h3>
        <div style="display: flex; gap: 10px; margin-bottom: 20px;">
          <select id="class-filter" class="filter-select" onchange="loadStudents()">
            <option value="">全部班级</option>
          </select>
          <select id="gender-filter" class="filter-select" onchange="loadStudents()">
            <option value="">全部性别</option>
            <option value="男">男</option>
            <option value="女">女</option>
          </select>
          <button class="btn btn-secondary" onclick="loadStudents()">🔄 刷新</button>
          <button class="btn btn-primary" onclick="deleteSelected()">🗑 批量删除</button>
        </div>
        <div id="students-list">正在加载学生数据...</div>
      </div>
    </div>

    <!-- 班级管理 -->
    <div id="classes-tab" class="tab-content">
      <div class="card">
        <h3 style="margin-bottom: 20px;">班级管理</h3>
        <button class="btn btn-primary" onclick="showClassModal()" style="margin-bottom: 20px;">➕ 创建班级</button>
        <div id="classes-list">正在加载班级数据...</div>
      </div>
    </div>

    <!-- 内容管理 -->
    <div id="content-tab" class="tab-content">
      <div class="card">
        <h3 style="margin-bottom: 20px;">内容管理</h3>
        <div style="display: flex; gap: 10px; margin-bottom: 20px;">
          <button class="btn btn-primary" onclick="showContentModal()">➕ 添加内容</button>
          <select id="content-filter" class="filter-select" onchange="loadContentList()">
            <option value="">全部类型</option>
            <option value="reading">阅读材料</option>
            <option value="typing">打字练习</option>
          </select>
        </div>
        <div id="content-list">正在加载内容数据...</div>
      </div>
    </div>

    <!-- 排行榜 -->
    <div id="rank-tab" class="tab-content">
      <div class="card">
        <h3 style="margin-bottom: 20px;">打字排行榜 TOP 20</h3>
        <div id="rank-list">正在加载排行榜...</div>
      </div>
    </div>
  </div>

  <!-- 编辑学生弹窗 -->
  <div id="student-modal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h3>编辑学生信息</h3>
        <span class="close-btn" onclick="closeStudentModal()">&times;</span>
      </div>
      <div class="form-group">
        <label>昵称</label>
        <input type="text" id="edit-nickname" class="form-control" readonly>
      </div>
      <div class="form-group">
        <label>真实姓名</label>
        <input type="text" id="edit-realname" class="form-control">
      </div>
      <div class="form-group">
        <label>性别</label>
        <select id="edit-gender" class="form-control">
          <option value="">请选择</option>
          <option value="男">男</option>
          <option value="女">女</option>
        </select>
      </div>
      <div class="form-group">
        <label>班级</label>
        <select id="edit-class" class="form-control">
          <option value="">未分班</option>
        </select>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeStudentModal()">取消</button>
        <button class="btn btn-primary" onclick="saveStudent()">保存</button>
      </div>
    </div>
  </div>

  <!-- 创建班级弹窗 -->
  <div id="class-modal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h3>创建班级</h3>
        <span class="close-btn" onclick="closeClassModal()">&times;</span>
      </div>
      <div class="form-group">
        <label>班级名称</label>
        <input type="text" id="class-name" class="form-control" placeholder="例如：三年级一班">
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeClassModal()">取消</button>
        <button class="btn btn-primary" onclick="createClass()">创建</button>
      </div>
    </div>
  </div>

  <!-- 内容编辑弹窗 -->
  <div id="content-modal" class="modal">
    <div class="modal-content" style="max-width: 700px;">
      <div class="modal-header">
        <h3 id="content-modal-title">添加内容</h3>
        <span class="close-btn" onclick="closeContentModal()">&times;</span>
      </div>
      <div class="form-group">
        <label>类型</label>
        <select id="content-type" class="form-control">
          <option value="reading">阅读材料</option>
          <option value="typing">打字练习</option>
        </select>
      </div>
      <div class="form-group">
        <label>标题</label>
        <input type="text" id="content-title" class="form-control" placeholder="输入标题">
      </div>
      <div class="form-group">
        <label>内容</label>
        <textarea id="content-text" class="form-control" rows="10" placeholder="输入内容"></textarea>
      </div>
      <div class="form-group">
        <label>字数（可选，留空自动计算）</label>
        <input type="number" id="content-wordcount" class="form-control" placeholder="自动计算">
      </div>
      <div class="form-group">
        <label>难度</label>
        <select id="content-difficulty" class="form-control">
          <option value="easy">简单</option>
          <option value="medium" selected>中等</option>
          <option value="hard">困难</option>
        </select>
      </div>
      <div class="form-group">
        <label>
          <input type="checkbox" id="content-active" checked> 启用
        </label>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeContentModal()">取消</button>
        <button class="btn btn-primary" onclick="saveContent()">保存</button>
      </div>
    </div>
  </div>

  <script>
    let allStudents = [];
    let allClasses = [];
    let selectedStudents = new Set();
    let editingContentId = null;

    function logout() {
      localStorage.removeItem('teacherLoggedIn');
      window.location.href = '/admin/';
    }

    function switchTab(tab, element) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
      
      element.classList.add('active');
      document.getElementById(tab + '-tab').classList.add('active');
      
      if (tab === 'students') loadStudents();
      if (tab === 'classes') loadClasses();
      if (tab === 'content') loadContentList();
      if (tab === 'rank') loadRank();
    }

    // ========== 学生管理 ==========
    async function loadStudents() {
      try {
        const response = await fetch('/api/admin/students');
        const result = await response.json();
        
        if (result.success) {
          allStudents = result.students;
          updateStats();
          renderStudents();
          updateClassFilter();
        }
      } catch (err) {
        document.getElementById('students-list').innerHTML = '<p style="color: red;">加载失败</p>';
      }
    }

    function updateStats() {
      document.getElementById('total-students').textContent = allStudents.length;
      document.getElementById('completed-info').textContent = allStudents.filter(s => s.realName).length;
      document.getElementById('total-classes').textContent = allClasses.length;
    }

    function updateClassFilter() {
      const options = allClasses.map(c => `<option value=""></option>`).join('');
      document.getElementById('class-filter').innerHTML = '<option value="">全部班级</option>' + options;
      document.getElementById('edit-class').innerHTML = '<option value="">未分班</option>' + options;
    }

    function renderStudents() {
      const classFilter = document.getElementById('class-filter').value;
      const genderFilter = document.getElementById('gender-filter').value;
      
      let filtered = allStudents;
      if (classFilter) filtered = filtered.filter(s => s.className === classFilter);
      if (genderFilter) filtered = filtered.filter(s => s.gender === genderFilter);

      if (filtered.length === 0) {
        document.getElementById('students-list').innerHTML = '<p style="text-align: center; color: #999;">暂无学生数据</p>';
        return;
      }

      let html = '<table class="data-table"><thead><tr>';
      html += '<th><input type="checkbox" onchange="toggleSelectAll(this)"></th>';
      html += '<th>昵称</th><th>真实姓名</th><th>性别</th><th>班级</th><th>注册时间</th><th>操作</th>';
      html += '</tr></thead><tbody>';

      filtered.forEach(s => {
        const date = new Date(s.createdAt).toLocaleDateString();
        // 修复：正确插入变量值
        html += `<tr>
          <td><input type="checkbox" value="" onchange="toggleSelect('', this.checked)"></td>
          <td></td>
          <td></td>
          <td></td>
          <td></td>
          <td></td>
          <td><button class="btn btn-small btn-secondary" onclick="editStudent('')">编辑</button></td>
        </tr>`;
      });

      html += '</tbody></table>';
      document.getElementById('student
