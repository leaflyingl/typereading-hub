<html lang="zh-CN">
<head>
    <meta charset="UTF-8">

    <title>教师管理后台 - TypeReading Hub</title>

        body {

            background: #f5f7fa;

        }
        .container { max-width: 1400px; margin: 0 auto; }
        .header {
            background: white;

            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header h1 { font-size: 24px; color: #333; }
        .header a { color: #667eea; text-decoration: none; }
        .header a:hover { text-decoration: underline; }
        
        .stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 20px;
        }
        .stat-card {
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            text-align: center;
        }
        .stat-card h3 {
            font-size: 32px;
            color: #667eea;
            margin-bottom: 8px;
        }
        .stat-card p { color: #666; font-size: 14px; }
        
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

            padding: 12px 24px;
            background: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            color: #666;
        }
        .tab.active {
            background: #667eea;
            color: white;
        }
