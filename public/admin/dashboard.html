<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>教师管理后台 - TypeReading Hub</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif;
            background: #f5f7fa;
            min-height: 100vh;
        }
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header h1 { font-size: 24px; }
        .header .btn {
            padding: 8px 20px;
            background: rgba(255,255,255,0.2);
            color: white;
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 6px;
            cursor: pointer;
            text-decoration: none;
            margin-left: 10px;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 30px;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-box {
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            text-align: center;
        }
        .stat-box h3 { font-size: 36px; color: #667eea; margin-bottom: 5px; }
        .stat-box p { color: #666; }
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
        }
        .tab {
            padding: 12px 24px;
            border: none;
            background: white;
            cursor: pointer;
            border-radius: 8px;
            font-size: 14px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        .tab.active {
            background: #667eea;
            color: white;
        }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .card {
            background: white;
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            margin-bottom: 25px;
        }
        .card h2 {
            font-size: 18px;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid #eee;
        }
        .filter-bar {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .filter-bar input, .filter-bar select {
            padding: 10px 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
        }
        .filter-bar button {
            padding: 10px 20px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; }
        th { background: #f8f9fa; font-weight: 600; }
        tr:hover { background: #f8f9fa; }
        .badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
        }
        .badge-success { background: #d4edda; color: #155724; }
        .badge-warning { background: #fff3cd; color: #856404; }
        .btn-small {
            padding: 6px 14px;
            font-size: 12px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            margin-right: 5px;
        }
        .btn-edit { background: #28a745; color: white; }
        .empty-state {
            text-align: center;
            padding: 60px;
            color: #999;
        }
        .error { color: #dc3545; padding: 20px; }
        .debug-info {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
            font-size: 13px;
            color: #666;
        }
        .student-class-form {
            display: inline-flex;
            gap: 5px;
            align-items: center;
        }
        .student-class-form input {
            padding: 4px 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 12px;
            width: 80px;
        }
        .student-class-form button {
            padding: 4px 10px;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>👨‍🏫 教师管理后台</h1>
        <div>
            <a href="/" class="btn">学生端首页</a>
            <button class="btn" onclick="logout()">退出登录</button>
        </div>
    </div>
    
    <div class="container">
        <div class="stats-grid">
            <div class="stat-box">
                <h3 id="totalStudents">0</h3>
                <p>总学生数</p>
            </div>
            <div class="stat-box">
                <h3 id="completedInfo">0</h3>
                <p>已完善信息</p>
            </div>
            <div class="stat-box">
                <h3 id="withPassword">0</h3>
                <p>设置密码</p>
            </div>
            <div class="stat-box">
                <h3 id="typingCount">0</h3>
                <p>打字记录</p>
            </div>
        </div>
        
        <div class="tabs">
            <button class="tab active" onclick="switchTab('students', this)">👥 学生管理</button>
            <button class="tab" onclick="switchTab('ranking', this)">🏆 排行榜</button>
            <button class="tab" onclick="switchTab('debug', this)">🔧 调试</button>
        </div>
        
        <!-- 学生管理 -->
        <div id="students-tab" class="tab-content active">
            <div class="card">
                <h2>学生列表</h2>
                <div class="filter-bar">
                    <input type="text" id="searchInput" placeholder="搜索昵称..." onkeyup="filterStudents()">
                    <button onclick="forceLoadStudents()">🔄 强制刷新</button>
                    <button onclick="clearAllData()" style="background:#dc3545;">🗑️ 清空数据</button>
                </div>
                <div id="studentsTable">
                    <p>正在加载学生数据...</p>
                </div>
                <div id="debugInfo" class="debug-info" style="display:none;"></div>
            </div>
        </div>
        
        <!-- 排行榜 -->
        <div id="ranking-tab" class="tab-content">
            <div class="card">
                <h2>打字排行榜 TOP 20</h2>
                <div id="rankingTable">
                    <p>正在加载排行榜...</p>
                </div>
            </div>
        </div>
        
        <!-- 调试 -->
        <div id="debug-tab" class="tab-content">
            <div class="card">
                <h2>存储调试</h2>
                <button onclick="testKVStorage()" class="btn" style="margin-bottom:15px;">测试KV存储</button>
                <div id="debugOutput"></div>
            </div>
        </div>
    </div>

    <script>
        // 登录检查
        if (sessionStorage.getItem('adminLoggedIn') !== 'true') {
            location.href = '/admin/';
        }

        let allStudents = [];

        window.onload = function() {
            loadStudents();
            loadRanking();
        };

        function switchTab(tab, btn) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            btn.classList.add('active');
            document.getElementById(tab + '-tab').classList.add('active');
        }

        async function loadStudents() {
            const tableDiv = document.getElementById('studentsTable');
            const debugDiv = document.getElementById('debugInfo');
            
            tableDiv.innerHTML = '<p>正在加载学生数据...</p>';
            debugDiv.style.display = 'block';
            debugDiv.innerHTML = '正在请求 /api/admin/students...';
            
            try {
                const response = await fetch('/api/admin/students', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({})
                });
                
                debugDiv.innerHTML += '<br>响应状态: ' + response.status;
                
                const data = await response.json();
                debugDiv.innerHTML += '<br>响应数据: ' + JSON.stringify(data).substring(0, 200);
                
                if (data.success && data.students) {
                    allStudents = data.students;
                    renderStudents(allStudents);
                    updateStats();
                } else {
                    tableDiv.innerHTML = '<p class="error">加载失败：' + (data.message || '无数据') + '</p>';
                }
            } catch (error) {
                tableDiv.innerHTML = '<p class="error">网络错误：' + error.message + '</p>';
                debugDiv.innerHTML += '<br>错误详情: ' + error.message;
            }
        }

        function forceLoadStudents() {
            loadStudents();
        }

        function renderStudents(students) {
            const tableDiv = document.getElementById('studentsTable');
            
            if (students.length === 0) {
                tableDiv.innerHTML = '<div class="empty-state"><div style="font-size:64px;margin-bottom:20px;">📭</div><p>暂无学生数据</p><p style="font-size:14px;color:#999;margin-top:10px;">请让学生先注册账号</p></div>';
                return;
            }
            
            let html = `<table>
                <thead>
                    <tr>
                        <th>昵称</th>
                        <th>真实姓名</th>
                        <th>性别</th>
                        <th>密码</th>
                        <th>注册时间</th>
                        <th>班级（从姓名提取）</th>
                    </tr>
                </thead>
                <tbody>`;
            
            students.forEach(s => {
                const hasPassword = s.password ? '✅ 有' : '<span style="color:#999">无</span>';
                const gender = s.gender || '<span style="color:#999">-</span>';
                const realName = s.realName || '<span style="color:#999">未设置</span>';
                const className = extractClass(s.realName);
                const dateStr = s.createdAt ? new Date(s.createdAt).toLocaleDateString('zh-CN') : '-';
                
                html += `<tr>
                    <td><strong>${s.nickname}</strong></td>
                    <td>${realName}</td>
                    <td>${gender}</td>
                    <td>${hasPassword}</td>
                    <td>${dateStr}</td>
                    <td>
                        <span class="badge badge-success">${className || '未分班'}</span>
                    </td>
                </tr>`;
            });
            
            html += '</tbody></table>';
            tableDiv.innerHTML = html;
        }

        // 从真实姓名提取班级（如"一班王小明"提取"一班"）
        function extractClass(realName) {
            if (!realName) return '';
            const match = realName.match(/^([一二三四五六七八九十\d]+班)/);
            return match ? match[1] : '';
        }

        function filterStudents() {
            const search = document.getElementById('searchInput').value.toLowerCase();
            const filtered = allStudents.filter(s => 
                s.nickname.toLowerCase().includes(search) ||
                (s.realName && s.realName.toLowerCase().includes(search))
            );
            renderStudents(filtered);
        }

        function updateStats() {
            document.getElementById('totalStudents').textContent = allStudents.length;
            const completed = allStudents.filter(s => s.realName && s.gender).length;
            document.getElementById('completedInfo').textContent = completed;
            const withPwd = allStudents.filter(s => s.password).length;
            document.getElementById('withPassword').textContent = withPwd;
        }

        async function loadRanking() {
            try {
                const response = await fetch('/api/rank/typing', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ limit: 20 })
                });
                const data = await response.json();
                const tableDiv = document.getElementById('rankingTable');
                
                if (data.success && data.rank?.length > 0) {
                    let html = `<table>
                        <thead>
                            <tr>
                                <th>排名</th>
                                <th>昵称</th>
                                <th>WPM</th>
                                <th>准确率</th>
                            </tr>
                        </thead>
                        <tbody>`;
                    
                    data.rank.forEach((r, i) => {
                        const medal = i < 3 ? ['🥇','🥈','🥉'][i] : (i + 1);
                        html += `<tr>
                            <td style="font-size:20px;">${medal}</td>
                            <td><strong>${r.nickname}</strong></td>
                            <td style="color:#667eea;font-weight:bold;">${r.wpm}</td>
                            <td>${r.accuracy}%</td>
                        </tr>`;
                    });
                    
                    html += '</tbody></table>';
                    tableDiv.innerHTML = html;
                } else {
                    tableDiv.innerHTML = '<div class="empty-state"><p>暂无排行数据</p></div>';
                }
            } catch (error) {
                document.getElementById('rankingTable').innerHTML = '<p class="error">加载失败</p>';
            }
        }

        async function testKVStorage() {
            const output = document.getElementById('debugOutput');
            output.innerHTML = '<p>测试中...</p>';
            
            try {
                // 测试写入
                const testData = { nickname: '__test__', createdAt: new Date().toISOString() };
                await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(testData)
                });
                
                // 测试读取
                const response = await fetch('/api/admin/students', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({})
                });
                const data = await response.json();
                
                output.innerHTML = '<p>✅ 存储测试成功</p><pre>' + JSON.stringify(data, null, 2) + '</pre>';
            } catch (e) {
                output.innerHTML = '<p class="error">❌ 测试失败: ' + e.message + '</p>';
            }
        }

        function clearAllData() {
            if (!confirm('确定要清空所有学生数据吗？此操作不可恢复！')) return;
            
            // 清除 localStorage 中的班级数据
            localStorage.removeItem('customClasses');
            alert('本地数据已清除。如需清除服务器数据，请手动删除 KV 存储。');
            location.reload();
        }

        function logout() {
            sessionStorage.removeItem('adminLoggedIn');
            location.href = '/admin/';
        }
    </script>
</body>
</html>
