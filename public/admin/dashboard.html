<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>教师管理后台 - TypeReading Hub</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f7fa;
      min-height: 100vh;
    }
    .header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 20px 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .header h1 { font-size: 24px; }
    .logout-btn {
      background: rgba(255,255,255,0.2);
      border: 1px solid rgba(255,255,255,0.3);
      color: white;
      padding: 8px 20px;
      border-radius: 20px;
      cursor: pointer;
    }
    
    .tabs {
      display: flex;
      background: white;
      border-bottom: 1px solid #e8e8e8;
      padding: 0 30px;
    }
    .tab {
      padding: 16px 24px;
      cursor: pointer;
      border-bottom: 3px solid transparent;
      color: #666;
    }
    .tab.active {
      color: #667eea;
      border-bottom-color: #667eea;
    }
    
    .container {
      padding: 30px;
      max-width: 1400px;
      margin: 0 auto;
    }
    
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 20px;
      margin-bottom: 30px;
    }
    .stat-card {
      background: white;
      border-radius: 12px;
      padding: 24px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    .stat-value {
      font-size: 36px;
      font-weight: bold;
      color: #667eea;
    }
    .stat-label { color: #666; font-size: 14px; }
    
    .card {
      background: white;
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    
    .btn {
      padding: 10px 20px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      font-size: 14px;
    }
    .btn-primary {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }
    .btn-secondary {
      background: #f0f0f0;
      color: #666;
    }
    .btn-small { padding: 6px 12px; font-size: 12px; }
    
    .filter-select {
      padding: 10px 15px;
      border: 1px solid #ddd;
      border-radius: 8px;
    }
    
    .data-table {
      width: 100%;
      border-collapse: collapse;
    }
    .data-table th, .data-table td {
      padding: 12px;
      text-align: left;
      border-bottom: 1px solid #eee;
    }
    .data-table th {
      background: #f8f9fa;
      font-weight: 600;
    }
    
    .modal {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.5);
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }
    .modal-content {
      background: white;
      border-radius: 12px;
      padding: 24px;
      width: 90%;
      max-width: 600px;
      max-height: 90vh;
      overflow-y: auto;
    }
    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }
    .close-btn {
      font-size: 24px;
      cursor: pointer;
      color: #999;
    }
    .form-group {
      margin-bottom: 16px;
    }
    .form-group label {
      display: block;
      margin-bottom: 6px;
      font-weight: 500;
    }
    .form-control {
      width: 100%;
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 8px;
    }
    textarea.form-control {
      min-height: 120px;
      resize: vertical;
    }
    .modal-footer {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      margin-top: 20px;
    }
    
    .tag {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 4px;
      font-size: 12px;
    }
    .tag-reading { background: #e6f7ff; color: #1890ff; }
    .tag-typing { background: #f6ffed; color: #52c41a; }
    .tag-active { background: #f6ffed; color: #52c41a; }
    .tag-inactive { background: #f5f5f5; color: #999; }
    .tag-group { background: #fff7e6; color: #fa8c16; }
    
    /* 分组相关样式 */
    .group-classes {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 8px;
    }
    .group-class-tag {
      background: #e6f7ff;
      color: #1890ff;
      padding: 4px 10px;
      border-radius: 4px;
      font-size: 12px;
    }
    .checkbox-group {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 8px;
    }
    .checkbox-item {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 8px 12px;
      background: #f5f5f5;
      border-radius: 6px;
      cursor: pointer;
    }
    .checkbox-item:hover {
      background: #e8e8e8;
    }
    .checkbox-item input {
      cursor: pointer;
    }
    .target-type-selector {
      display: flex;
      gap: 20px;
      margin-bottom: 10px;
    }
    .target-type-option {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
    }
    .target-section {
      margin-top: 10px;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>👨 🏫 教师管理后台</h1>
    <div>
      <a href="/" style="color: white; text-decoration: none; margin-right: 20px;">学生端首页</a>
      <button class="logout-btn" onclick="logout()">退出登录</button>
    </div>
  </div>

  <div class="tabs">
    <div class="tab active" onclick="switchTab('students', this)">👥 学生管理</div>
    <div class="tab" onclick="switchTab('classes', this)">📚 班级管理</div>
    <div class="tab" onclick="switchTab('groups', this)">📂 分组管理</div>
    <div class="tab" onclick="switchTab('content', this)">📝 内容管理</div>
    <div class="tab" onclick="switchTab('rank', this)">🏆 排行榜</div>
  </div>

  <div class="container">
    <!-- 学生管理 -->
    <div id="students-tab" class="tab-content active">
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-value" id="total-students">-</div>
          <div class="stat-label">总学生数</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="completed-info">-</div>
          <div class="stat-label">已完善信息</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="total-classes">-</div>
          <div class="stat-label">班级数量</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="total-groups">-</div>
          <div class="stat-label">分组数量</div>
        </div>
      </div>

      <div class="card">
        <h3 style="margin-bottom: 20px;">学生管理</h3>
        <div style="display: flex; gap: 10px; margin-bottom: 20px;">
          <select id="class-filter" class="filter-select" onchange="loadStudents()">
            <option value="">全部班级</option>
          </select>
          <select id="group-filter" class="filter-select" onchange="loadStudents()">
            <option value="">全部分组</option>
          </select>
          <select id="gender-filter" class="filter-select" onchange="loadStudents()">
            <option value="">全部性别</option>
            <option value="男">男</option>
            <option value="女">女</option>
          </select>
          <button class="btn btn-secondary" onclick="loadStudents()">🔄 刷新</button>
          <button class="btn btn-primary" onclick="deleteSelected()">🗑 批量删除</button>
        </div>
        <div id="students-list">正在加载学生数据...</div>
      </div>
    </div>

    <!-- 班级管理 -->
    <div id="classes-tab" class="tab-content">
      <div class="card">
        <h3 style="margin-bottom: 20px;">班级管理</h3>
        <button class="btn btn-primary" onclick="showClassModal()" style="margin-bottom: 20px;">➕ 创建班级</button>
        <div id="classes-list">正在加载班级数据...</div>
      </div>
    </div>

    <!-- 分组管理 -->
    <div id="groups-tab" class="tab-content">
      <div class="card">
        <h3 style="margin-bottom: 20px;">分组管理</h3>
        <button class="btn btn-primary" onclick="showGroupModal()" style="margin-bottom: 20px;">➕ 创建分组</button>
        <div id="groups-list">正在加载分组数据...</div>
      </div>
    </div>

    <!-- 内容管理 -->
    <div id="content-tab" class="tab-content">
      <div class="card">
        <h3 style="margin-bottom: 20px;">内容管理</h3>
        <div style="display: flex; gap: 10px; margin-bottom: 20px;">
          <button class="btn btn-primary" onclick="showContentModal()">➕ 添加内容</button>
          <select id="content-filter" class="filter-select" onchange="loadContentList()">
            <option value="">全部类型</option>
            <option value="reading">阅读材料</option>
            <option value="typing">打字练习</option>
          </select>
        </div>
        <div id="content-list">正在加载内容数据...</div>
      </div>
    </div>

    <!-- 排行榜 -->
    <div id="rank-tab" class="tab-content">
      <div class="card">
        <h3 style="margin-bottom: 20px;">打字排行榜 TOP 20</h3>
        <div id="rank-list">正在加载排行榜...</div>
      </div>
    </div>
  </div>

  <!-- 编辑学生弹窗 -->
  <div id="student-modal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h3>编辑学生信息</h3>
        <span class="close-btn" onclick="closeStudentModal()">&times;</span>
      </div>
      <div class="form-group">
        <label>昵称</label>
        <input type="text" id="edit-nickname" class="form-control" readonly>
      </div>
      <div class="form-group">
        <label>真实姓名</label>
        <input type="text" id="edit-realname" class="form-control">
      </div>
      <div class="form-group">
        <label>性别</label>
        <select id="edit-gender" class="form-control">
          <option value="">请选择</option>
          <option value="男">男</option>
          <option value="女">女</option>
        </select>
      </div>
      <div class="form-group">
        <label>班级</label>
        <select id="edit-class" class="form-control">
          <option value="">未分班</option>
        </select>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeStudentModal()">取消</button>
        <button class="btn btn-primary" onclick="saveStudent()">保存</button>
      </div>
    </div>
  </div>

  <!-- 创建班级弹窗 -->
  <div id="class-modal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h3>创建班级</h3>
        <span class="close-btn" onclick="closeClassModal()">&times;</span>
      </div>
      <div class="form-group">
        <label>班级名称</label>
        <input type="text" id="class-name" class="form-control" placeholder="例如：三年级一班">
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeClassModal()">取消</button>
        <button class="btn btn-primary" onclick="createClass()">创建</button>
      </div>
    </div>
  </div>

  <!-- 创建/编辑分组弹窗 -->
  <div id="group-modal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h3 id="group-modal-title">创建分组</h3>
        <span class="close-btn" onclick="closeGroupModal()">&times;</span>
      </div>
      <div class="form-group">
        <label>分组名称</label>
        <input type="text" id="group-name" class="form-control" placeholder="例如：KET冲刺班">
      </div>
      <div class="form-group">
        <label>选择班级（可多选）</label>
        <div id="group-classes-selection" class="checkbox-group">
          <!-- 动态生成班级复选框 -->
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeGroupModal()">取消</button>
        <button class="btn btn-primary" onclick="saveGroup()">保存</button>
      </div>
    </div>
  </div>

  <!-- 内容编辑弹窗 -->
  <div id="content-modal" class="modal">
    <div class="modal-content" style="max-width: 700px;">
      <div class="modal-header">
        <h3 id="content-modal-title">添加内容</h3>
        <span class="close-btn" onclick="closeContentModal()">&times;</span>
      </div>
      <div class="form-group">
        <label>类型</label>
        <select id="content-type" class="form-control">
          <option value="reading">阅读材料</option>
          <option value="typing">打字练习</option>
        </select>
      </div>
      <div class="form-group">
        <label>标题</label>
        <input type="text" id="content-title" class="form-control" placeholder="输入标题">
      </div>
      <div class="form-group">
        <label>内容</label>
        <textarea id="content-text" class="form-control" rows="10" placeholder="输入内容"></textarea>
      </div>
      <div class="form-group">
        <label>字数（可选，留空自动计算）</label>
        <input type="number" id="content-wordcount" class="form-control" placeholder="自动计算">
      </div>
      <div class="form-group">
        <label>难度</label>
        <select id="content-difficulty" class="form-control">
          <option value="easy">简单</option>
          <option value="medium" selected>中等</option>
          <option value="hard">困难</option>
        </select>
      </div>
      
      <!-- 目标选择：班级或分组 -->
      <div class="form-group">
        <label>分发目标</label>
        <div class="target-type-selector">
          <label class="target-type-option">
            <input type="radio" name="target-type" value="all" checked onchange="toggleTargetSection()"> 所有班级
          </label>
          <label class="target-type-option">
            <input type="radio" name="target-type" value="class" onchange="toggleTargetSection()"> 指定班级
          </label>
          <label class="target-type-option">
            <input type="radio" name="target-type" value="group" onchange="toggleTargetSection()"> 指定分组
          </label>
        </div>
        
        <div id="target-class-section" class="target-section" style="display: none;">
          <label>选择班级（可多选）</label>
          <div id="content-target-classes" class="checkbox-group">
            <!-- 动态生成 -->
          </div>
        </div>
        
        <div id="target-group-section" class="target-section" style="display: none;">
          <label>选择分组（可多选）</label>
          <div id="content-target-groups" class="checkbox-group">
            <!-- 动态生成 -->
          </div>
        </div>
      </div>
      
      <div class="form-group">
        <label>
          <input type="checkbox" id="content-active" checked> 启用
        </label>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeContentModal()">取消</button>
        <button class="btn btn-primary" onclick="saveContent()">保存</button>
      </div>
    </div>
  </div>

  <script>
    let allStudents = [];
    let allClasses = [];
    let allGroups = [];
    let selectedStudents = new Set();
    let editingContentId = null;
    let editingGroupId = null;

    function logout() {
      localStorage.removeItem('teacherLoggedIn');
      window.location.href = '/admin/';
    }

    function switchTab(tab, element) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
      
      element.classList.add('active');
      document.getElementById(tab + '-tab').classList.add('active');
      
      if (tab === 'students') loadStudents();
      if (tab === 'classes') loadClasses();
      if (tab === 'groups') loadGroups();
      if (tab === 'content') loadContentList();
      if (tab === 'rank') loadRank();
    }

    // ========== 学生管理 ==========
    async function loadStudents() {
      try {
        const response = await fetch('/api/admin/students');
        const result = await response.json();
        
        if (result.success) {
          allStudents = result.students;
          updateStats();
          renderStudents();
          updateFilters();
        }
      } catch (err) {
        console.error('加载学生失败:', err);
        document.getElementById('students-list').innerHTML = '<p style="color: red;">加载失败: ' + err.message + '</p>';
      }
    }

    function updateStats() {
      document.getElementById('total-students').textContent = allStudents.length;
      document.getElementById('completed-info').textContent = allStudents.filter(s => s.realName).length;
      document.getElementById('total-classes').textContent = allClasses.length;
      document.getElementById('total-groups').textContent = allGroups.length;
    }

    function updateFilters() {
      // 更新班级筛选器
      const classOptions = allClasses.map(c => '<option value="' + c.name + '">' + c.name + '</option>').join('');
      document.getElementById('class-filter').innerHTML = '<option value="">全部班级</option>' + classOptions;
      document.getElementById('edit-class').innerHTML = '<option value="">未分班</option>' + classOptions;
      
      // 更新分组筛选器
      const groupOptions = allGroups.map(g => '<option value="' + g.id + '">' + g.name + '</option>').join('');
      document.getElementById('group-filter').innerHTML = '<option value="">全部分组</option>' + groupOptions;
    }

    function renderStudents() {
      const classFilter = document.getElementById('class-filter').value;
      const groupFilter = document.getElementById('group-filter').value;
      const genderFilter = document.getElementById('gender-filter').value;
      
      let filtered = allStudents;
      
      // 按班级筛选
      if (classFilter) filtered = filtered.filter(s => s.className === classFilter);
      
      // 按分组筛选
      if (groupFilter) {
        const group = allGroups.find(g => g.id === groupFilter);
        if (group && group.classes) {
          filtered = filtered.filter(s => group.classes.includes(s.className));
        }
      }
      
      // 按性别筛选
      if (genderFilter) filtered = filtered.filter(s => s.gender === genderFilter);

      if (filtered.length === 0) {
        document.getElementById('students-list').innerHTML = '<p style="text-align: center; color: #999;">暂无学生数据</p>';
        return;
      }

      let html = '<table class="data-table"><thead><tr>';
      html += '<th><input type="checkbox" onchange="toggleSelectAll(this)"></th>';
      html += '<th>昵称</th><th>真实姓名</th><th>性别</th><th>班级</th><th>分组</th><th>阅读单词数</th><th>打字单词数</th><th>注册时间</th><th>操作</th>';
      html += '</tr></thead><tbody>';

      filtered.forEach(s => {
        const date = new Date(s.createdAt).toLocaleDateString();
        // 查找学生所属的分组
        const studentGroups = allGroups
          .filter(g => g.classes && g.classes.includes(s.className))
          .map(g => g.name)
          .join(', ');
        
        html += '<tr>' +
          '<td><input type="checkbox" value="' + s.nickname + '" onchange="toggleSelect(\'' + s.nickname + '\', this.checked)"></td>' +
          '<td>' + (s.nickname || '') + '</td>' +
          '<td>' + (s.realName || '-') + '</td>' +
          '<td>' + (s.gender || '-') + '</td>' +
          '<td>' + (s.className || '-') + '</td>' +
          '<td>' + (studentGroups || '-') + '</td>' +
          '<td>' + (s.totalReadingWords || 0) + '</td>' +
          '<td>' + (s.totalTypingWords || 0) + '</td>' +
          '<td>' + date + '</td>' +
          '<td><button class="btn btn-small btn-secondary" onclick="editStudent(\'' + s.nickname + '\')">编辑</button></td>' +
        '</tr>';
      });

      html += '</tbody></table>';
      document.getElementById('students-list').innerHTML = html;
    }

    function toggleSelectAll(cb) {
      document.querySelectorAll('#students-list input[type="checkbox"]').forEach(box => {
        if (box !== cb) {
          box.checked = cb.checked;
          if (box.value) toggleSelect(box.value, cb.checked);
        }
      });
    }

    function toggleSelect(nickname, checked) {
      if (checked) selectedStudents.add(nickname);
      else selectedStudents.delete(nickname);
    }

    function editStudent(nickname) {
      const s = allStudents.find(x => x.nickname === nickname);
      if (!s) return;
      document.getElementById('edit-nickname').value = s.nickname;
      document.getElementById('edit-realname').value = s.realName || '';
      document.getElementById('edit-gender').value = s.gender || '';
      document.getElementById('edit-class').value = s.className || '';
      document.getElementById('student-modal').style.display = 'flex';
    }

    function closeStudentModal() {
      document.getElementById('student-modal').style.display = 'none';
    }

    async function saveStudent() {
      const data = {
        nickname: document.getElementById('edit-nickname').value,
        realName: document.getElementById('edit-realname').value.trim(),
        gender: document.getElementById('edit-gender').value,
        className: document.getElementById('edit-class').value
      };
      try {
        const res = await fetch('/api/admin/student/update', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data)
        });
        const result = await res.json();
        if (result.success) {
          closeStudentModal();
          loadStudents();
        }
      } catch (e) {
        alert('保存失败');
      }
    }

    async function deleteSelected() {
      if (selectedStudents.size === 0) {
        alert('请先选择学生');
        return;
      }
      if (!confirm('确定删除选中的 ' + selectedStudents.size + ' 名学生吗？')) return;
      try {
        const res = await fetch('/api/admin/student/delete-batch', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ nicknames: Array.from(selectedStudents) })
        });
        const result = await res.json();
        if (result.success) {
          selectedStudents.clear();
          loadStudents();
        }
      } catch (e) {
        alert('删除失败');
      }
    }

    // ========== 班级管理 ==========
    async function loadClasses() {
      try {
        const res = await fetch('/api/admin/classes');
        const result = await res.json();
        if (result.success) {
          allClasses = result.classes || [];
          updateStats();
          renderClasses();
          updateFilters();
        }
      } catch (e) {
        console.error('加载班级失败:', e);
        document.getElementById('classes-list').innerHTML = '<p style="color: red;">加载失败: ' + e.message + '</p>';
      }
    }

    function renderClasses() {
      if (allClasses.length === 0) {
        document.getElementById('classes-list').innerHTML = '<p style="text-align: center; color: #999;">暂无班级</p>';
        return;
      }
      let html = '<table class="data-table"><thead><tr><th>班级名称</th><th>学生数</th><th>所属分组</th><th>创建时间</th></tr></thead><tbody>';
      allClasses.forEach(c => {
        const count = allStudents.filter(s => s.className === c.name).length;
        // 查找班级所属的分组
        const classGroups = allGroups
          .filter(g => g.classes && g.classes.includes(c.name))
          .map(g => '<span class="tag tag-group">' + g.name + '</span>')
          .join(' ');
        const date = new Date(c.createdAt).toLocaleDateString();
        html += '<tr><td>' + c.name + '</td><td>' + count + '</td><td>' + (classGroups || '-') + '</td><td>' + date + '</td></tr>';
      });
      html += '</tbody></table>';
      document.getElementById('classes-list').innerHTML = html;
    }

    function showClassModal() {
      document.getElementById('class-name').value = '';
      document.getElementById('class-modal').style.display = 'flex';
    }

    function closeClassModal() {
      document.getElementById('class-modal').style.display = 'none';
    }

    async function createClass() {
      const name = document.getElementById('class-name').value.trim();
      if (!name) {
        alert('请输入班级名称');
        return;
      }
      
      console.log('正在创建班级:', name);
      
      try {
        const res = await fetch('/api/admin/class/create', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ className: name })
        });
        
        console.log('创建班级响应状态:', res.status);
        
        const result = await res.json();
        console.log('创建班级响应数据:', result);
        
        if (result.success) {
          closeClassModal();
          await loadClasses();
          alert('班级创建成功！');
        } else {
          alert('创建失败: ' + (result.message || '未知错误'));
        }
      } catch (e) {
        console.error('创建班级出错:', e);
        alert('创建失败: ' + e.message);
      }
    }

    // ========== 分组管理 ==========
    async function loadGroups() {
      try {
        const res = await fetch('/api/admin/groups/list');
        const result = await res.json();
        console.log('加载分组响应:', result);
        
        if (result.success) {
          // 确保每个分组都有 classes 数组
          allGroups = (result.groups || []).map(g => ({
            ...g,
            classes: g.classes || []
          }));
          updateStats();
          renderGroups();
          updateFilters();
        }
      } catch (e) {
        console.error('加载分组失败:', e);
        document.getElementById('groups-list').innerHTML = '<p style="color: red;">加载失败: ' + e.message + '</p>';
      }
    }

    function renderGroups() {
      if (allGroups.length === 0) {
        document.getElementById('groups-list').innerHTML = '<p style="text-align: center; color: #999;">暂无分组</p>';
        return;
      }
      
      try {
        let html = '<table class="data-table"><thead><tr><th>分组名称</th><th>包含班级</th><th>学生数</th><th>创建时间</th><th>操作</th></tr></thead><tbody>';
        allGroups.forEach(g => {
          // 确保 classes 是数组
          const groupClasses = g.classes || [];
          
          // 计算分组内的学生数
          const studentCount = allStudents.filter(s => groupClasses.includes(s.className)).length;
          const classesHtml = groupClasses.map(c => '<span class="group-class-tag">' + c + '</span>').join('');
          const date = new Date(g.createdAt).toLocaleDateString();
          
          html += '<tr>' +
            '<td>' + g.name + '</td>' +
            '<td><div class="group-classes">' + (classesHtml || '-') + '</div></td>' +
            '<td>' + studentCount + '</td>' +
            '<td>' + date + '</td>' +
            '<td>' +
              '<button class="btn btn-small btn-secondary" onclick="editGroup(\'' + g.id + '\')">编辑</button> ' +
              '<button class="btn btn-small" style="background: #ff4d4f; color: white;" onclick="deleteGroup(\'' + g.id + '\')">删除</button>' +
            '</td>' +
          '</tr>';
        });
        html += '</tbody></table>';
        document.getElementById('groups-list').innerHTML = html;
      } catch (e) {
        console.error('渲染分组列表出错:', e);
        document.getElementById('groups-list').innerHTML = '<p style="color: red;">渲染失败: ' + e.message + '</p>';
      }
    }

    function showGroupModal() {
      editingGroupId = null;
      document.getElementById('group-modal-title').textContent = '创建分组';
      document.getElementById('group-name').value = '';
      renderGroupClassSelection([]);
      document.getElementById('group-modal').style.display = 'flex';
    }

    function editGroup(groupId) {
      const group = allGroups.find(g => g.id === groupId);
      if (!group) return;
      editingGroupId = groupId;
      document.getElementById('group-modal-title').textContent = '编辑分组';
      document.getElementById('group-name').value = group.name;
      renderGroupClassSelection(group.classes || []);
      document.getElementById('group-modal').style.display = 'flex';
    }

    function renderGroupClassSelection(selectedClasses) {
      const container = document.getElementById('group-classes-selection');
      if (allClasses.length === 0) {
        container.innerHTML = '<p style="color: #999;">请先创建班级</p>';
        return;
      }
      // 确保 selectedClasses 是数组
      const selected = selectedClasses || [];
      
      let html = '';
      allClasses.forEach(c => {
        const checked = selected.includes(c.name) ? 'checked' : '';
        html += '<label class="checkbox-item">' +
          '<input type="checkbox" value="' + c.name + '" ' + checked + '> ' +
          c.name +
        '</label>';
      });
      container.innerHTML = html;
    }

    function closeGroupModal() {
      document.getElementById('group-modal').style.display = 'none';
      editingGroupId = null;
    }

    async function saveGroup() {
      const name = document.getElementById('group-name').value.trim();
      if (!name) {
        alert('请输入分组名称');
        return;
      }
      
      // 获取选中的班级
      const selectedClasses = [];
      document.querySelectorAll('#group-classes-selection input:checked').forEach(cb => {
        selectedClasses.push(cb.value);
      });
      
      const data = {
        id: editingGroupId,
        name: name,
        classes: selectedClasses
      };
      
      console.log('正在保存分组:', data);
      
      try {
        const res = await fetch('/api/admin/groups/save', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data)
        });
        
        console.log('保存分组响应状态:', res.status);
        
        const result = await res.json();
        console.log('保存分组响应数据:', result);
        
        if (result.success) {
          closeGroupModal();
          await loadGroups();
          // 刷新学生列表以更新分组显示
          await loadStudents();
          alert(editingGroupId ? '分组更新成功！' : '分组创建成功！');
        } else {
          alert('保存失败: ' + (result.message || '未知错误'));
        }
      } catch (e) {
        console.error('保存分组出错:', e);
        alert('网络错误: ' + e.message);
      }
    }

    async function deleteGroup(groupId) {
      if (!confirm('确定删除此分组？')) return;
      
      console.log('正在删除分组:', groupId);
      
      try {
        const res = await fetch('/api/admin/groups/delete', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ id: groupId })
        });
        
        console.log('删除分组响应状态:', res.status);
        
        const result = await res.json();
        console.log('删除分组响应数据:', result);
        
        if (result.success) {
          await loadGroups();
          await loadStudents();
          alert('分组删除成功！');
        } else {
          alert('删除失败: ' + (result.message || '未知错误'));
        }
      } catch (e) {
        console.error('删除分组出错:', e);
        alert('网络错误: ' + e.message);
      }
    }

    // ========== 内容管理 ==========
    async function loadContentList() {
      const filter = document.getElementById('content-filter').value;
      try {
        const res = await fetch('/api/admin/content/list', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ type: filter })
        });
        const result = await res.json();
        if (result.success) renderContentList(result.contents);
      } catch (e) {
        console.error('加载内容失败:', e);
        document.getElementById('content-list').innerHTML = '<p style="color: red;">加载失败: ' + e.message + '</p>';
      }
    }

    function renderContentList(contents) {
      if (contents.length === 0) {
        document.getElementById('content-list').innerHTML = '<p style="text-align: center; color: #999; padding: 40px;">暂无内容</p>';
        return;
      }
      
      try {
        let html = '<table class="data-table"><thead><tr><th>类型</th><th>标题</th><th>字数</th><th>难度</th><th>分发目标</th><th>状态</th><th>更新时间</th><th>操作</th></tr></thead><tbody>';
        contents.forEach(item => {
          const typeTag = item.type === 'reading' ? '<span class="tag tag-reading">📖 阅读</span>' : '<span class="tag tag-typing">⌨️ 打字</span>';
          const diff = { easy: '简单', medium: '中等', hard: '困难' }[item.difficulty] || '中等';
          
          // 显示分发目标
          let targetDisplay = '所有班级';
          if (item.targetType === 'class' && item.targetClasses && item.targetClasses.length > 0) {
            targetDisplay = '班级: ' + item.targetClasses.join(', ');
          } else if (item.targetType === 'group' && item.targetGroups && item.targetGroups.length > 0) {
            const groupNames = item.targetGroups.map(gid => {
              const g = allGroups.find(grp => grp.id === gid);
              return g ? g.name : gid;
            });
            targetDisplay = '分组: ' + groupNames.join(', ');
          }
          
          const status = item.isActive ? '<span class="tag tag-active">启用</span>' : '<span class="tag tag-inactive">禁用</span>';
          const date = new Date(item.updatedAt).toLocaleDateString();
          html += '<tr>' +
            '<td>' + typeTag + '</td>' +
            '<td>' + item.title + '</td>' +
            '<td>' + (item.wordCount || 0) + '</td>' +
            '<td>' + diff + '</td>' +
            '<td>' + targetDisplay + '</td>' +
            '<td>' + status + '</td>' +
            '<td>' + date + '</td>' +
            '<td>' +
              '<button class="btn btn-small btn-secondary" onclick="editContentById(\'' + item.id + '\')">编辑</button> ' +
              '<button class="btn btn-small" style="background: #ff4d4f; color: white;" onclick="deleteContent(\'' + item.id + '\', \'' + item.type + '\')">删除</button>' +
            '</td>' +
          '</tr>';
        });
        html += '</tbody></table>';
        document.getElementById('content-list').innerHTML = html;
        window.currentContents = contents;
      } catch (e) {
        console.error('渲染内容列表出错:', e);
        document.getElementById('content-list').innerHTML = '<p style="color: red;">渲染失败: ' + e.message + '</p>';
      }
    }

    function editContentById(id) {
      const item = window.currentContents.find(c => c.id === id);
      if (item) editContent(item);
    }

    function showContentModal() {
      editingContentId = null;
      document.getElementById('content-modal-title').textContent = '添加内容';
      document.getElementById('content-type').value = 'reading';
      document.getElementById('content-title').value = '';
      document.getElementById('content-text').value = '';
      document.getElementById('content-wordcount').value = '';
      document.getElementById('content-difficulty').value = 'medium';
      
      // 重置目标选择
      document.querySelector('input[name="target-type"][value="all"]').checked = true;
      toggleTargetSection();
      
      document.getElementById('content-active').checked = true;
      document.getElementById('content-modal').style.display = 'flex';
    }

    function editContent(content) {
      editingContentId = content.id;
      document.getElementById('content-modal-title').textContent = '编辑内容';
      document.getElementById('content-type').value = content.type;
      document.getElementById('content-title').value = content.title;
      document.getElementById('content-text').value = content.content;
      document.getElementById('content-wordcount').value = content.wordCount || '';
      document.getElementById('content-difficulty').value = content.difficulty || 'medium';
      
      // 设置目标选择
      const targetType = content.targetType || 'all';
      document.querySelector('input[name="target-type"][value="' + targetType + '"]').checked = true;
      toggleTargetSection();
      
      if (targetType === 'class' && content.targetClasses) {
        document.querySelectorAll('#content-target-classes input').forEach(cb => {
          cb.checked = content.targetClasses.includes(cb.value);
        });
      } else if (targetType === 'group' && content.targetGroups) {
        document.querySelectorAll('#content-target-groups input').forEach(cb => {
          cb.checked = content.targetGroups.includes(cb.value);
        });
      }
      
      document.getElementById('content-active').checked = content.isActive !== false;
      document.getElementById('content-modal').style.display = 'flex';
    }

    function toggleTargetSection() {
      const targetType = document.querySelector('input[name="target-type"]:checked').value;
      document.getElementById('target-class-section').style.display = targetType === 'class' ? 'block' : 'none';
      document.getElementById('target-group-section').style.display = targetType === 'group' ? 'block' : 'none';
      
      // 渲染班级选择
      if (targetType === 'class') {
        const container = document.getElementById('content-target-classes');
        let html = '';
        allClasses.forEach(c => {
          html += '<label class="checkbox-item">' +
            '<input type="checkbox" value="' + c.name + '"> ' +
            c.name +
          '</label>';
        });
        container.innerHTML = html;
      }
      
      // 渲染分组选择
      if (targetType === 'group') {
        const container = document.getElementById('content-target-groups');
        let html = '';
        allGroups.forEach(g => {
          html += '<label class="checkbox-item">' +
            '<input type="checkbox" value="' + g.id + '"> ' +
            g.name +
          '</label>';
        });
        container.innerHTML = html;
      }
    }

    function closeContentModal() {
      document.getElementById('content-modal').style.display = 'none';
      editingContentId = null;
    }

    async function saveContent() {
      const targetType = document.querySelector('input[name="target-type"]:checked').value;
      
      let targetClasses = [];
      let targetGroups = [];
      
      if (targetType === 'class') {
        document.querySelectorAll('#content-target-classes input:checked').forEach(cb => {
          targetClasses.push(cb.value);
        });
      } else if (targetType === 'group') {
        document.querySelectorAll('#content-target-groups input:checked').forEach(cb => {
          targetGroups.push(cb.value);
        });
      }
      
      const data = {
        id: editingContentId,
        type: document.getElementById('content-type').value,
        title: document.getElementById('content-title').value.trim(),
        content: document.getElementById('content-text').value.trim(),
        wordCount: document.getElementById('content-wordcount').value || document.getElementById('content-text').value.length,
        difficulty: document.getElementById('content-difficulty').value,
        targetType: targetType,
        targetClasses: targetClasses,
        targetGroups: targetGroups,
        isActive: document.getElementById('content-active').checked
      };
      
      if (!data.title || !data.content) {
        alert('请填写标题和内容');
        return;
      }
      
      if (targetType === 'class' && targetClasses.length === 0) {
        alert('请至少选择一个班级');
        return;
      }
      
      if (targetType === 'group' && targetGroups.length === 0) {
        alert('请至少选择一个分组');
        return;
      }
      
      console.log('正在保存内容:', data);
      
      try {
        const res = await fetch('/api/admin/content/save', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data)
        });
        
        console.log('保存内容响应状态:', res.status);
        
        const result = await res.json();
        console.log('保存内容响应数据:', result);
        
        if (result.success) {
          closeContentModal();
          loadContentList();
          alert('内容保存成功！');
        } else {
          alert('保存失败: ' + (result.message || '未知错误'));
        }
      } catch (e) {
        console.error('保存内容出错:', e);
        alert('网络错误: ' + e.message);
      }
    }

    async function deleteContent(id, type) {
      if (!confirm('确定删除此内容？')) return;
      
      console.log('正在删除内容:', id, type);
      
      try {
        const res = await fetch('/api/admin/content/delete', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ id, type })
        });
        
        console.log('删除内容响应状态:', res.status);
        
        const result = await res.json();
        console.log('删除内容响应数据:', result);
        
        if (result.success) {
          loadContentList();
          alert('内容删除成功！');
        } else {
          alert('删除失败: ' + (result.message || '未知错误'));
        }
      } catch (e) {
        console.error('删除内容出错:', e);
        alert('网络错误: ' + e.message);
      }
    }

    // ========== 排行榜 ==========
    async function loadRank() {
      try {
        const res = await fetch('/api/rank/typing');
        const result = await res.json();
        if (result.success) renderRank(result.rank);
      } catch (e) {
        console.error('加载排行榜失败:', e);
        document.getElementById('rank-list').innerHTML = '<p style="color: red;">加载失败: ' + e.message + '</p>';
      }
    }

    function renderRank(rank) {
      if (rank.length === 0) {
        document.getElementById('rank-list').innerHTML = '<p style="text-align: center; color: #999;">暂无数据</p>';
        return;
      }
      let html = '<table class="data-table"><thead><tr><th>排名</th><th>姓名</th><th>班级</th><th>速度(WPM)</th><th>准确率</th></tr></thead><tbody>';
      rank.forEach((r, i) => {
        html += '<tr><td>' + (i + 1) + '</td><td>' + (r.realName || '-') + '</td><td>' + (r.className || '-') + '</td><td>' + r.wpm + '</td><td>' + r.accuracy + '%</td></tr>';
      });
      html += '</tbody></table>';
      document.getElementById('rank-list').innerHTML = html;
    }

    // 初始化
    loadStudents();
  </script>
</body>
</html>
