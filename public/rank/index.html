<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>打字排行榜 - TypeReading Hub</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container { max-width: 800px; margin: 0 auto; }
        
        .back { 
            color: white; 
            text-decoration: none; 
            display: inline-block; 
            margin-bottom: 20px;
            font-size: 14px;
        }
        
        .back:hover { text-decoration: underline; }
        
        .card {
            background: white;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        
        h1 { 
            color: #333; 
            margin-bottom: 20px; 
            text-align: center;
            font-size: 24px;
        }
        
        /* 标签切换样式 */
        .tab-container {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 25px;
        }
        
        .tab {
            padding: 10px 30px;
            border: 2px solid #667eea;
            background: white;
            color: #667eea;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }
        
        .tab.active {
            background: #667eea;
            color: white;
        }
        
        .tab:hover:not(.active) {
            background: #f0f0ff;
        }
        
        /* 当前班级信息 */
        .class-info {
            text-align: center;
            color: #666;
            font-size: 13px;
            margin-bottom: 15px;
        }
        
        /* 表格样式 */
        table { 
            width: 100%; 
            border-collapse: collapse; 
        }
        
        th, td { 
            padding: 15px 12px; 
            text-align: left; 
            border-bottom: 1px solid #eee; 
        }
        
        th { 
            background: #f8f9fa; 
            font-weight: 600;
            color: #666;
            font-size: 13px;
            cursor: pointer;
            user-select: none;
        }
        
        th:hover {
            background: #e8e8e8;
        }
        
        th.active-sort {
            color: #667eea;
        }
        
        tr:hover { background: #f8f9fa; }
        
        /* 排名样式 */
        .rank-cell {
            font-weight: bold;
            font-size: 16px;
            width: 60px;
        }
        
        .rank-medal {
            font-size: 24px;
        }
        
        /* 前三名特殊背景 */
        tr.top-1 { background: linear-gradient(90deg, #fff9e6 0%, #fff 100%); }
        tr.top-2 { background: linear-gradient(90deg, #f5f5f5 0%, #fff 100%); }
        tr.top-3 { background: linear-gradient(90deg, #fff5eb 0%, #fff 100%); }
        
        /* 姓名和班级 */
        .name-cell {
            font-weight: 500;
            color: #333;
        }
        
        .class-tag {
            display: inline-block;
            padding: 2px 8px;
            background: #f0f0f0;
            border-radius: 4px;
            font-size: 12px;
            color: #666;
            margin-top: 4px;
        }
        
        /* WPM 和准确率 */
        .wpm { 
            color: #667eea; 
            font-weight: bold;
            font-size: 18px;
        }
        
        .accuracy {
            color: #52c41a;
            font-weight: 500;
        }
        
        /* 空状态 */
        .empty { 
            text-align: center; 
            padding: 60px; 
            color: #999; 
        }
        
        .empty-icon {
            font-size: 48px;
            margin-bottom: 15px;
        }
        
        /* 底部按钮 */
        .footer {
            text-align: center; 
            margin-top: 25px;
        }
        
        .btn {
            padding: 10px 24px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            text-decoration: none;
            display: inline-block;
        }
        
        .btn-secondary { 
            background: #f0f0f0; 
            color: #333; 
        }
        
        .btn-secondary:hover {
            background: #e0e0e0;
        }
        
        /* 加载动画 */
        .loading {
            text-align: center;
            padding: 60px;
            color: #999;
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="/" class="back">← 返回首页</a>
        
        <div class="card">
            <h1>🏆 打字排行榜</h1>
            
             <!-- 标签切换 -->
            <div class="tab-container">
                <button class="tab" id="classTab" onclick="switchTab('class')">
                    📚 班级榜
                </button>
                <button class="tab" id="groupTab" onclick="switchTab('group')">
                    📂 组榜
                </button>
                <button class="tab" id="allTab" onclick="switchTab('all')">
                    🌍 总榜
                </button>
            </div>

            
            <!-- 当前班级信息 -->
            <div class="class-info" id="classInfo"></div>
            
            <!-- 排行榜列表 -->
            <div id="rankingList">
                <div class="loading">加载中...</div>
            </div>
            
            <div class="footer">
                <a href="/" class="btn btn-secondary">返回首页</a>
            </div>
        </div>
    </div>

    <script>
        let currentTab = 'class';
        let currentUser = null;
        let currentData = [];
        let sortField = 'wpm';
        let userGroupName = '';  // 用户所在分组名称
        
        // 页面加载时恢复标签状态
        function init() {
            const urlParams = new URLSearchParams(window.location.search);
            const tabFromUrl = urlParams.get('tab');
            const tabFromStorage = localStorage.getItem('rankTab');
            
            if (tabFromUrl && ['class', 'group', 'all'].includes(tabFromUrl)) {
                currentTab = tabFromUrl;
            } else if (tabFromStorage && ['class', 'group', 'all'].includes(tabFromStorage)) {
                currentTab = tabFromStorage;
            }
            
            const sortFromUrl = urlParams.get('sort');
            if (sortFromUrl && ['wpm', 'accuracy'].includes(sortFromUrl)) {
                sortField = sortFromUrl;
            }
            
            updateTabUI();
            loadRanking();
        }
        
        function getCurrentUser() {
            const userStr = localStorage.getItem('currentUser');
            if (userStr) {
                try {
                    return JSON.parse(userStr);
                } catch(e) {
                    return null;
                }
            }
            return null;
        }
        
        // 获取用户所在分组
        async function getUserGroupName(className) {
            if (!className) return '';
            
            try {
                const res = await fetch('/api/admin/groups/list', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'}
                });
                const data = await res.json();
                
                if (data.success && data.groups) {
                    for (const group of data.groups) {
                        const classes = group.classNames || group.classes || [];
                        if (classes.includes(className)) {
                            return group.name;
                        }
                    }
                }
            } catch (e) {
                console.error('获取分组失败:', e);
            }
            return '';
        }
        
        function switchTab(type) {
            currentTab = type;
            sortField = 'wpm';
            
            localStorage.setItem('rankTab', type);
            updateURL();
            updateTabUI();
            loadRanking();
        }
        
        function updateTabUI() {
            document.getElementById('classTab').classList.toggle('active', currentTab === 'class');
            document.getElementById('groupTab').classList.toggle('active', currentTab === 'group');
            document.getElementById('allTab').classList.toggle('active', currentTab === 'all');
        }
        
        function updateURL() {
            const url = new URL(window.location.href);
            url.searchParams.set('tab', currentTab);
            url.searchParams.set('sort', sortField);
            window.history.replaceState({}, '', url);
        }
        
        function sortBy(field) {
            sortField = field;
            updateURL();
            renderRanking(currentData);
        }
        
        async function loadRanking() {
            const listDiv = document.getElementById('rankingList');
            const classInfoDiv = document.getElementById('classInfo');
            
            listDiv.innerHTML = '<div class="loading">加载中...</div>';
            
            currentUser = getCurrentUser();
            
            const params = {
                type: currentTab,
                limit: currentTab === 'all' ? 20 : 10
            };
            
            if (currentTab === 'class' && currentUser && currentUser.className) {
                params.className = currentUser.className;
                classInfoDiv.textContent = '当前班级：' + currentUser.className;
            } else if (currentTab === 'class') {
                classInfoDiv.textContent = '您暂未分配班级';
            } else if (currentTab === 'group') {
                // 获取用户所在分组
                if (currentUser && currentUser.className) {
                    userGroupName = await getUserGroupName(currentUser.className);
                    if (userGroupName) {
                        params.groupName = userGroupName;
                        classInfoDiv.textContent = '当前分组：' + userGroupName;
                    } else {
                        classInfoDiv.textContent = '您暂未分配分组';
                    }
                } else {
                    classInfoDiv.textContent = '您暂未分配班级';
                }
            } else {
                classInfoDiv.textContent = '全部学生排行';
            }
            
            try {
                const res = await fetch('/api/rank/typing', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(params)
                });
                
                const data = await res.json();
                
                if (data.success && data.rank && data.rank.length > 0) {
                    currentData = data.rank;
                    renderRanking(currentData);
                } else {
                    listDiv.innerHTML = '<div class="empty"><div class="empty-icon">🏃</div><div>暂无排行数据</div><div style="font-size: 13px; margin-top: 10px;">快来成为第一个吧！</div></div>';
                }
            } catch(e) {
                console.error('加载失败:', e);
                listDiv.innerHTML = '<div class="empty"><div class="empty-icon">⚠️</div><div>加载失败，请稍后重试</div></div>';
            }
        }
        
        function renderRanking(rankList) {
            const listDiv = document.getElementById('rankingList');
            const medals = ['🥇', '🥈', '🥉'];
            
            // 按当前字段降序排序
            let sortedList = [...rankList];
            sortedList.sort(function(a, b) {
                return (b[sortField] || 0) - (a[sortField] || 0);
            });
            
            // 重新计算排名
            sortedList = sortedList.map(function(item, index) {
                return Object.assign({}, item, { rank: index + 1 });
            });
            
           let html = `
<table>
  <thead>
    <tr>
      <th style="width: 60px;">排名</th>
      <th>姓名</th>
      <th style="width: 80px;">班级</th>
      <th style="width: 100px; cursor: pointer;" class="${sortField === 'wpm' ? 'active-sort' : ''}" onclick="sortBy('wpm')">WPM</th>
      <th style="width: 100px; cursor: pointer;" class="${sortField === 'accuracy' ? 'active-sort' : ''}" onclick="sortBy('accuracy')">准确率</th>
    </tr>
  </thead>
<tbody>
`;            
            for (let i = 0; i < sortedList.length; i++) {
                const r = sortedList[i];
                const medal = medals[i] || r.rank;
                const isTop3 = i < 3;
                const topClass = isTop3 ? 'top-' + (i + 1) : '';
                
                // 组榜和总榜显示班级标签
                const showClassTag = currentTab === 'group' || currentTab === 'all';
                
  html += '<tr class="' + topClass + '">' +
    '<td class="rank-cell"><span class="rank-medal">' + medal + '</span></td>' +
    '<td class="name-cell">' + escapeHtml(r.nickname) + '</td>' +
    '<td>' + escapeHtml(r.className || '未分班') + '</td>' +
    '<td class="wpm">' + (r.wpm || 0) + '</td>' +
    '<td class="accuracy">' + (r.accuracy || 0) + '%</td>' +
'</tr>';
            }
            
            html += '</tbody></table>';
            listDiv.innerHTML = html;
        }
        
        function escapeHtml(text) {
            if (!text) return '';
            return String(text)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#039;');
        }
        
        // 页面加载时初始化
        init();
    </script>

</body>
</html>
