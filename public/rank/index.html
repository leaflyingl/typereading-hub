<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>排行榜 - TypeReading Hub</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 800px; margin: 0 auto; }
        .card {
            background: white;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        h1 { color: #333; margin-bottom: 20px; text-align: center; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #eee; }
        th { background: #f8f9fa; font-weight: 600; }
        tr:hover { background: #f8f9fa; }
        .rank-1 { color: gold; font-size: 20px; }
        .rank-2 { color: silver; font-size: 20px; }
        .rank-3 { color: #cd7f32; font-size: 20px; }
        .wpm { color: #667eea; font-weight: bold; }
        .btn {
            padding: 10px 24px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            text-decoration: none;
            display: inline-block;
        }
        .btn-secondary { background: #f0f0f0; color: #333; }
        .back { color: #667eea; text-decoration: none; display: inline-block; margin-bottom: 20px; }
        .empty { text-align: center; padding: 60px; color: #999; }
    </style>
</head>
<body>
    <div class="container">
        <a href="/" class="back">← 返回首页</a>
        <div class="card">
            <h1>🏆 打字排行榜 TOP 20</h1>
            <div id="rankingList">
                <div class="empty">加载中...</div>
            </div>
            <div style="text-align: center; margin-top: 20px;">
                <a href="/" class="btn btn-secondary">返回首页</a>
            </div>
        </div>
    </div>

    <script>
        async function loadRanking() {
    try {
        const res = await fetch('/api/rank/typing', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({limit: 20})
        });
        const data = await res.json();
        const listDiv = document.getElementById('rankingList');
        
        if (data.success && data.rank && data.rank.length > 0) {
            let html = '<table><thead><tr><th>排名</th><th>姓名</th><th>班级</th><th>WPM</th><th>准确率</th></tr></thead><tbody>';
            data.rank.forEach((r, i) => {
                const rankClass = i < 3 ? `rank-${i + 1}` : '';
                const medal = ['🥇','🥈','🥉'][i] || (i + 1);
                const displayRank = i < 3 ? `<span class="${rankClass}">${medal}</span>` : medal;
                html += `<tr>
                    <td>${displayRank}</td>
                    <td><strong>${r.realName || r.nickname || '-'}</strong></td>
                    <td>${r.className || '-'}</td>
                    <td class="wpm">${r.wpm || 0}</td>
                    <td>${r.accuracy || 0}%</td>
                </tr>`;
            });
            html += '</tbody></table>';
            listDiv.innerHTML = html;
        } else {
            listDiv.innerHTML = '<div class="empty">暂无排行数据，快来成为第一个吧！</div>';
        }
    } catch(e) {
        document.getElementById('rankingList').innerHTML = '<div class="empty">加载失败</div>';
    }
}

        
        loadRanking();
    </script>
</body>
</html>
