<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TypeReading Hub - 英语阅读与打字练习平台</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #333;
        }
        .container { max-width: 1200px; margin: 0 auto; padding: 40px 20px; }
        .header {
            background: rgba(255,255,255,0.95);
            padding: 20px 40px;
            border-radius: 16px;
            margin-bottom: 30px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo { font-size: 28px; font-weight: bold; color: #667eea; }
        .user-status { display: flex; align-items: center; gap: 15px; }
        .welcome-text { color: #667eea; font-weight: 500; }
        .btn {
            padding: 10px 24px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
            text-decoration: none;
            display: inline-block;
        }
        .btn-primary { background: #667eea; color: white; }
        .btn-secondary { background: #f0f0f0; color: #333; }
        
        .hero {
            background: rgba(255,255,255,0.95);
            padding: 60px 40px;
            border-radius: 20px;
            text-align: center;
            margin-bottom: 40px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        .hero h1 { font-size: 42px; margin-bottom: 20px; color: #333; }
        .hero p { font-size: 18px; color: #666; margin-bottom: 30px; }
        
        .features {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 25px;
            margin-bottom: 30px;
        }
        .feature-card {
            background: rgba(255,255,255,0.95);
            padding: 35px 25px;
            border-radius: 16px;
            text-align: center;
            transition: transform 0.3s;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            cursor: pointer;
        }
        .feature-card:hover { transform: translateY(-5px); }
        .feature-icon { font-size: 48px; margin-bottom: 15px; }
        .feature-card h3 { font-size: 20px; margin-bottom: 10px; color: #333; }
        .feature-card p { color: #666; font-size: 14px; }
        
        /* 修复：淡化管理入口样式 */
        .admin-link {
            text-align: center;
            margin-top: 40px;
        }
        .admin-link a {
            color: rgba(255,255,255,0.4);
            text-decoration: none;
            font-size: 13px;
            transition: color 0.3s;
        }
        .admin-link a:hover { color: rgba(255,255,255,0.8); }
        
        .login-prompt {
            background: #fff3cd;
            border: 1px solid #ffeaa7;
            padding: 10px 20px;
            border-radius: 8px;
            color: #856404;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">📚 TypeReading Hub</div>
            <div class="user-status" id="userStatus">
                <!-- 动态显示 -->
            </div>
        </div>
        
        <div class="hero">
            <h1>英语阅读与打字练习平台</h1>
            <p>提升英语阅读能力，锻炼打字速度，记录学习进度</p>
            <a href="/register/" class="btn btn-primary" id="startBtn">开始学习</a>
        </div>
        
        <div class="features">
            <div class="feature-card" onclick="goTo('/history/')">
                <div class="feature-icon">📊</div>
                <h3>学习历史</h3>
                <p>查看阅读与打字的学习统计记录</p>
            </div>
            <div class="feature-card" onclick="goTo('/reading/')">
                <div class="feature-icon">📖</div>
                <h3>阅读打卡</h3>
                <p>每日阅读任务打卡记录</p>
            </div>
            <div class="feature-card" onclick="goTo('/typing/')">
                <div class="feature-icon">⌨️</div>
                <h3>打字练习</h3>
                <p>盲打速度与准确率训练</p>
            </div>
            <div class="feature-card" onclick="goTo('/rank/')">
                <div class="feature-icon">🏆</div>
                <h3>排行榜</h3>
                <p>查看打字成绩排名</p>
            </div>
        </div>
        
        <!-- 修复：淡化管理入口，只保留图标 -->
        <div class="admin-link">
            <a href="/admin/">⚙️</a>
        </div>
    </div>

    <script>
        window.onload = function() {
            checkLogin();
        };

        function checkLogin() {
            const userStatusDiv = document.getElementById('userStatus');
            const startBtn = document.getElementById('startBtn');
            const currentUserStr = localStorage.getItem('currentUser');
            
            if (currentUserStr) {
                try {
                    const user = JSON.parse(currentUserStr);
                    // 修复：正确显示用户名（昵称）
                    const nickname = user.nickname || '同学';
                    userStatusDiv.innerHTML = 
                        '<span class="welcome-text">欢迎，' + escapeHtml(nickname) + '！</span>' +
                        '<button class="btn btn-secondary" onclick="logout()">退出</button>';
                    startBtn.textContent = '进入学习';
                    startBtn.href = '/reading/';
                } catch (e) {
                    localStorage.removeItem('currentUser');
                    showLoginPrompt();
                }
            } else {
                showLoginPrompt();
            }
        }

        function escapeHtml(text) {
            if (!text) return '';
            return text
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#039;');
        }

        function showLoginPrompt() {
            const userStatusDiv = document.getElementById('userStatus');
            userStatusDiv.innerHTML = 
                '<span class="login-prompt">👋 请先登录</span>' +
                '<a href="/register/" class="btn btn-primary">登录 / 注册</a>';
        }

        function logout() {
            localStorage.removeItem('currentUser');
            location.reload();
        }

        function goTo(url) {
            const currentUser = localStorage.getItem('currentUser');
            if (!currentUser && url !== '/register/') {
                alert('请先登录后再使用此功能');
                location.href = '/register/';
                return;
            }
            location.href = url;
        }
    </script>
</body>
</html>
