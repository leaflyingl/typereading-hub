<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>打字练习 - TypeReading Hub</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 800px; margin: 0 auto; }
        .card {
            background: white;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        h1 { color: #333; margin-bottom: 20px; }
        .text-display {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 8px;
            font-size: 18px;
            line-height: 1.6;
            margin-bottom: 20px;
            min-height: 100px;
        }
        .text-display span.correct { color: #28a745; }
        .text-display span.wrong { color: #dc3545; background: #ffebee; }
        textarea {
            width: 100%;
            padding: 15px;
            font-size: 16px;
            border: 2px solid #ddd;
            border-radius: 8px;
            resize: vertical;
            min-height: 100px;
        }
        .stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);  /* 改为4列 */
            gap: 15px;
            margin: 20px 0;
        }

        .stat-box {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
        }
        .stat-box h3 { color: #667eea; font-size: 24px; margin-bottom: 5px; }
        .btn {
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            margin-right: 10px;
        }
        .btn-primary { background: #667eea; color: white; }
        .btn-secondary { background: #f0f0f0; color: #333; }
        .back { color: #667eea; text-decoration: none; display: inline-block; margin-bottom: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <a href="/" class="back">← 返回首页</a>
        <div class="card">
            <h1>⌨️ 打字练习</h1>
            <div class="text-display" id="targetText">The quick brown fox jumps over the lazy dog. Practice makes perfect.</div>
            <textarea id="inputText" placeholder="在此输入上面的文字..." oninput="checkTyping()"></textarea>
            <div class="stats">
                <div class="stat-box">
                    <h3 id="wpm">0</h3>
                    <p>WPM</p>
                </div>
                <div class="stat-box">
                    <h3 id="accuracy">100%</h3>
                    <p>准确率</p>
                </div>
                <div class="stat-box">
                    <h3 id="time">0s</h3>
                    <p>用时</p>
                </div>
                <div class="stat-box">
                    <h3 id="wordCount">0</h3>
                    <p>单词数</p>
                </div>
            </div>

            <button class="btn btn-primary" onclick="submitResult()">提交成绩</button>
            <button class="btn btn-secondary" onclick="resetTest()">重新开始</button>
            <a href="/" class="btn btn-secondary">返回首页</a>
        </div>
    </div>

    <script>
        const currentUser = JSON.parse(localStorage.getItem('currentUser') || 'null');
        if (!currentUser) {
            alert('请先登录');
            location.href = '/register/';
        }
        
        const targetText = document.getElementById('targetText').textContent;
        let startTime = null;
        let timerInterval = null;
        
        
        function checkTyping() {
            const input = document.getElementById('inputText').value;
            if (!startTime && input.length > 0) {
                startTime = Date.now();
                timerInterval = setInterval(updateTime, 100);
            }
            
            // 新增：实时计算单词数
            const wordCount = input.trim().split(/\s+/).filter(w => w.length > 0).length;
            document.getElementById('wordCount').textContent = wordCount;
            
            // 计算准确率
            let correct = 0;
            for (let i = 0; i < input.length; i++) {
                if (input[i] === targetText[i]) correct++;
            }
            const accuracy = input.length > 0 ? Math.round(correct / input.length * 100) : 100;
            document.getElementById('accuracy').textContent = accuracy + '%';
            
            // 计算WPM
            if (startTime) {
                const elapsed = (Date.now() - startTime) / 1000 / 60;
                const words = input.length / 5;
                const wpm = elapsed > 0 ? Math.round(words / elapsed) : 0;
                document.getElementById('wpm').textContent = wpm;
            }
        }

        function updateTime() {
            if (startTime) {
                const elapsed = Math.round((Date.now() - startTime) / 1000);
                document.getElementById('time').textContent = elapsed + 's';
            }
        }
        
        async function submitResult() {
            const input = document.getElementById('inputText').value;
            if (input.length < 10) {
                alert('请至少输入一段文字');
                return;
            }
            
            const wpm = parseInt(document.getElementById('wpm').textContent);
            const accuracy = parseInt(document.getElementById('accuracy').textContent);
            const duration = parseInt(document.getElementById('time').textContent);
            
            // 新增：计算打字单词数（按空格分割，过滤空字符串）
            const wordCount = input.trim().split(/\s+/).filter(w => w.length > 0).length;
            
            try {
                const res = await fetch('/api/typing/result', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        nickname: currentUser.nickname,
                        wpm,
                        accuracy,
                        duration,
                        wordCount,  // 新增：打字单词数
                        content: input  // 原文（可选）
                    })
                });
                const data = await res.json();
                if (data.success) {
                    alert('成绩已提交！');
                }
            } catch(e) {
                alert('提交失败');
            }
        }

        function resetTest() {
            document.getElementById('inputText').value = '';
            document.getElementById('wpm').textContent = '0';
            document.getElementById('accuracy').textContent = '100%';
            document.getElementById('time').textContent = '0s';
            document.getElementById('wordCount').textContent = '0';  // 新增
            startTime = null;
            clearInterval(timerInterval);
        }

    </script>
</body>
</html>
