<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>打字练习 - TypeReading Hub</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background: #f5f7fa; 
            padding: 20px; 
        }
        .header { 
            max-width: 900px; 
            margin: 0 auto 30px; 
            padding: 20px; 
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            border-radius: 16px;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header-left h2 { margin-bottom: 5px; }
        .header-right a { 
            color: white; 
            text-decoration: none; 
            margin-left: 15px;
            padding: 8px 16px;
            background: rgba(255,255,255,0.2);
            border-radius: 8px;
            transition: background 0.3s;
        }
        .header-right a:hover { background: rgba(255,255,255,0.3); }
        .container { max-width: 900px; margin: 0 auto; }
        .typing-box { 
            background: white; 
            border-radius: 16px; 
            padding: 40px; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }
        .text-display { 
            font-size: 20px; 
            line-height: 2; 
            margin-bottom: 25px; 
            padding: 25px; 
            background: #f8f9fa; 
            border-radius: 12px;
            color: #666;
            min-height: 120px;
            letter-spacing: 1px;
        }
        .text-display .correct { color: #28a745; font-weight: bold; }
        .text-display .wrong { 
            color: #dc3545; 
            background: #ffebee; 
            border-radius: 3px;
            padding: 0 2px;
        }
        .text-display .cursor { 
            background: #667eea; 
            color: white;
            border-radius: 3px;
            padding: 0 2px;
        }
        .input-area { 
            width: 100%; 
            padding: 20px; 
            font-size: 20px; 
            border: 3px solid #e0e0e0; 
            border-radius: 12px; 
            margin-bottom: 25px;
            font-family: inherit;
            letter-spacing: 1px;
        }
        .input-area:focus { 
            outline: none; 
            border-color: #667eea; 
        }
        .stats { 
            display: flex; 
            justify-content: center;
            gap: 30px; 
            margin-bottom: 25px; 
            flex-wrap: wrap;
        }
        .stat-item { 
            padding: 20px 30px; 
            background: linear-gradient(135deg, #e7f3ff 0%, #f0e6ff 100%); 
            border-radius: 12px; 
            text-align: center;
            min-width: 120px;
        }
        .stat-value { 
            font-size: 32px; 
            font-weight: bold; 
            color: #667eea;
            display: block;
        }
        .stat-label { 
            font-size: 14px; 
            color: #666;
            margin-top: 5px;
        }
        .btn { 
            padding: 16px 40px; 
            font-size: 18px; 
            border: none; 
            border-radius: 10px; 
            cursor: pointer; 
            font-weight: 600;
            margin-right: 15px;
            transition: all 0.3s;
        }
        .btn-primary { 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); 
            color: white; 
        }
        .btn-success { 
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%); 
            color: white; 
        }
        .btn:disabled { 
            background: #ccc !important; 
            cursor: not-allowed; 
            transform: none !important;
        }
        .controls { text-align: center; }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-left">
            <h2>⌨️ 打字练习</h2>
            <small id="userName">加载中...</small>
        </div>
        <div class="header-right">
            <a href="/">🏠 首页</a>
            <a href="/reading/">📖 阅读</a>
            <a href="/rank/">🏆 排行</a>
        </div>
    </div>

    <div class="container">
        <div class="typing-box">
            <div class="text-display" id="textDisplay">
                点击"开始练习"加载题目...
            </div>
            
            <input 
                type="text" 
                class="input-area" 
                id="typingInput" 
                placeholder="在此处输入上面的文字..." 
                disabled
                autocomplete="off"
            >
            
            <div class="stats">
                <div class="stat-item">
                    <span class="stat-value" id="timeDisplay">0</span>
                    <div class="stat-label">⏱️ 时间(秒)</div>
                </div>
                <div class="stat-item">
                    <span class="stat-value" id="wpmDisplay">0</span>
                    <div class="stat-label">⚡ WPM</div>
                </div>
                <div class="stat-item">
                    <span class="stat-value" id="accuracyDisplay">0</span>
                    <div class="stat-label">🎯 准确率(%)</div>
                </div>
            </div>
            
            <div class="controls">
                <button class="btn btn-primary" id="startBtn" onclick="startTyping()">开始练习</button>
                <button class="btn btn-success" id="submitBtn" onclick="submitResult()" disabled>提交成绩</button>
            </div>
        </div>
    </div>

    <script>
        const user = JSON.parse(localStorage.getItem('typereading_user') || '{}');
        if (!user.userId) {
            alert('请先登录');
            location.href = '/register/';
        }
        document.getElementById('userName').textContent = user.nickname || '未登录';

        const texts = [
            "The quick brown fox jumps over the lazy dog.",
            "To be or not to be, that is the question.",
            "All work and no play makes Jack a dull boy.",
            "Practice makes perfect.",
            "Reading is to the mind what exercise is to the body.",
            "The early bird catches the worm.",
            "A journey of a thousand miles begins with a single step."
        ];

        let currentText = '';
        let startTime = null;
        let timerInterval = null;
        let typedLength = 0;

        function startTyping() {
            currentText = texts[Math.floor(Math.random() * texts.length)];
            document.getElementById('textDisplay').innerHTML = formatText(currentText, '');
            document.getElementById('typingInput').value = '';
            document.getElementById('typingInput').disabled = false;
            document.getElementById('typingInput').focus();
            document.getElementById('startBtn').style.display = 'none';
            document.getElementById('submitBtn').disabled = true;
            
            startTime = Date.now();
            typedLength = 0;
            
            timerInterval = setInterval(updateStats, 500);
        }

        function formatText(original, typed) {
            let html = '';
            for (let i = 0; i < original.length; i++) {
                if (i < typed.length) {
                    if (typed[i] === original[i]) {
                        html += `<span class="correct"></span>`;
                    } else {
                        html += `<span class="wrong"></span>`;
                    }
                } else if (i === typed.length) {
                    html += `<span class="cursor"></span>`;
                } else {
                    html += original[i];
                }
            }
            return html;
        }

        function updateStats() {
            const elapsed = Math.floor((Date.now() - startTime) / 1000);
            document.getElementById('timeDisplay').textContent = elapsed;
            
            const minutes = elapsed / 60;
            const wpm = minutes > 0 ? Math.round((typedLength / 5) / minutes) : 0;
            document.getElementById('wpmDisplay').textContent = wpm;
        }

        document.getElementById('typingInput').addEventListener('input', function(e) {
            const typed = e.target.value;
            typedLength = typed.length;
            document.getElementById('textDisplay').innerHTML = formatText(currentText, typed);
            
            // 计算准确率
            let correct = 0;
            for (let i = 0; i < typed.length && i < currentText.length; i++) {
                if (typed[i] === currentText[i]) correct++;
            }
            const accuracy = typed.length > 0 ? Math.round((correct / typed.length) * 100) : 0;
            document.getElementById('accuracyDisplay').textContent = accuracy;
            
            // 完成检查
            if (typed.length >= currentText.length) {
                clearInterval(timerInterval);
                document.getElementById('typingInput').disabled = true;
                document.getElementById('submitBtn').disabled = false;
                updateStats();
            }
        });

        async function submitResult() {
            const elapsed = Math.floor((Date.now() - startTime) / 1000);
            const minutes = elapsed / 60;
            const wpm = minutes > 0 ? Math.round((currentText.length / 5) / minutes) : 0;
            
            let correct = 0;
            const typed = document.getElementById('typingInput').value;
            for (let i = 0; i < typed.length && i < currentText.length; i++) {
                if (typed[i] === currentText[i]) correct++;
            }
            const accuracy = Math.round((correct / currentText.length) * 100);
            
            try {
                const res = await fetch('/api/typing/result', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        userId: user.userId,
                        wpm: wpm,
                        accuracy: accuracy,
                        courseName: 'default'
                    })
                });
                
                const data = await res.json();
                
                if (data.success) {
                    alert(`🎉 成绩提交成功！\n\n速度： WPM\n准确率：%`);
                    document.getElementById('submitBtn').disabled = true;
                    document.getElementById('submitBtn').textContent = '已提交';
                }
            } catch (err) {
                alert('提交失败，请检查网络后重试');
            }
        }
    </script>
</body>
</html>
