<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>打字练习 - TypeReading Hub</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --primary: #667eea;
            --primary-dark: #764ba2;
            --bg-gradient-start: #667eea;
            --bg-gradient-end: #764ba2;
            --card-bg: #fff;
            --text: #333;
            --text-secondary: #666;
            --border: #e8e8e8;
            --correct: #52c41a;
            --wrong: #ff4d4f;
        }
        
        html { font-size: 16px; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, var(--bg-gradient-start) 0%, var(--bg-gradient-end) 100%);
            min-height: 100vh;
            padding: 15px;
            color: var(--text);
        }
        
        .container {
            max-width: 100%;
            margin: 0 auto;
        }
        
        /* 头部导航 */
.header {
  background: var(--card-bg);
  border-radius: 12px;
  padding: 15px 20px;
  margin-bottom: 15px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  box-shadow: 0 4px 20px rgba(0,0,0,0.1);
}

.header h1 {
  color: var(--text);
  font-size: 20px;
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 0; /* 覆盖原有的 margin-bottom: 20px */
}

.back-btn {
  color: var(--primary);
  text-decoration: none;
  font-weight: 500;
  font-size: 15px;
  padding: 8px 12px;
  border-radius: 8px;
  transition: background 0.2s;
}

.back-btn:active {
  background: #f0f5ff;
}

        
        .card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
        }
        
        .card h1 {
            color: var(--text);
            font-size: 22px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .text-display {
            background: #f8f9fa;
            padding: 18px;
            border-radius: 10px;
            font-size: 17px;
            line-height: 1.8;
            margin-bottom: 15px;
            min-height: 100px;
            font-family: 'Menlo', 'Monaco', 'SF Mono', 'Courier New', monospace;
            color: #666;
            word-break: break-all;
            white-space: pre-wrap;
            border: 1px solid var(--border);
        }
        
        .text-display span.correct { 
            color: var(--correct); 
            background: #f6ffed;
            border-radius: 2px;
        }
        
        .text-display span.wrong { 
            color: var(--wrong); 
            background: #fff2f0;
            text-decoration: underline;
            border-radius: 2px;
        }
        
        textarea {
            width: 100%;
            padding: 18px;
            font-size: 17px;
            border: 2px solid var(--border);
            border-radius: 10px;
            resize: vertical;
            min-height: 120px;
            font-family: 'Menlo', 'Monaco', 'SF Mono', 'Courier New', monospace;
            line-height: 1.8;
            margin-bottom: 15px;
        }
        
        textarea:focus {
            outline: none;
            border-color: var(--primary);
        }
        
        textarea:disabled {
            background: #f5f5f5;
            color: #999;
        }
        
        .stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin: 20px 0;
        }
        
        .stat-box {
            background: #f8f9fa;
            padding: 15px 8px;
            border-radius: 10px;
            text-align: center;
        }
        
        .stat-box h3 { 
            color: var(--primary); 
            font-size: 22px; 
            margin-bottom: 4px;
            font-weight: bold;
        }
        
        .stat-box p {
            color: var(--text-secondary);
            font-size: 12px;
        }
        
        .btn {
            padding: 14px 24px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 15px;
            font-weight: 500;
            margin-right: 10px;
            margin-bottom: 10px;
            min-height: 48px;
            transition: transform 0.2s;
        }
        
        .btn:active { transform: scale(0.98); }
        
        .btn-primary { 
            background: var(--primary); 
            color: white; 
        }
        
        .btn-primary:active { background: var(--primary-dark); }
        
        .btn-secondary { 
            background: #f0f0f0; 
            color: var(--text); 
        }
        
        .btn-secondary:active { background: #e0e0e0; }
        
        /* 按键统计信息 */
        .keystroke-info {
            background: #f0f5ff;
            border: 1px solid #d6e4ff;
            border-radius: 8px;
            padding: 12px 15px;
            margin-bottom: 15px;
            font-size: 13px;
            color: #666;
        }
        
        .keystroke-info span {
            margin-right: 15px;
        }
        
        .keystroke-info .num {
            color: var(--primary);
            font-weight: bold;
        }
        
        @media (min-width: 768px) {
            body { padding: 25px; }
            .container { max-width: 800px; }
            .card { padding: 35px; border-radius: 16px; }
            .card h1 { font-size: 28px; margin-bottom: 25px; }
            .text-display { padding: 25px; font-size: 20px; line-height: 2; margin-bottom: 20px; }
            textarea { padding: 22px; font-size: 20px; min-height: 150px; margin-bottom: 20px; }
            .stats { gap: 20px; margin: 25px 0; }
            .stat-box { padding: 22px; }
            .stat-box h3 { font-size: 32px; margin-bottom: 8px; }
            .stat-box p { font-size: 14px; }
            .btn { padding: 16px 32px; font-size: 16px; margin-right: 15px; }
            .header {
            padding: 20px 30px;
            border-radius: 16px;
            margin-bottom: 25px;
            }
  
           .header h1 {
           font-size: 24px;
            }
        }

        }
        
        @media (min-width: 1024px) {
            .container { max-width: 900px; }
            .stats { grid-template-columns: repeat(4, 1fr); }
            .text-display, textarea { font-size: 22px; }
        }
        
        @media (max-height: 500px) and (orientation: landscape) {
            body { padding: 10px; }
            .card { padding: 15px; }
            .text-display { font-size: 15px; padding: 12px; min-height: 80px; }
            textarea { font-size: 15px; min-height: 80px; padding: 12px; }
            .stats { gap: 8px; }
            .stat-box { padding: 10px 5px; }
            .stat-box h3 { font-size: 18px; }
        }
        
        @media (prefers-color-scheme: dark) {
            :root {
                --card-bg: #2a2a3a;
                --text: #e8e8e8;
                --text-secondary: #a0a0a0;
                --border: #3a3a50;
            }
            body { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); }
            .text-display, .stat-box { background: #323248; color: #a0a0a0; }
            textarea { background: #323248; color: #e8e8e8; border-color: #3a3a50; }
            textarea:disabled { background: #2a2a3a; }
            .keystroke-info { background: #1a2744; border-color: #2a3a5a; }
            .back-btn:active {
            background: #2a3a5a;
            }
         }
        }

/* ==================== 按钮布局优化 ==================== */
.button-group {
    display: flex;
    flex-direction: row;
    gap: 10px;
    margin-top: 20px;
    flex-wrap: wrap;
    justify-content: center;
}

@media (max-width: 480px) {
    .button-group {
        flex-direction: column;
        align-items: stretch;
        padding: 0 5px;
        gap: 8px;
    }
    
    .button-group .btn {
        width: 100%;
        margin-right: 0;
        margin-bottom: 8px;
        padding: 16px 20px;
        font-size: 16px;
        border-radius: 12px;
    }
    
    .button-group .btn:last-child {
        margin-bottom: 0;
    }
}

@media (min-width: 481px) and (max-width: 768px) {
    .button-group {
        gap: 12px;
    }
    
    .button-group .btn {
        padding: 14px 20px;
        font-size: 15px;
        min-width: 140px;
    }
}

@media (min-width: 769px) {
    .button-group {
        gap: 15px;
    }
}
    </style>
</head>
<body>
    <div class="container">
    <div class="header">
        <h1>⌨️ 打字练习</h1>
        <a href="/" class="back-btn">← 返回首页</a>
    </div>
    <div class="card">
            <div class="text-display" id="targetText">加载中...</div>
            <textarea id="inputText" placeholder="在此输入上面的文字..." disabled></textarea>
            
            <div class="keystroke-info" id="keystrokeInfo" style="display: none;">
                <span>总按键: <span class="num" id="totalKeys">0</span></span>
                <span>正确: <span class="num" id="correctKeys">0</span></span>
                <span>错误: <span class="num" id="errorKeys">0</span></span>
                <span>退格: <span class="num" id="backspaceKeys">0</span></span>
            </div>
            
            <div class="stats">
                <div class="stat-box">
                    <h3 id="wpm">0</h3>
                    <p>WPM</p>
                </div>
                <div class="stat-box">
                    <h3 id="accuracy">100%</h3>
                    <p>准确率</p>
                </div>
                <div class="stat-box">
                    <h3 id="time">0s</h3>
                    <p>用时</p>
                </div>
                <div class="stat-box">
                    <h3 id="wordCount">0</h3>
                    <p>单词数</p>
                </div>
            </div>
            <div class="button-group">
                <button class="btn btn-primary" onclick="submitResult()">提交成绩</button>
                <button class="btn btn-primary" onclick="resetTest()">重新开始</button>
                <a href="/" class="btn" style="background: white; color: var(--primary); text-decoration: none; display: inline-flex; align-items: center; justify-content: center;">返回首页</a>
            </div>
        </div>
    </div>

    <script>
        const currentUser = JSON.parse(localStorage.getItem('currentUser') || 'null');
        const isLoggedIn = currentUser && currentUser.nickname;
        const membership = isLoggedIn ? (currentUser.membership || { type: 'basic' }) : { type: 'anonymous' };
        const canType = true;

        let targetText = '';
        let startTime = null;
        let timerInterval = null;
        
        let keystrokeStats = {
            total: 0,
            correct: 0,
            errors: 0,
            backspaces: 0
        };
        
        let lastInput = '';
        
        async function loadTypingContent() {
            try {
                const response = await fetch('/api/content/typing', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        nickname: currentUser?.nickname || null,
                        className: currentUser?.className || ''
                    })
                });
                const result = await response.json();
                
                if (result.success && result.content) {
                    targetText = result.content.content;
                    document.getElementById('targetText').textContent = targetText;
                    document.getElementById('inputText').disabled = !isLoggedIn;
                    if (isLoggedIn) {
                        document.getElementById('inputText').focus();
                    }
                } else {
                    document.getElementById('targetText').textContent = '暂无适合您班级的打字内容';
                }
            } catch (err) {
                console.error('加载内容失败:', err);
                document.getElementById('targetText').textContent = '加载失败，请刷新重试';
            }
        }
        
        document.addEventListener('DOMContentLoaded', function() {
            const inputText = document.getElementById('inputText');
            
            // 未登录用户点击输入框时提示登录
            // 替换原来的 click 监听
            inputText.addEventListener('pointerdown', function(e) {
            if (!isLoggedIn && inputText.disabled) {
            e.preventDefault();
            alert('请先登录后再使用此功能');
            }
            });

            
            inputText.addEventListener('keydown', function(e) {
                if (!startTime && !inputText.disabled) {
                    startTime = Date.now();
                    timerInterval = setInterval(updateTime, 100);
                    document.getElementById('keystrokeInfo').style.display = 'block';
                }
                
                if (e.key === 'Backspace') {
                    keystrokeStats.backspaces++;
                    keystrokeStats.total++;
                    updateKeystrokeDisplay();
                }
            });
            
            inputText.addEventListener('input', function(e) {
                const currentInput = inputText.value;
                
                if (currentInput.length > lastInput.length) {
                    const newChar = currentInput[currentInput.length - 1];
                    const targetChar = targetText[currentInput.length - 1];
                    
                    keystrokeStats.total++;
                    
                    if (newChar === targetChar) {
                        keystrokeStats.correct++;
                    } else {
                        keystrokeStats.errors++;
                    }
                    
                    updateKeystrokeDisplay();
                }
                
                lastInput = currentInput;
                updateStats(currentInput);
            });
        });
        
        function updateKeystrokeDisplay() {
            document.getElementById('totalKeys').textContent = keystrokeStats.total;
            document.getElementById('correctKeys').textContent = keystrokeStats.correct;
            document.getElementById('errorKeys').textContent = keystrokeStats.errors;
            document.getElementById('backspaceKeys').textContent = keystrokeStats.backspaces;
        }
        
        function updateStats(input) {
            const wordCount = input.trim().split(/\s+/).filter(w => w.length > 0).length;
            document.getElementById('wordCount').textContent = wordCount;
            
            const targetLength = targetText.length;
            let accuracy = 100;
            
            if (keystrokeStats.total > 0) {
                accuracy = Math.round((keystrokeStats.correct / keystrokeStats.total) * 100);
            }
            
            document.getElementById('accuracy').textContent = accuracy + '%';
            
            if (startTime) {
                const elapsed = (Date.now() - startTime) / 1000 / 60;
                const words = input.length / 5;
                const wpm = elapsed > 0 ? Math.round(words / elapsed) : 0;
                document.getElementById('wpm').textContent = wpm;
            }
        }
        
        function updateTime() {
            if (startTime) {
                const elapsed = Math.round((Date.now() - startTime) / 1000);
                document.getElementById('time').textContent = elapsed + 's';
            }
        }
        
        async function submitResult() {
            if (!isLoggedIn) {
                alert('请先登录后再使用此功能');
                window.location.href = '/register/';
                return;
            }
            
            const input = document.getElementById('inputText').value;
            if (input.length < 10) {
                alert('请至少输入一段文字');
                return;
            }
            
            const wpm = parseInt(document.getElementById('wpm').textContent);
            const accuracy = parseInt(document.getElementById('accuracy').textContent);
            const duration = parseInt(document.getElementById('time').textContent);
            const wordCount = input.trim().split(/\s+/).filter(w => w.length > 0).length;
            
            try {
                const res = await fetch('/api/typing/result', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        nickname: currentUser.nickname,
                        wpm,
                        accuracy,
                        duration,
                        wordCount,
                        content: input,
                        keystrokes: keystrokeStats,
                        targetLength: targetText.length
                    })
                });
                const data = await res.json();
                if (data.success) {
                    alert('成绩已提交！');
                }
            } catch(e) {
                alert('提交失败');
            }
        }
        
        function resetTest() {
            if (!isLoggedIn) {
                alert('请先登录后再使用此功能');
                return;
            }
            
            document.getElementById('inputText').value = '';
            document.getElementById('wpm').textContent = '0';
            document.getElementById('accuracy').textContent = '100%';
            document.getElementById('time').textContent = '0s';
            document.getElementById('wordCount').textContent = '0';
            document.getElementById('keystrokeInfo').style.display = 'none';
            
            keystrokeStats = { total: 0, correct: 0, errors: 0, backspaces: 0 };
            lastInput = '';
            startTime = null;
            clearInterval(timerInterval);
            
            updateKeystrokeDisplay();
            loadTypingContent();
        }
        
        loadTypingContent();
    </script>
</body>
</html>
