<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>打字练习 - TypeReading Hub</title>
    <style>
       * { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --primary: #667eea;
  --primary-dark: #764ba2;
  --bg-gradient-start: #667eea;
  --bg-gradient-end: #764ba2;
  --card-bg: #fff;
  --text: #333;
  --text-secondary: #666;
  --border: #e8e8e8;
  --success: #52c41a;
  --warning: #faad14;
}

html {
  font-size: 16px;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
  background: linear-gradient(135deg, var(--bg-gradient-start) 0%, var(--bg-gradient-end) 100%);
  min-height: 100vh;
  padding: 15px;
  color: var(--text);
  line-height: 1.6;
}

.container {
  max-width: 100%;
  margin: 0 auto;
}

/* 头部导航 */
.header {
  background: var(--card-bg);
  border-radius: 12px;
  padding: 15px 20px;
  margin-bottom: 15px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  box-shadow: 0 4px 20px rgba(0,0,0,0.1);
}

.header h1 {
  color: var(--text);
  font-size: 20px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.back-btn {
  color: var(--primary);
  text-decoration: none;
  font-weight: 500;
  font-size: 15px;
  padding: 8px 12px;
  border-radius: 8px;
  transition: background 0.2s;
}

.back-btn:active {
  background: #f0f5ff;
}

/* 卡片基础样式 */
.card {
  background: var(--card-bg);
  border-radius: 12px;
  padding: 20px;
  margin-bottom: 15px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.1);
}

/* 加载状态 */
.loading {
  text-align: center;
  color: var(--text-secondary);
  padding: 40px;
  font-size: 15px;
}

/* 已打卡状态 */
.checked-in {
  text-align: center;
  padding: 30px 20px;
}

.checked-in-icon {
  font-size: 56px;
  margin-bottom: 15px;
}

.checked-in h2 {
  color: var(--text);
  margin-bottom: 10px;
  font-size: 22px;
}

.checked-in p {
  color: var(--text-secondary);
  margin-bottom: 20px;
  font-size: 15px;
}

/* 统计网格 */
.stats-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 12px;
  margin-top: 20px;
}

.stat-item {
  background: #f8f9fa;
  padding: 18px 15px;
  border-radius: 10px;
  text-align: center;
}

.stat-value {
  font-size: 28px;
  font-weight: bold;
  color: var(--primary);
  line-height: 1.2;
}

.stat-label {
  color: var(--text-secondary);
  font-size: 13px;
  margin-top: 6px;
}

/* 文章卡片 */
.article-card {
  background: #f8f9fa;
  border-radius: 10px;
  padding: 20px;
  margin-bottom: 15px;
}

.article-title {
  font-size: 18px;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 12px;
  line-height: 1.4;
}

.article-content {
  color: #555;
  line-height: 1.9;
  font-size: 16px;
  white-space: pre-wrap;
}

.word-count {
  color: #999;
  font-size: 13px;
  margin-top: 15px;
  text-align: right;
}

/* 打卡按钮 */
.checkin-btn {
  width: 100%;
  padding: 16px;
  background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
  color: white;
  border: none;
  border-radius: 12px;
  font-size: 17px;
  font-weight: 600;
  cursor: pointer;
  transition: transform 0.2s, box-shadow 0.2s;
  min-height: 56px;
}

.checkin-btn:active {
  transform: scale(0.98);
}

.checkin-btn:disabled {
  background: #ccc;
  cursor: not-allowed;
  transform: none;
  box-shadow: none;
}

/* 无内容状态 */
.no-content {
  text-align: center;
  padding: 50px 20px;
  color: var(--text-secondary);
}

.no-content-icon {
  font-size: 48px;
  margin-bottom: 15px;
}

.no-content h3 {
  color: var(--text);
  margin-bottom: 8px;
  font-size: 18px;
}

/* Toast 提示 */
.toast {
  position: fixed;
  top: 20px;
  right: 20px;
  padding: 14px 22px;
  border-radius: 10px;
  color: white;
  font-weight: 500;
  z-index: 1000;
  animation: slideIn 0.3s ease;
  font-size: 14px;
  max-width: 80%;
  word-break: break-all;
}

.toast.success { background: var(--success); }
.toast.error { background: #ff4d4f; }

@keyframes slideIn {
  from { transform: translateX(100%); opacity: 0; }
  to { transform: translateX(0); opacity: 1; }
}

/* 课后练习区域 */
.qna-section {
  display: none;
  margin-top: 0;
}

.qna-title {
  font-size: 17px;
  color: var(--text);
  margin-bottom: 18px;
  padding-bottom: 12px;
  border-bottom: 2px solid var(--primary);
  display: flex;
  align-items: center;
  gap: 8px;
  font-weight: 600;
}

.question-item {
  background: #f8f9fa;
  border-radius: 10px;
  padding: 18px;
  margin-bottom: 15px;
  border-left: 3px solid var(--primary);
}

.question-header {
  font-weight: 600;
  color: var(--text);
  margin-bottom: 12px;
  font-size: 15px;
  line-height: 1.5;
}

.question-type {
  background: #e6f7ff;
  color: #1890ff;
  padding: 3px 10px;
  border-radius: 4px;
  font-size: 12px;
  margin-left: 8px;
  font-weight: normal;
  white-space: nowrap;
}

.options-list {
  margin: 12px 0;
}

.option-label {
  display: block;
  padding: 12px;
  margin: 8px 0;
  cursor: pointer;
  border-radius: 8px;
  transition: background 0.2s;
  background: white;
  border: 1px solid var(--border);
  font-size: 15px;
}

.option-label:active {
  background: #e6f7ff;
  border-color: var(--primary);
}

.option-label input[type="radio"] {
  margin-right: 10px;
}

.answer-textarea {
  width: 100%;
  padding: 14px;
  border: 1px solid var(--border);
  border-radius: 10px;
  min-height: 120px;
  resize: vertical;
  font-family: inherit;
  font-size: 15px;
  margin-top: 12px;
  line-height: 1.6;
}

.answer-textarea:focus {
  outline: none;
  border-color: var(--primary);
}

.submit-answer-btn {
  background: var(--primary);
  color: white;
  border: none;
  padding: 12px 28px;
  border-radius: 10px;
  cursor: pointer;
  font-size: 15px;
  margin-top: 12px;
  font-weight: 500;
  min-height: 44px;
}

.submit-answer-btn:active {
  background: var(--primary-dark);
}

.submit-answer-btn:disabled {
  background: #ccc;
  cursor: not-allowed;
}

.answer-status {
  margin-top: 12px;
  padding: 12px;
  border-radius: 8px;
  font-size: 14px;
}

.answer-status.submitted {
  background: #f6ffed;
  color: var(--success);
}

.answer-status.pending {
  background: #fff7e6;
  color: #fa8c16;
}

/* ==================== Pad 适配 ==================== */

@media (min-width: 768px) {
  body {
    padding: 25px;
  }
  
  .container {
    max-width: 800px;
  }
  
  .header {
    padding: 20px 30px;
    border-radius: 16px;
    margin-bottom: 25px;
  }
  
  .header h1 {
    font-size: 24px;
  }
  
  .card {
    padding: 30px;
    border-radius: 16px;
    margin-bottom: 25px;
  }
  
  .article-title {
    font-size: 22px;
  }
  
  .article-content {
    font-size: 18px;
    line-height: 2;
  }
  
  .stats-grid {
    grid-template-columns: repeat(4, 1fr);
    gap: 15px;
  }
  
  .stat-value {
    font-size: 32px;
  }
  
  .question-item {
    padding: 25px;
  }
  
  .qna-title {
    font-size: 20px;
  }
}

@media (min-width: 1024px) {
  .container {
    max-width: 1000px;
  }
  
  .article-content {
    font-size: 19px;
    line-height: 2.2;
  }
}

/* 横屏手机优化 */
@media (max-height: 500px) and (orientation: landscape) {
  body {
    padding: 10px;
  }
  
  .header {
    padding: 12px 20px;
    margin-bottom: 10px;
  }
  
  .card {
    padding: 15px;
    margin-bottom: 10px;
  }
  
  .article-content {
    font-size: 15px;
    line-height: 1.7;
  }
}

/* 暗黑模式 */
@media (prefers-color-scheme: dark) {
  :root {
    --card-bg: #2a2a3a;
    --text: #e8e8e8;
    --text-secondary: #a0a0a0;
    --border: #3a3a50;
  }
  
  body {
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
  }
  
  .article-card,
  .question-item,
  .stat-item {
    background: #323248;
  }
  
  .article-content {
    color: #c8c8d0;
  }
}
    </style>
</head>
<body>
    <div class="container">
        <a href="/" class="back">← 返回首页</a>
        <div class="card">
            <h1>⌨️ 打字练习</h1>
            <div class="text-display" id="targetText">加载中...</div>
            <textarea id="inputText" placeholder="在此输入上面的文字..." oninput="checkTyping()" disabled></textarea>
            <div class="stats">
                <div class="stat-box">
                    <h3 id="wpm">0</h3>
                    <p>WPM</p>
                </div>
                <div class="stat-box">
                    <h3 id="accuracy">100%</h3>
                    <p>准确率</p>
                </div>
                <div class="stat-box">
                    <h3 id="time">0s</h3>
                    <p>用时</p>
                </div>
                <div class="stat-box">
                    <h3 id="wordCount">0</h3>
                    <p>单词数</p>
                </div>
            </div>
            <button class="btn btn-primary" onclick="submitResult()">提交成绩</button>
            <button class="btn btn-secondary" onclick="resetTest()">重新开始</button>
            <a href="/" class="btn btn-secondary">返回首页</a>
        </div>
    </div>
    <script>
        const currentUser = JSON.parse(localStorage.getItem('currentUser') || 'null');
        if (!currentUser) {
            alert('请先登录');
            location.href = '/register/';
        }
        
        let targetText = '';
        let startTime = null;
        let timerInterval = null;
        
        // 新增：从API获取打字内容
        async function loadTypingContent() {
            try {
                const response = await fetch('/api/content/typing', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ className: currentUser.className || '' })
                });
                const result = await response.json();
                
                if (result.success && result.content) {
                    targetText = result.content.content;
                    document.getElementById('targetText').textContent = targetText;
                    document.getElementById('inputText').disabled = false;
                } else {
                    document.getElementById('targetText').textContent = '暂无适合您班级的打字内容';
                }
            } catch (err) {
                console.error('加载内容失败:', err);
                document.getElementById('targetText').textContent = '加载失败，请刷新重试';
            }
        }
        
        function checkTyping() {
            const input = document.getElementById('inputText').value;
            if (!startTime && input.length > 0) {
                startTime = Date.now();
                timerInterval = setInterval(updateTime, 100);
            }
            
            // 实时计算单词数
            const wordCount = input.trim().split(/\s+/).filter(w => w.length > 0).length;
            document.getElementById('wordCount').textContent = wordCount;
            
            // 计算准确率
            let correct = 0;
            for (let i = 0; i < input.length; i++) {
                if (input[i] === targetText[i]) correct++;
            }
            const accuracy = input.length > 0 ? Math.round(correct / input.length * 100) : 100;
            document.getElementById('accuracy').textContent = accuracy + '%';
            
            // 计算WPM
            if (startTime) {
                const elapsed = (Date.now() - startTime) / 1000 / 60;
                const words = input.length / 5;
                const wpm = elapsed > 0 ? Math.round(words / elapsed) : 0;
                document.getElementById('wpm').textContent = wpm;
            }
        }

        function updateTime() {
            if (startTime) {
                const elapsed = Math.round((Date.now() - startTime) / 1000);
                document.getElementById('time').textContent = elapsed + 's';
            }
        }
        
        async function submitResult() {
            const input = document.getElementById('inputText').value;
            if (input.length < 10) {
                alert('请至少输入一段文字');
                return;
            }
            
            const wpm = parseInt(document.getElementById('wpm').textContent);
            const accuracy = parseInt(document.getElementById('accuracy').textContent);
            const duration = parseInt(document.getElementById('time').textContent);
            const wordCount = input.trim().split(/\s+/).filter(w => w.length > 0).length;
            
            try {
                const res = await fetch('/api/typing/result', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        nickname: currentUser.nickname,
                        wpm,
                        accuracy,
                        duration,
                        wordCount,
                        content: input
                    })
                });
                const data = await res.json();
                if (data.success) {
                    alert('成绩已提交！');
                }
            } catch(e) {
                alert('提交失败');
            }
        }

        function resetTest() {
            document.getElementById('inputText').value = '';
            document.getElementById('wpm').textContent = '0';
            document.getElementById('accuracy').textContent = '100%';
            document.getElementById('time').textContent = '0s';
            document.getElementById('wordCount').textContent = '0';
            startTime = null;
            clearInterval(timerInterval);
            // 重新加载内容
            loadTypingContent();
        }

        // 页面加载时获取内容
        loadTypingContent();
    </script>
</body>
</html>
