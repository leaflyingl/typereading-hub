<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>学生登录 - TypeReading Hub</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px; 
        }
        .nav { max-width: 450px; margin: 0 auto 20px; text-align: center; }
        .nav a { color: white; text-decoration: none; font-size: 1.1em; opacity: 0.9; }
        .container { max-width: 450px; margin: 0 auto; }
        .card { 
            background: white; 
            padding: 40px; 
            border-radius: 20px; 
            box-shadow: 0 20px 60px rgba(0,0,0,0.3); 
        }
        h2 { text-align: center; color: #333; margin-bottom: 10px; font-size: 1.8em; }
        .subtitle { text-align: center; color: #999; margin-bottom: 30px; font-size: 0.95em; }
        .tabs { display: flex; margin-bottom: 30px; border-bottom: 2px solid #f0f0f0; }
        .tab { 
            flex: 1; 
            padding: 15px; 
            text-align: center; 
            cursor: pointer; 
            color: #999;
            font-weight: 500;
            transition: all 0.3s;
        }
        .tab.active { 
            color: #667eea; 
            border-bottom: 2px solid #667eea; 
            margin-bottom: -2px;
        }
        .form-group { margin-bottom: 20px; }
        label { 
            display: block; 
            margin-bottom: 8px; 
            color: #555; 
            font-weight: 500;
            font-size: 0.9em;
        }
        .required::after { content: ' *'; color: #e74c3c; }
        input[type="text"], input[type="password"] { 
            width: 100%; 
            padding: 14px; 
            border: 2px solid #e0e0e0; 
            border-radius: 10px; 
            font-size: 16px; 
            transition: border-color 0.3s;
        }
        input:focus { outline: none; border-color: #667eea; }
        .radio-group { display: flex; gap: 20px; }
        .radio-item { 
            flex: 1; 
            padding: 12px; 
            border: 2px solid #e0e0e0; 
            border-radius: 10px; 
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }
        .radio-item:hover, .radio-item.selected { 
            border-color: #667eea; 
            background: #f0f3ff;
        }
        .radio-item input { display: none; }
        button { 
            width: 100%; 
            padding: 16px; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); 
            color: white; 
            border: none; 
            border-radius: 10px; 
            font-size: 16px; 
            cursor: pointer; 
            font-weight: 600;
            margin-top: 10px;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        button:hover:not(:disabled) { 
            transform: translateY(-2px); 
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4); 
        }
        button:disabled { background: #ccc; cursor: not-allowed; }
        button.secondary {
            background: #f8f9fa;
            color: #666;
            border: 2px solid #e0e0e0;
        }
        button.danger {
            background: linear-gradient(135deg, #ff6b6b 0%, #ee5a6f 100%);
        }
