<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录/注册 - TypeReading Hub</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .card {
            background: rgba(255,255,255,0.95);
            border-radius: 16px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        .card h1 {
            font-size: 24px;
            text-align: center;
            margin-bottom: 30px;
            color: #333;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #666;
            font-size: 14px;
        }
        .form-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
        }
        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
        }
        .btn-primary { background: #667eea; color: white; }
        .btn-secondary { background: #f0f0f0; color: #333; margin-top: 10px; }
        .error { color: #dc3545; font-size: 14px; margin-top: 10px; text-align: center; }
        .back-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: rgba(255,255,255,0.8);
            text-decoration: none;
        }
        .back-link:hover { color: white; }
    </style>
</head>
<body>
    <div class="card">
        <h1>🎓 学生登录/注册</h1>
        
        <form id="authForm">
            <div class="form-group">
                <label>昵称</label>
                <input type="text" id="nickname" required placeholder="请输入昵称">
            </div>
            
            <div class="form-group">
                <label>密码（可选）</label>
                <input type="password" id="password" placeholder="不设置密码可直接登录">
            </div>
            
            <button type="submit" class="btn btn-primary">登录 / 注册</button>
        </form>
        
        <div id="errorMsg" class="error"></div>
        
        <a href="/" class="back-link">← 返回首页</a>
    </div>

    <script>
        // 检查是否已登录
        if (localStorage.getItem('currentUser')) {
            location.href = '/';
        }

        document.getElementById('authForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const nickname = document.getElementById('nickname').value.trim();
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('errorMsg');

            if (!nickname) {
                errorMsg.textContent = '请输入昵称';
                return;
            }

            try {
                // 先尝试登录
                let response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ nickname, password })
                });

                let data = await response.json();

                if (data.success) {
                    // 登录成功
                    localStorage.setItem('currentUser', JSON.stringify(data.user));
                    location.href = '/';
                    return;
                }

                // 登录失败，尝试注册
                response = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ nickname, password })
                });

                data = await response.json();

                if (data.success) {
                    // ✅ 注册成功，自动登录
                    localStorage.setItem('currentUser', JSON.stringify(data.user));
                    location.href = '/';
                } else {
                    errorMsg.textContent = data.message;
                }
            } catch (err) {
                errorMsg.textContent = '网络错误：' + err.message;
            }
        });
    </script>
</body>
</html>
