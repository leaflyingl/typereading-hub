<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>学生注册 - TypeReading Hub</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px; 
        }
        .nav { 
            max-width: 500px; 
            margin: 0 auto 20px; 
            text-align: center;
        }
        .nav a { color: white; text-decoration: none; font-size: 1.1em; opacity: 0.9; }
        .nav a:hover { opacity: 1; }
        .container { max-width: 500px; margin: 0 auto; }
        .card { 
            background: white; 
            padding: 40px; 
            border-radius: 20px; 
            box-shadow: 0 20px 60px rgba(0,0,0,0.3); 
        }
        h2 { text-align: center; color: #333; margin-bottom: 10px; font-size: 1.8em; }
        .subtitle { text-align: center; color: #999; margin-bottom: 30px; font-size: 0.95em; }
        .form-group { margin-bottom: 20px; }
        label { 
            display: block; 
            margin-bottom: 8px; 
            color: #555; 
            font-weight: 500;
            font-size: 0.9em;
        }
        .required::after { content: ' *'; color: #e74c3c; }
        input[type="text"] { 
            width: 100%; 
            padding: 14px; 
            border: 2px solid #e0e0e0; 
            border-radius: 10px; 
            font-size: 16px; 
            transition: border-color 0.3s;
        }
        input[type="text"]:focus { outline: none; border-color: #667eea; }
        .radio-group { display: flex; gap: 20px; }
        .radio-item { 
            flex: 1; 
            padding: 12px; 
            border: 2px solid #e0e0e0; 
            border-radius: 10px; 
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }
        .radio-item:hover { border-color: #667eea; }
        .radio-item.selected { 
            border-color: #667eea; 
            background: #f0f3ff;
        }
        .radio-item input { display: none; }
        button { 
            width: 100%; 
            padding: 16px; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); 
            color: white; 
            border: none; 
            border-radius: 10px; 
            font-size: 16px; 
            cursor: pointer; 
            font-weight: 600;
            margin-top: 10px;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        button:hover:not(:disabled) { 
            transform: translateY(-2px); 
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4); 
        }
        button:disabled { 
            background: #ccc; 
            cursor: not-allowed; 
        }
        .message { 
            margin-top: 20px; 
            padding: 15px; 
            border-radius: 10px; 
            text-align: center; 
            font-size: 0.95em;
        }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
        .user-info { 
            margin-top: 25px; 
            padding: 25px; 
            background: linear-gradient(135deg, #e7f3ff 0%, #f0e6ff 100%); 
            border-radius: 12px; 
            display: none; 
            text-align: center;
        }
        .user-info h3 { color: #667eea; margin-bottom: 15px; }
        .user-info p { color: #666; margin: 8px 0; font-size: 0.95em; }
        .user-info .label { color: #999; font-size: 0.85em; }
        .links { 
            margin-top: 25px; 
            text-align: center;
            display: none;
        }
        .links a { 
            display: inline-block;
            margin: 6px; 
            padding: 12px 20px;
            background: #667eea;
            color: white;
            text-decoration: none; 
            border-radius: 8px;
            font-size: 0.95em;
            transition: background 0.3s;
        }
        .links a:hover { background: #5a67d8; }
    </style>
</head>
<body>
    <div class="nav">
        <a href="/">← 返回首页</a>
    </div>
    
    <div class="container">
        <div class="card">
            <h2>🎓 学生注册</h2>
            <p class="subtitle">填写信息开始学习之旅</p>
            
            <div class="form-group">
                <label class="required">昵称（显示用）</label>
                <input type="text" id="nickname" placeholder="请输入昵称（至少2个字符）" maxlength="20">
            </div>
            
            <div class="form-group">
                <label class="required">真实姓名</label>
                <input type="text" id="realName" placeholder="请输入真实姓名" maxlength="10">
            </div>
            
            <div class="form-group">
                <label class="required">性别</label>
                <div class="radio-group">
                    <label class="radio-item" onclick="selectGender('男')">
                        <input type="radio" name="gender" value="男" id="gender-male">
                        <span>👦 男</span>
                    </label>
                    <label class="radio-item" onclick="selectGender('女')">
                        <input type="radio" name="gender" value="女" id="gender-female">
                        <span>👧 女</span>
                    </label>
                </div>
            </div>
            
            <button onclick="register()" id="registerBtn">立即注册</button>
            
            <div id="message"></div>
            
            <div id="userInfo" class="user-info">
                <h3>🎉 注册成功！</h3>
                <p><strong id="displayName"></strong></p>
                <p><span class="label">真实姓名：</span><span id="displayRealName"></span></p>
                <p><span class="label">用户ID：</span><code id="userId"></code></p>
            </div>
        </div>
        
        <div class="links" id="links">
            <a href="/reading/">📖 开始阅读</a>
            <a href="/typing/">⌨️ 打字练习</a>
            <a href="/rank/">🏆 排行榜</a>
        </div>
    </div>

    <script>
        let selectedGender = '';
        
        // 检查是否已登录
        const savedUser = localStorage.getItem('typereading_user');
        if (savedUser) {
            const user = JSON.parse(savedUser);
            showUserInfo(user);
        }
        
        function selectGender(gender) {
            selectedGender = gender;
            document.querySelectorAll('.radio-item').forEach(el => el.classList.remove('selected'));
            document.getElementById('gender-' + (gender === '男' ? 'male' : 'female')).parentElement.classList.add('selected');
        }
        
        async function register() {
            const nickname = document.getElementById('nickname').value.trim();
            const realName = document.getElementById('realName').value.trim();
            const msgDiv = document.getElementById('message');
            const btn = document.getElementById('registerBtn');
            
            // 验证
            if (nickname.length < 2) {
                msgDiv.innerHTML = '<div class="message error">昵称至少2个字符</div>';
                return;
            }
            if (realName.length < 2) {
                msgDiv.innerHTML = '<div class="message error">请输入真实姓名</div>';
                return;
            }
            if (!selectedGender) {
                msgDiv.innerHTML = '<div class="message error">请选择性别</div>';
                return;
            }
            
            btn.disabled = true;
            btn.textContent = '注册中...';
            
            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        nickname, 
                        realName, 
                        gender: selectedGender 
                    })
                });
                
                const data = await res.json();
                
                if (data.success) {
                    localStorage.setItem('typereading_user', JSON.stringify(data.user));
                    msgDiv.innerHTML = '<div class="message success">注册成功！</div>';
                    showUserInfo(data.user);
                } else {
                    msgDiv.innerHTML = '<div class="message error">' + (data.error || '注册失败') + '</div>';
                    btn.disabled = false;
                    btn.textContent = '立即注册';
                }
            } catch (err) {
                msgDiv.innerHTML = '<div class="message error">网络错误，请检查连接后重试</div>';
                btn.disabled = false;
                btn.textContent = '立即注册';
            }
        }
        
        function showUserInfo(user) {
            document.getElementById('displayName').textContent = user.nickname;
            document.getElementById('displayRealName').textContent = user.realName || '未设置';
            document.getElementById('userId').textContent = user.userId;
            document.getElementById('userInfo').style.display = 'block';
            
            // 隐藏表单
            document.querySelectorAll('.form-group').forEach(el => el.style.display = 'none');
            document.getElementById('registerBtn').style.display = 'none';
            document.getElementById('links').style.display = 'block';
        }
    </script>
</body>
</html>
